# =====================================================
# 本番環境（デフォルト）— wholesale.nkonline-tool.com
# ※ wrangler deploy で本番に反映
# ロールバック: main = "worker.js" に戻して wrangler deploy
# =====================================================
name = "detauri-gas-proxy"
main = "src/index.js"
compatibility_date = "2024-01-01"

# 本番カスタムドメイン — ゾーン未追加のためルートは無効
# nkonline-tool.comをCloudflare DNS（フルセットアップ）にした後、有効化可能:
# routes = [
#   { pattern = "wholesale.nkonline-tool.com/*", zone_name = "nkonline-tool.com" }
# ]
workers_dev = true

[vars]
FRONTEND_URL = "https://wholesale.nkonline-tool.com"
WORKERS_URL = "https://detauri-gas-proxy.nsdktts1030.workers.dev"
# 画像はgas-proxy自身のR2(detauri-images)に保存されているため、タスキ箱のTeamIDは不要

# Cron Trigger: 5分ごとにD1 ⇔ Sheets同期
[triggers]
crons = ["*/5 * * * *"]

# D1 Database（本番用）
[[d1_databases]]
binding = "DB"
database_name = "detauri-db"
database_id = "a6dd2463-5b9a-4a64-b31e-644c454a1503"

# KV Namespaces（本番用）
[[kv_namespaces]]
binding = "SESSIONS"
id = "5a5de61cf63343228daa74cb34957f50"

[[kv_namespaces]]
binding = "CACHE"
id = "9a4f7973bc644ab086397fd71564985f"

# R2 Bucket（本番用 — 商品画像）
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "detauri-images"

# R2 Bucket（タスキ箱画像 — AI判定用の読み取り専用参照）
[[r2_buckets]]
binding = "TASUKIBAKO_IMAGES"
bucket_name = "tasukibako-images"

# Secrets (wrangler secret put で設定)
# - GAS_API_URL, SYNC_SECRET, ADMIN_KEY, RECAPTCHA_SECRET, KOMOJU_SECRET_KEY
# - META_PIXEL_ID (Meta Pixel ID: 2122295911954697)
# - META_ACCESS_TOKEN (Meta Conversions API アクセストークン — Events Managerで生成)
# - GEMINI_API_KEY (Gemini AI判定用、写メジャーとは別キー)
# - BG_API_URL  (Vercel Functions URL: https://tasukibako-bg-api.vercel.app/api/bg-replace)
# - BG_API_KEY  (Vercel側と一致するシークレット)

# =====================================================
# 開発環境 — wrangler deploy --env dev / wrangler dev --env dev
# ※ 本番には一切干渉しない独立環境
# =====================================================
[env.dev]
name = "detauri-gas-proxy-dev"
main = "src/index.js"

# Cron Trigger: 5分ごとにD1 ⇔ Sheets同期
[env.dev.triggers]
crons = ["*/5 * * * *"]

# D1 Database（開発用）
[[env.dev.d1_databases]]
binding = "DB"
database_name = "detauri-db-dev"
database_id = "536476ea-e2f3-47bd-bc55-6d030b4e4add"

# KV Namespaces（開発用）
[[env.dev.kv_namespaces]]
binding = "SESSIONS"
id = "e9350025a350473f9ffaf94752c9fe5d"

[[env.dev.kv_namespaces]]
binding = "CACHE"
id = "9dff0a74c58d4773a1150cdecbbfc641"

# R2 Bucket（開発用 — 商品画像）
[[env.dev.r2_buckets]]
binding = "IMAGES"
bucket_name = "detauri-images-dev"

# Secrets (wrangler secret put --env dev で設定)
# - GAS_API_URL (GAS Web App URL)
# - SYNC_SECRET (GAS同期用シークレット)
# - ADMIN_KEY
# - RECAPTCHA_SECRET
# - META_PIXEL_ID (Meta Pixel ID: 2122295911954697)
# - META_ACCESS_TOKEN (Meta Conversions API アクセストークン)
