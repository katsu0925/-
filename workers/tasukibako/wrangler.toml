name = "tasukibako"
main = "src/index.js"
compatibility_date = "2024-01-01"
workers_dev = true

# カスタムドメイン
routes = [
  { pattern = "tasukibako.nkonline-tool.com/*", zone_id = "21e05f22e3f12c87a1bff76a4284063a" }
]

[vars]
APP_NAME = "タスキ箱"

# Secrets (wrangler secret put で設定):
#   ADMIN_EMAILS  — 管理者メール（カンマ区切り）

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "tasukibako-db"
database_id = "30d05549-1e52-4a2a-85af-555847c183f9"

# KV: セッション・CSRF・レート制限
[[kv_namespaces]]
binding = "SESSIONS"
id = "a45ffde241e64ee8aa03b6a54dc659ec"

# KV: 画像キャッシュ・インデックス
[[kv_namespaces]]
binding = "CACHE"
id = "4b44ff82d82b4302b3e3318522f7ae11"

# KV: gas-proxy同期用（撮影データ→AI判定の自動連携）
[[kv_namespaces]]
binding = "SYNC_CACHE"
id = "9a4f7973bc644ab086397fd71564985f"

# R2: 商品画像ストレージ
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "tasukibako-images"
