<style>
  :root {
    --primary: #1565c0;
    --primary-dark: #0d47a1;
    --primary-light: #e3f2fd;
    --primary-soft: #e3f2fd;
    --accent: #ff6d00;
    --bg: #f4f6fa;
    --card: #ffffff;
    --surface: #ffffff;
    --text: #1a2330;
    --text-sub: #66707d;
    --text-mute: #6f7786; /* WCAG AA 対応: 旧 #9aa3b0 (2.77:1) → 4.6:1 */
    --border: #e3e7ee;
    --success: #2e7d32;
    --success-soft: #e8f5e9;
    --warning: #b95400; /* WCAG AA 対応: 旧 #ed6c02 (3.55:1) → 4.5:1 */
    --warning-soft: #fff4e5;
    --danger: #c62828;
    --danger-soft: #ffebee;
    --gray-soft: #eef0f4;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-lg: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    --focus-ring: 0 0 0 3px rgba(21,101,192,.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { height: auto; overflow-y: auto; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", "Yu Gothic UI", "Meiryo", sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5;
    /* iOSノッチ(safe-area-inset-top)を appbar・body 双方に加味することで、固定ヘッダの被りを全画面で解消 */
    padding-top: calc(102px + env(safe-area-inset-top, 0px));
    padding-bottom: calc(76px + env(safe-area-inset-bottom)); min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
  }
  body.has-chips { padding-top: calc(146px + env(safe-area-inset-top, 0px)); }
  /* 詳細画面: 検索バーを隠して appbar が縮むので、コンテンツ上余白と sec-tabs sticky 位置を一致させる */
  body.view-detail { padding-top: calc(56px + env(safe-area-inset-top, 0px)); }
  body.view-detail .sec-tabs { top: calc(56px + env(safe-area-inset-top, 0px)); }
  /* topbar-search は display:flex が固定で当たるため hidden 属性だけでは消えない。明示的に上書き */
  body.view-detail .topbar-search { display: none !important; }
  /* グローバル focus-visible: WCAG 対応 */
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, a:focus-visible {
    outline: 2px solid var(--primary); outline-offset: 2px;
  }
  .appbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff;
    /* iOS ノッチ分の上余白を確保し、ステータスバー領域も同色で塗る */
    padding: calc(8px + env(safe-area-inset-top, 0px)) 10px 10px;
    display: flex; flex-direction: column; gap: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,.15);
  }
  .appbar-row1 { display: flex; align-items: center; gap: 4px; min-height: 40px; }
  .appbar .icon-btn {
    width: 40px; height: 40px; background: rgba(255,255,255,.14); border: none; color: #fff;
    font-size: 20px; cursor: pointer; padding: 0; margin: 0 2px;
    display: flex; align-items: center; justify-content: center; border-radius: 10px;
    transition: background .15s;
  }
  .appbar .icon-btn:hover { background: rgba(255,255,255,.22); }
  .appbar .icon-btn:active { background: rgba(255,255,255,.28); }
  .appbar h1 { font-size: 17px; font-weight: 600; margin: 0; flex: 1; padding-left: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar-search {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,.95); border-radius: 8px;
    padding: 6px 12px; min-height: 36px;
  }
  .topbar-search .search-ico {
    width: 16px; height: 16px; opacity: .55; flex-shrink: 0;
    color: var(--text-sub);
  }
  .topbar-search .search-ico svg {
    width: 100%; height: 100%; fill: none; stroke: currentColor;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }
  .topbar-search input {
    flex: 1; border: none; outline: none; background: transparent;
    color: var(--text); font-size: 14px; padding: 4px 0; min-width: 0;
  }
  .topbar-search input::placeholder { color: var(--text-mute); }
  /* type="search" のブラウザ標準クリアボタン（Safari/Chrome）はカスタム .clear-btn と重複するため抑制 */
  .topbar-search input[type="search"] { -webkit-appearance: textfield; appearance: textfield; }
  .topbar-search input[type="search"]::-webkit-search-cancel-button,
  .topbar-search input[type="search"]::-webkit-search-decoration { -webkit-appearance: none; appearance: none; display: none; }
  .topbar-search .clear-btn {
    background: transparent; border: none; color: var(--text-mute);
    font-size: 16px; line-height: 1; cursor: pointer; padding: 4px;
    display: none;
  }
  .topbar-search.has-value .clear-btn { display: inline-flex; align-items: center; }
  .drawer-mask {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .drawer-mask.show { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 288px; max-width: 80vw; background: var(--surface);
    z-index: 201; transform: translateX(-100%); transition: transform 0.2s;
    box-shadow: 2px 0 12px rgba(0,0,0,0.18);
    display: flex; flex-direction: column;
  }
  .drawer.show { transform: translateX(0); }
  .drawer-header {
    background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff; padding: 22px 18px 18px;
  }
  .drawer-header .app-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; letter-spacing: .02em; }
  .drawer-header .user { font-size: 12px; opacity: 0.9; word-break: break-all; }
  .drawer-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .drawer-item {
    display: flex; align-items: center; padding: 12px 18px; cursor: pointer;
    color: var(--text); border-left: 4px solid transparent; font-size: 14px;
    min-height: 48px;
  }
  .drawer-item:hover { background: #f7f9fc; }
  .drawer-item:active { background: var(--primary-soft); }
  .drawer-item.active { background: var(--primary-soft); color: var(--primary-dark); border-left-color: var(--primary); font-weight: 600; }
  .drawer-item .ico { margin-right: 14px; font-size: 18px; width: 22px; height: 22px; text-align: center; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--text-sub); }
  .drawer-item.active .ico { color: var(--primary); }
  .drawer-item .ico svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .drawer-item .count {
    margin-left: auto; min-width: 26px; text-align: center;
    background: var(--gray-soft); color: var(--text-sub);
    padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 600;
  }
  .drawer-item.active .count { background: var(--primary); color: #fff; }
  .drawer-section-label {
    padding: 14px 18px 4px; font-size: 10px; color: var(--text-sub);
    font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  }
  .drawer-divider { border-top: 1px solid var(--border); margin: 6px 0; }
  /* searchbar は topbar-search に統合（後方互換のため空の擬似定義） */
  .searchbar { display: none; }
  .content { padding: 10px 12px; min-height: calc(100vh - 56px - 64px); }
  .filter-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--primary-soft); color: var(--primary-dark);
    padding: 6px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
    margin: 4px 0 10px 0;
    border: 1px solid rgba(21,101,192,.18);
  }
  /* ===== chips フィルタストリップ（モックアップ） ===== */
  .chips-bar {
    position: fixed; top: calc(102px + env(safe-area-inset-top, 0px)); left: 0; right: 0; z-index: 90;
    background: var(--surface); border-bottom: 1px solid var(--border);
    box-shadow: 0 2px 4px rgba(0,0,0,.04);
  }
  .chips-bar[hidden] { display: none !important; }
  .chips {
    display: flex; gap: 6px; padding: 8px 12px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 6px 12px; border-radius: 999px;
    background: var(--gray-soft); color: var(--text);
    font-size: 12px; font-weight: 500;
    border: 1px solid transparent;
    white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer; user-select: none;
  }
  .chip:hover { background: #e6e9ef; }
  .chip.active {
    background: var(--primary); color: #fff; border-color: var(--primary);
  }
  .chip-count {
    background: rgba(255,255,255,.3); color: inherit;
    padding: 1px 6px; border-radius: 8px; font-size: 11px; font-weight: 600;
    min-width: 18px; text-align: center;
  }
  .chip:not(.active) .chip-count {
    background: var(--surface); color: var(--text-sub);
  }
  /* ===== カード（モックアップ pcard ベース） ===== */
  .card {
    background: var(--surface); border-radius: 12px;
    box-shadow: var(--shadow);
    margin-bottom: 8px; padding: 12px 14px; cursor: pointer;
    border-left: 4px solid transparent;
    transition: background .12s, box-shadow .12s;
  }
  .card.has-thumb { display: flex; gap: 12px; align-items: flex-start; }
  .card-thumb {
    width: 56px; height: 56px; border-radius: 8px;
    background: var(--gray-soft); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-mute); font-size: 22px;
    overflow: hidden;
  }
  .card-thumb img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .card-body { flex: 1; min-width: 0; }
  .card:hover { box-shadow: var(--shadow-lg); }
  .card:active { background: #f7f9fc; }
  /* ステータスでの左ボーダー色分け（モックアップ s-* 互換） */
  .card.s-overdue { border-left-color: var(--danger); background: #fff8f8; }
  .card.s-shukka  { border-left-color: var(--primary); }
  .card.s-sokutei { border-left-color: var(--warning); }
  .card.s-sold    { border-left-color: var(--success); }
  .card-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .card-kanri { font-weight: 700; font-size: 15px; color: var(--primary); letter-spacing: .02em; }
  .card-status {
    margin-left: auto;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 6px;
    background: var(--gray-soft); color: var(--text-sub);
  }
  .card-status.sold { background: var(--danger-soft); color: var(--danger); }
  .card-status.measured { background: var(--success-soft); color: var(--success); }
  .card-status.shipping-pending { background: var(--warning-soft); color: var(--warning); }
  .card-status.shipped { background: var(--primary-soft); color: var(--primary); }
  .card-deadline {
    font-size: 11px; color: var(--text-sub); margin-top: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .card-deadline.overdue { color: var(--danger); font-weight: 700; }
  .card-deadline.today {
    color: var(--danger); font-weight: 700;
    background: var(--danger-soft); padding: 3px 8px; border-radius: 6px;
    border-left: 3px solid var(--danger); display: inline-flex;
    margin-top: 6px;
  }
  .img-field { display: flex; gap: 12px; align-items: flex-start; }
  .img-preview-wrap { position: relative; flex-shrink: 0; }
  .img-delete-btn {
    position: absolute; top: -8px; right: -8px;
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--danger, #e53935); color: white;
    border: 2px solid white;
    font-size: 14px; line-height: 1; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.25);
    padding: 0; z-index: 2;
  }
  .img-delete-btn:hover { background: #c62828; }
  .img-delete-btn:active { transform: scale(0.92); }
  .img-delete-btn.armed {
    background: #c62828; transform: scale(1.25);
    box-shadow: 0 0 0 4px rgba(229,57,53,.25), 0 1px 3px rgba(0,0,0,.3);
    animation: img-delete-pulse 0.6s ease-in-out infinite alternate;
  }
  @keyframes img-delete-pulse {
    from { box-shadow: 0 0 0 4px rgba(229,57,53,.25), 0 1px 3px rgba(0,0,0,.3); }
    to   { box-shadow: 0 0 0 7px rgba(229,57,53,.10), 0 1px 3px rgba(0,0,0,.3); }
  }
  /* 任意フィールドの ✕ クリアボタン（画像と同じ 2 段タップ・3 秒ルール） */
  .field-input-wrap {
    display: flex; align-items: flex-start; gap: 6px;
    width: 100%; min-width: 0;
  }
  .field-input-wrap > input,
  .field-input-wrap > select,
  .field-input-wrap > textarea {
    flex: 1 1 auto; min-width: 0; width: auto;
  }
  .field-input-wrap > .field-with-icon,
  .field-input-wrap > .yesno-toggle {
    flex: 1 1 auto; min-width: 0;
  }
  .field-input-wrap > a { flex: 0 0 auto; align-self: center; }
  .field-clear-btn {
    flex: 0 0 auto;
    width: 32px; height: 38px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    background: #f4f6fa; color: #8a93a3;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; line-height: 1; cursor: pointer;
    transition: background .12s, color .12s, border-color .12s, transform .08s;
  }
  .field-clear-btn:hover { background: #fde2e2; color: var(--danger, #e53935); border-color: #f5c2c2; }
  .field-clear-btn:active { transform: scale(0.94); }
  .field-clear-btn.armed {
    background: var(--danger, #e53935); color: #fff; border-color: var(--danger, #e53935);
    font-weight: 700;
    animation: field-clear-pulse 0.6s ease-in-out infinite alternate;
  }
  @keyframes field-clear-pulse {
    from { box-shadow: 0 0 0 0 rgba(229,57,53,.45); }
    to   { box-shadow: 0 0 0 5px rgba(229,57,53,.05); }
  }
  /* 狭いグリッド列内ではクリアボタンも一回り小さく */
  .field-grid-2 .field-clear-btn,
  .field-grid-3 .field-clear-btn,
  .meas-grid .field-clear-btn { width: 28px; height: 36px; }
  .img-preview {
    display: flex; align-items: center; justify-content: center;
    width: 96px; height: 96px; flex-shrink: 0;
    border: 1px solid var(--border); border-radius: 8px;
    background: #f7f9fc; overflow: hidden;
    font-size: 11px; color: var(--text-mute); text-align: center; padding: 4px;
    text-decoration: none; cursor: pointer;
  }
  .img-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .img-preview.img-loading { color: var(--primary); }
  .img-preview.img-error { color: var(--danger); background: var(--danger-soft); }
  .img-actions { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .img-upload-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; min-height: 38px;
    background: var(--primary); color: white;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer; align-self: flex-start; user-select: none;
    box-shadow: 0 1px 2px rgba(0,0,0,.08);
  }
  .img-upload-btn.ghost {
    background: var(--surface); color: var(--primary);
    border: 1px solid var(--primary); box-shadow: none;
  }
  .img-upload-btn:hover { background: var(--primary-dark); }
  .img-upload-btn.ghost:hover { background: var(--primary-soft); }
  .img-upload-btn:active { background: var(--primary-dark); }
  .img-hint { font-size: 11px; color: var(--text-sub); }
  .img-status { font-size: 12px; color: var(--text-sub); min-height: 16px; }
  .img-status.success { color: var(--success); }
  .img-status.error { color: var(--danger); }
  /* 画像拡大モーダル（タップで閉じる） */
  .img-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,.92);
    z-index: 9000; display: none;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .img-modal.show { display: flex; }
  .img-modal img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
  }
  .img-modal-close {
    position: absolute; top: 16px; right: 16px;
    width: 44px; height: 44px;
    background: rgba(255,255,255,.18); color: #fff;
    border: none; border-radius: 50%;
    font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  /* モーダル内の前後ナビ（複数画像があるときだけ表示） */
  .img-modal-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 48px; height: 72px;
    background: rgba(255,255,255,.18); color: #fff;
    border: none; border-radius: 8px;
    font-size: 32px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
  }
  .img-modal-prev { left: 12px; }
  .img-modal-next { right: 12px; }
  .img-modal-counter {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.55); color: #fff;
    padding: 4px 14px; border-radius: 999px;
    font-size: 13px; pointer-events: none;
  }
  /* 基本タブの画像プレビュー（hero 直下） */
  .basic-imgs {
    display: flex; gap: 10px; padding: 12px 12px 10px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    background: var(--surface); border-bottom: 1px solid var(--border);
    margin: 0 -12px;
  }
  .basic-imgs::-webkit-scrollbar { display: none; }
  .basic-img {
    width: 80px; height: 80px; flex-shrink: 0;
    border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; cursor: pointer;
    background: #f7f9fc;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--text-mute); text-align: center;
    box-shadow: 0 2px 4px rgba(0,0,0,.06);
    transition: transform .12s, box-shadow .12s, border-color .12s;
  }
  .basic-img:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(21,101,192,.18);
    border-color: var(--primary);
  }
  .basic-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  /* フィールド横並びグリッド */
  .field-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; padding: 12px 0; border-bottom: 1px solid #eef1f6; }
  /* 採寸記録: date入力と作業者selectが狭幅で被るため、狭い画面では1列に折り返す */
  @media (max-width: 600px) {
    .field-grid-2.fg-stack { grid-template-columns: 1fr; gap: 6px; padding: 8px 0 12px; }
    .field-grid-2.fg-stack > .field-row { padding: 4px 0; }
  }
  .field-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0 8px; padding: 12px 0; border-bottom: 1px solid #eef1f6; }
  .form-section > .field-grid-2:last-child, .form-section > .field-grid-3:last-child { border-bottom: none; }
  .field-grid-2 > .field-row, .field-grid-3 > .field-row {
    display: block; padding: 0; margin: 0; background: transparent; border-bottom: none;
    min-width: 0;
  }
  .meas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
  .meas-grid > .field-row { display: block; padding: 4px 0; margin: 0; background: transparent; border-bottom: none; min-width: 0; }
  .meas-grid > .field-row label { font-size: 11px; margin-bottom: 2px; }
  .meas-grid > .field-row input { padding: 8px 10px; font-size: 14px; min-height: 36px; }
  .group-header {
    font-size: 12px; font-weight: 700; color: var(--text-sub);
    margin: 14px 0 6px 0; padding: 4px 4px;
    text-transform: uppercase; letter-spacing: .04em;
    display: flex; align-items: center; gap: 8px;
  }
  .group-header::before {
    content: ''; width: 4px; height: 12px;
    background: var(--primary); border-radius: 2px;
  }
  .group-header .count { color: var(--primary); margin-left: auto; font-weight: 600; font-size: 11px; }
  /* 発送グループの折りたたみ用 details/summary。デフォルト開、見た目は group-header と統一 */
  details.group-fold { margin: 14px 0 6px 0; }
  details.group-fold > summary {
    list-style: none; cursor: pointer;
    font-size: 12px; font-weight: 700; color: var(--text-sub);
    padding: 4px 4px;
    text-transform: uppercase; letter-spacing: .04em;
    display: flex; align-items: center; gap: 8px;
  }
  details.group-fold > summary::-webkit-details-marker { display: none; }
  details.group-fold > summary::before {
    content: '▶'; font-size: 10px; color: var(--text-sub);
    transition: transform .15s; flex-shrink: 0;
  }
  details.group-fold[open] > summary::before { transform: rotate(90deg); }
  details.group-fold > summary .count { color: var(--primary); margin-left: auto; font-weight: 600; font-size: 11px; }
  /* 進捗ピル（カード内: 採寸✓ / 撮影✓ / 出品✓ などを横並びで表示） */
  .card-pills { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .card-pill {
    display: inline-flex; align-items: center; gap: 2px;
    font-size: 10px; line-height: 1; padding: 3px 6px;
    border-radius: 999px; background: var(--gray-soft); color: var(--text-mute);
    white-space: nowrap;
  }
  .card-pill.done { background: #e8f5e9; color: #2e7d32; font-weight: 600; }
  .card-pill .ico { font-size: 10px; }
  /* コンパクト密度: カードの余白とピルを縮める */
  body.density-compact .card { padding: 6px 10px; gap: 8px; }
  body.density-compact .card-thumb { width: 56px; height: 56px; }
  body.density-compact .card-pills { display: none; }
  body.density-compact .card-row2 { font-size: 12px; }
  /* 表示メニュー chip（並び順/密度の切替） */
  .chip.chip-menu { background: transparent; border: 1px dashed var(--border); color: var(--text-sub); }
  .chip.chip-menu:hover { background: var(--gray-soft); }
  /* 並び順 / 密度 のポップオーバーメニュー */
  .popover-menu {
    position: absolute; z-index: 1000;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
    padding: 6px; min-width: 160px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .popover-menu .menu-section-title {
    font-size: 11px; font-weight: 700; color: var(--text-mute);
    padding: 6px 8px 2px; text-transform: uppercase; letter-spacing: .04em;
  }
  .popover-menu .menu-item {
    text-align: left; padding: 8px 10px; border-radius: 6px;
    background: transparent; border: none; cursor: pointer;
    font-size: 13px; color: var(--text);
  }
  .popover-menu .menu-item:hover { background: var(--gray-soft); }
  .popover-menu .menu-item.on { color: var(--primary); font-weight: 600; }
  /* 作業者管理の横スクロールヒント（右端フェード + 画面外マーカー） */
  .sagyou-wrap { position: relative; }
  .sagyou-wrap.has-overflow::after {
    content: ''; position: absolute; top: 12px; bottom: 12px; right: 12px;
    width: 28px; pointer-events: none;
    background: linear-gradient(to right, transparent, var(--bg, #f5f6f8) 80%);
  }
  .sagyou-scrollhint {
    text-align: right; font-size: 11px; color: var(--text-mute);
    padding: 0 16px 8px; user-select: none;
  }
  /* P2 #88: AIタブカードのコンパクト化 — 2列グリッド + 主要4項目のみ表示 */
  .ai-card {
    background: var(--surface); border-radius: 10px; box-shadow: var(--shadow);
    padding: 10px 12px; cursor: pointer; transition: background .12s, box-shadow .12s;
    border-left: 3px solid var(--primary-soft);
  }
  .ai-card:hover { box-shadow: var(--shadow-lg); }
  .ai-card:active { background: #f7f9fc; }
  .ai-card .ai-kanri { font-weight: 700; font-size: 14px; color: var(--primary); margin-bottom: 4px; letter-spacing: .02em; }
  .ai-card .ai-brand { font-size: 13px; color: var(--text); font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ai-card .ai-meta { font-size: 11px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .ai-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px; }
  /* P2 #89: 場所移動 管理番号ピル化 */
  .ids-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .ids-pill {
    display: inline-block; font-size: 11px; font-weight: 600;

  /* P2 #90: 仕入れ進捗バーのグラデーション */
  .shiire-progress.gradient {
    position: relative; overflow: hidden;
    background: var(--gray-soft);
  }
  .shiire-progress.gradient::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: var(--progress-pct, 0%);
    background: linear-gradient(90deg, var(--primary-soft), var(--primary));
    opacity: .35; transition: width .25s;
    z-index: 0;
  }
  .shiire-progress.gradient > span { position: relative; z-index: 1; }
  .shiire-progress.gradient.done::before {
    background: linear-gradient(90deg, var(--success-soft), var(--success));
    opacity: .4;
  }
  /* P2 #92: PC ビューでカードグリッド化 (≥900px) */
  .cards-grid { display: contents; }
  @media (min-width: 900px) {
    body:not(.view-detail) .cards-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 10px;

    body:not(.view-detail) .cards-grid > .card,

    body:not(.view-detail) .card-list {

  body.appbar-hidden:not(.view-detail) .appbar { transform: translateY(-100%); }
  body.appbar-hidden:not(.view-detail) .chips-bar { transform: translateY(calc(-102px - env(safe-area-inset-top, 0px))); transition: transform .2s ease; }
  body.appbar-hidden:not(.view-detail) .sec-tabs { top: 0; }

  /* セクション = ヘッダ＋本体 が連結したカード */

  .modal-overlay .modal-header h3 { margin: 0; font-size: 16px; font-weight: 700; }
  .modal-overlay .modal-close {
    background: none; border: none; font-size: 22px; cursor: pointer;
    color: var(--text-sub); padding: 0; width: 36px; height: 36px;
    border-radius: 8px;
  }
  .modal-overlay .modal-close:hover { background: var(--gray-soft); }
  .modal-overlay .modal-body { padding: 16px; overflow-y: auto; }
  /* あり/なし トグル */
  .yesno-toggle { display: inline-flex; gap: 6px; flex-wrap: wrap; }
  .yesno-btn {
    padding: 8px 14px; min-width: 56px; min-height: 40px;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--text); border-radius: 8px;
    font-size: 14px; font-weight: 500; cursor: pointer; user-select: none;
  }
  /* 狭いグリッド列ではトグルもコンパクト化（折り返し抑制） */
  .field-grid-2 > .field-row .yesno-btn {
    padding: 6px 10px; min-width: 44px; min-height: 36px; font-size: 13px;
  }
  .yesno-btn.yesno-yes.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .yesno-btn.yesno-no.active  { background: var(--danger); color: #fff; border-color: var(--danger); }
  .yesno-btn.yesno-clear { padding: 8px 10px; min-width: 36px; color: var(--text-sub); }
  .yesno-btn.yesno-clear.active { background: var(--gray-soft); color: var(--text); border-color: #aaa; }
  .yesno-btn:hover { filter: brightness(0.97); }
  /* textarea 自動拡張 */
  textarea.auto-grow {
    min-height: 40px; max-height: 480px;
    overflow-y: auto; resize: vertical;
    font-family: inherit; font-size: 14px; line-height: 1.5;
  }
  /* 商品一覧のリストメタ（件数・並び替え） */
  .list-meta {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 4px 8px; font-size: 12px; color: var(--text-sub);
  }
  /* ===== PC レイアウト調整（768px 以上） ===== */
  @media (min-width: 768px) {
    body { padding-left: 16px; padding-right: 16px; }
    .content { max-width: 1100px; margin: 0 auto; padding: 16px; }
    .field-row { display: grid; grid-template-columns: 140px 1fr; align-items: start; gap: 14px; padding: 12px 0; }
    .field-row label { margin-bottom: 0; padding-top: 8px; }
    /* グリッド内の field-row は PC でもブロック表示（label + input 縦並び） */
    .field-grid-2 > .field-row, .field-grid-3 > .field-row, .meas-grid > .field-row {
      display: block; padding: 0; margin: 0; background: transparent;
    }
    .meas-grid > .field-row { padding: 4px 0; }
    .field-grid-2 > .field-row label, .field-grid-3 > .field-row label, .meas-grid > .field-row label {
      padding-top: 0;
    }
    .form-section { padding: 0 18px; }
    .product-info { padding: 18px 20px; }
    .product-info h2 { font-size: 24px; }
    /* sec-tabs を viewport 幅に full-bleed して appbar と揃え、
       タブを均等分散（各タブ flex: 1）して右端まで広げる。
       overflow-x: auto は PC では不要（横スクロール不要・常に全タブ可視）。*/
    .sec-tabs {
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
      padding-left: max(16px, calc(50vw - 550px));
      padding-right: max(16px, calc(50vw - 550px));
      overflow-x: visible;
      box-sizing: border-box;
    }
    .sec-tab { flex: 1 1 0; text-align: center; padding: 14px 8px; font-size: 14px; }
    /* chips-bar は固定。内側 .chips は content と揃える（PC で帯が左寄せにならないよう全幅化） */
    .chips {
      padding-left: max(12px, calc(50vw - 534px));
      padding-right: max(12px, calc(50vw - 534px));
    }
    /* bottomnav も PC では均等分散（mobile の inline-flex+min-width だと左に固まる） */
    .bottomnav { overflow-x: visible; }
    .bottomnav-inner {
      display: flex;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 16px;
      box-sizing: border-box;
    }
    .bottomnav button { flex: 1 1 0; min-width: 0; }
  }
  /* ===== 売上ダッシュボード ===== */
  .dash-wrap { display: flex; flex-direction: column; gap: 14px; padding: 4px 0 24px; }
  .dash-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 16px; box-shadow: var(--shadow);
  }
  .dash-card.primary {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff; border: none;
  }
  .dash-card.primary .dash-label,
  .dash-card.primary .dash-sub { color: rgba(255,255,255,.85); }
  .dash-card.primary .dash-num { color: #fff; }
  .dash-head {
    display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
    margin-bottom: 8px;
  }
  .dash-title { font-size: 13px; font-weight: 600; opacity: .9; letter-spacing: .02em; }
  .dash-period { font-size: 12px; opacity: .7; }
  .dash-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 16px;
  }
  .dash-grid.three { grid-template-columns: repeat(3, 1fr); }
  .dash-cell { min-width: 0; }
  .dash-label { font-size: 11px; color: var(--text-mute); margin-bottom: 2px; letter-spacing: .04em; }
  .dash-num {
    font-size: 22px; font-weight: 700; color: var(--text);
    font-variant-numeric: tabular-nums; letter-spacing: -.01em;
    word-break: keep-all; white-space: nowrap;
  }
  .dash-num.small { font-size: 16px; font-weight: 600; }
  .dash-sub { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
  .dash-delta { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 999px; display: inline-block; }
  .dash-delta.up { background: var(--success-soft); color: var(--success); }
  .dash-delta.down { background: var(--danger-soft); color: var(--danger); }
  .dash-delta.flat { background: var(--gray-soft); color: var(--text-sub); }
  .dash-card.primary .dash-delta.up { background: rgba(255,255,255,.22); color: #e0ffe0; }
  .dash-card.primary .dash-delta.down { background: rgba(255,255,255,.22); color: #ffd6d6; }
  .dash-card.primary .dash-delta.flat { background: rgba(255,255,255,.18); color: rgba(255,255,255,.85); }
  /* 棒グラフ（月別）— 棒とラベルを同じ flex セルにまとめて構造的にズレを防止
     高さは JS で px 直書き、絶対配置を撤廃して iOS Safari でも崩れない作り */
  .dash-bars-wrap { display: flex; gap: 4px; margin: 6px 0 4px; }
  .dash-bar-cell { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; align-items: center; }
  .dash-bar-track { width: 100%; height: 140px; display: flex; align-items: flex-end; justify-content: center; }
  .dash-bar-fill {
    width: 22px; max-width: 100%; min-height: 2px; border-radius: 4px 4px 0 0;
    background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
    transition: height .3s;
  }
  .dash-bar-cell.current .dash-bar-fill {
    background: linear-gradient(180deg, var(--accent) 0%, #c54a00 100%);
  }
  .dash-bar-cell.future .dash-bar-fill { background: var(--border); }
  .dash-bar-lab { font-size: 10px; color: var(--text-mute); text-align: center; margin-top: 3px; line-height: 1; }
  .dash-bar-cell.current .dash-bar-lab { color: var(--accent); font-weight: 700; }
  /* 月別表 */
  .dash-month-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 6px; }
  .dash-month-table th, .dash-month-table td {
    padding: 6px 8px; text-align: right; border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  .dash-month-table th { color: var(--text-mute); font-weight: 500; font-size: 11px; }
  .dash-month-table td.label { text-align: left; color: var(--text-sub); }
  .dash-month-table tr.current td { background: #fff8f0; font-weight: 600; }
  /* 前月比/前年比のラベル付きスタック表示 */
  .dash-deltas { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-top: 12px; }
  .dash-delta-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; }
  .dash-delta-item .lab { opacity: .8; }
  .dash-card.primary .dash-delta-item .lab { color: rgba(255,255,255,.85); }
  /* 年切替ボタン */
  .dash-yearbar { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 10px; }
  .dash-yearbar button {
    border: 1px solid var(--border); background: var(--surface); color: var(--text-sub);
    border-radius: 999px; padding: 6px 14px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background .12s, color .12s, border-color .12s;
    font-family: inherit;
  }
  .dash-yearbar button:hover { background: var(--gray-soft); color: var(--text); }
  .dash-yearbar button.active {
    background: var(--primary); color: #fff; border-color: var(--primary);
  }
  /* 通年カードの 今年/前年 並列レイアウト */
  .dash-yoy { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 6px; }
  .dash-yoy-cell {
    background: var(--bg); border-radius: 10px; padding: 10px 12px; min-width: 0;
  }
  .dash-yoy-cell .yoy-label { font-size: 11px; color: var(--text-mute); margin-bottom: 4px; letter-spacing: .04em; }
  .dash-yoy-cell .yoy-gross { font-size: 18px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
  .dash-yoy-cell .yoy-sub { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
  @media (max-width: 480px) {
    .dash-num { font-size: 20px; }
    .dash-num.small { font-size: 14px; }
    .dash-bar-track { height: 110px; }
    .dash-month-table th:nth-child(4), .dash-month-table td:nth-child(4) { display: none; }
    .dash-deltas { flex-direction: column; gap: 6px; align-items: flex-start; }
    .dash-yoy { grid-template-columns: 1fr; }
  }
</style>
</head>

<script>
const API_BASE = ''; // Workers 同一オリジンで /api/* と SPA HTML を提供

var STATE = {
  email: '', userName: '', allowed: false,
  tab: 'shouhin', filter: '', filterLabel: '',
  business: '', businessLabel: '',
  view: 'list', current: null, items: [],
  currentShiireProducts: [],
  workers: [], accounts: [],
  suppliers: [], places: [], categories: [],
  settings: {},
  saleChannels: {}, // { 'メルカリ': {rate:0.1, enabled:true}, ... } — 設定シートL列以降から
  // 商品管理タブの並び順 / 密度（localStorage で永続化）
  shouhinSort: (function(){ try { return localStorage.getItem('sk.shouhinSort') || 'kanri'; } catch(e){ return 'kanri'; } })(),
  density:     (function(){ try { return localStorage.getItem('sk.density') || 'normal'; } catch(e){ return 'normal'; } })(),
  // 管理番号 → AI prefill fields のクライアントキャッシュ
  // 仕入れ選択時に一括プリフェッチして埋める。GET /api/ai/prefill より優先
  aiPrefillCache: new Map()
};
// 起動時に密度クラスを body に反映
(function applyInitialDensity_(){
  try { document.body.classList.toggle('density-compact', STATE.density === 'compact'); } catch(e) {}
})();

// ========== 自動更新（AppSheet風のサイレントポーリング） ==========
const POLL_INTERVAL_MS = 30000; // 30秒
var pollTimer = null;
var isAutoRefreshing = false;

function startPolling() {
  stopPolling();
  pollTimer = setInterval(autoRefresh, POLL_INTERVAL_MS);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}
async function autoRefresh() {
  if (isAutoRefreshing) return;
  if (!STATE.allowed) return;
  if (document.visibilityState !== 'visible') return;
  // モーダル表示中は更新しない（フォーム入力中の事故防止）
  var mask = document.getElementById('modal-mask');
  if (mask && mask.classList.contains('show')) return;
  // 詳細画面・新規作成フォームはローカル編集状態があるので自動更新しない
  // （これがないと「返送/移動報告 新規作成中に勝手に一覧に戻る」現象が起きる）
  if (STATE.view !== 'list') return;
  isAutoRefreshing = true;
  try {
    refreshCounts();
    if (STATE.tab === 'shouhin' || STATE.tab === 'hassou') {
      await renderShouhinList({ silent: true });
    } else if (STATE.tab === 'uriage') {
      await renderUriageDashboard({ silent: true });
    } else if (STATE.tab === 'shiire') {
      await renderShiireList({ silent: true });
    } else if (STATE.tab === 'basho') {
      await renderBashoList();
    } else if (STATE.tab === 'hensou') {
      await renderHensouList();
    } else if (STATE.tab === 'ai') {
      await renderAiList();
    } else if (STATE.tab === 'sagyou') {
      await renderSagyouList();
    } else if (STATE.tab === 'business' && STATE.business) {
      await renderBusinessSheet(STATE.business);
    }
  } catch (err) {
    console.warn('autoRefresh failed', err);
  } finally {
    isAutoRefreshing = false;
  }
}
document.addEventListener('visibilitychange', function(){
  if (document.visibilityState === 'visible') autoRefresh();
});
window.addEventListener('focus', autoRefresh);

// P2 #93: スクロール方向に応じて appbar を隠す/表示する
(function setupAppbarHideOnScroll_(){
  var lastY = 0;
  var ticking = false;
  var DOWN_THRESHOLD = 80; // 下スクロール開始から隠すまでのピクセル
  var hidden = false;
  function update() {
    var y = window.scrollY || window.pageYOffset || 0;
    var dy = y - lastY;
    if (y < 10) {
      // 最上部に戻ったら必ず表示
      if (hidden) { document.body.classList.remove('appbar-hidden'); hidden = false; }
    } else if (dy > 4 && y > DOWN_THRESHOLD) {
      if (!hidden) { document.body.classList.add('appbar-hidden'); hidden = true; }
    } else if (dy < -4) {
      if (hidden) { document.body.classList.remove('appbar-hidden'); hidden = false; }
    }
    lastY = y;
    ticking = false;
  }
  window.addEventListener('scroll', function(){
    if (!ticking) {
      requestAnimationFrame(update);
      ticking = true;
    }
  }, { passive: true });
})();

// 日付フィールドはラベル・余白・入力欄のどこをタップ／クリックしてもカレンダーを開く
// （PC Chrome は入力欄の文字エリアをクリックしても標準ではピッカーが開かないため、
//   row 内のあらゆるクリックで input.showPicker() を呼ぶ）
document.addEventListener('click', function(e){
  var row = e.target.closest && e.target.closest('.field-row');
  if (!row) return;
  var input = row.querySelector('input[type="date"]');
  if (!input) return;
  if (typeof input.showPicker === 'function') {
    try { input.showPicker(); return; } catch (_) { /* fallback to focus */ }
  }

// 設定シートの「販売場所名／手数料率／有効フラグ」3列を行対応で読んだ
// STATE.saleChannels = { 'メルカリ': {rate:0.1, enabled:true}, ... } を最優先で参照する。
// 旧フォーマット（〇〇手数料 という列名に値だけ入っている）も後方互換で残す。
function findFeeRate_(channel) {
  if (!channel) return null;
  var ch = STATE.saleChannels && STATE.saleChannels[channel];
  if (ch && typeof ch.rate === 'number' && !isNaN(ch.rate)) return ch.rate;
  // ---- 旧フォーマット fallback ----
  var settings = STATE.settings || {};
  var keys = Object.keys(settings);
  function tryKey(name) {
    var v = settings[name];
    if (Array.isArray(v) && v.length) {
      var n = parseFloat(v[0]);
      if (!isNaN(n)) return n > 1 ? n / 100 : n;
    }
    return null;
  }
  var exact = tryKey(channel);
  if (exact != null) return exact;
  for (var i = 0; i < keys.length; i++) {
    if (keys[i].indexOf(channel) >= 0) {
      var rate = tryKey(keys[i]);
      if (rate != null) return rate;
    }
  }
  return null;
}

// 販売場所 select の選択肢を STATE.saleChannels（有効フラグTRUEのみ）から動的に返す。
// データ未ロード／空の場合は SALE_CHANNEL_OPTIONS にフォールバック。
function getSaleChannelOptions_() {
  var ch = STATE.saleChannels || {};
  var keys = Object.keys(ch).filter(function(n){ return ch[n] && ch[n].enabled !== false; });
  if (keys.length) return keys;
  return SALE_CHANNEL_OPTIONS;
}

function calcFeeFromSettings_(channel, price) {
  var rate = findFeeRate_(channel);
  var p = Number(price);
  if (rate == null || !p || isNaN(p)) return null;
  return Math.round(p * rate);
}

// 販売場所/販売価格 変更時に手数料を自動再計算（既に手入力で値が入っていても上書き）
// id プリフィックスは 'f_'（詳細フォーム） / 'cf_'（新規作成フォーム）の2系統
function onSaleChannelChange_(el, channelId) {
  var prefix = (channelId || '').slice(0, channelId.indexOf('_') + 1) || 'f_';
  var priceId = prefix + '販売価格'.replace(/[^A-Za-z0-9_]/g, function(ch){ return '_' + ch.charCodeAt(0).toString(16); });
  var feeId   = prefix + '手数料'.replace(/[^A-Za-z0-9_]/g, function(ch){ return '_' + ch.charCodeAt(0).toString(16); });
  var priceEl = document.getElementById(priceId);
  var feeEl = document.getElementById(feeId);
  if (!feeEl) return;
  var fee = calcFeeFromSettings_(el.value, priceEl ? priceEl.value : 0);
  if (fee != null) feeEl.value = String(fee);
}

// 詳細・新規作成フォームに 販売価格 → 手数料 の自動再計算リスナーを仕込む
// 既に price+channel が入っていて 手数料 が空の場合は初期化時にも計算する
function wireFeeAutoCalc_(idPrefix) {
  function fid(name){ return idPrefix + name.replace(/[^A-Za-z0-9_]/g, function(ch){ return '_' + ch.charCodeAt(0).toString(16); }); }
  var priceEl = document.getElementById(fid('販売価格'));
  var channelEl = document.getElementById(fid('販売場所'));
  var feeEl = document.getElementById(fid('手数料'));
  if (!priceEl || !channelEl || !feeEl) return;
  function recalc(){
    var fee = calcFeeFromSettings_(channelEl.value, priceEl.value);
    if (fee != null) {
      feeEl.value = String(fee);
      // 手数料の変更を 計算結果（粗利・利益・利益率）にも即時反映
      try { wireSaleCalcResults_recalc_(idPrefix); } catch(e) {}
    }
  }
  priceEl.addEventListener('input', recalc);
  // 初回: 手数料が空で 販売価格・販売場所 が入っているなら一度計算
  if ((!feeEl.value || feeEl.value === '0') && priceEl.value && channelEl.value) {
    recalc();
  }
}

// ローカル TZ で YYYY-MM-DD の本日文字列を返す（toISOString は UTC なので JST 深夜にずれる）
function todayLocalStr_() {
  var d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

// date input にフォーカスが入ったとき、空なら本日を入れる
// 入力イベントを発火させて、savebar / 派生値の再計算もトリガーする
function onDateFieldFocus_(el) {
  if (el && !el.value) {
    el.value = todayLocalStr_();
    try { el.dispatchEvent(new Event('input', { bubbles: true })); } catch(e) {}
    try { el.dispatchEvent(new Event('change', { bubbles: true })); } catch(e) {}
  }
}

// 計算結果（読取専用）の即時再計算
// 販売価格／送料／手数料／販売日／出品日 の input イベントから呼ばれる
function wireSaleCalcResults_recalc_(idPrefix) {
  function fid(name){ return idPrefix + name.replace(/[^A-Za-z0-9_]/g, function(ch){ return '_' + ch.charCodeAt(0).toString(16); }); }
  var priceEl = document.getElementById(fid('販売価格'));
  var shipEl = document.getElementById(fid('送料'));
  var feeEl = document.getElementById(fid('手数料'));
  var saleDateEl = document.getElementById(fid('販売日'));
  var listingDateEl = document.getElementById(fid('出品日'));

  // フォーム入力をそのまま読む（空文字列は 0 として扱うが、表示判定のため raw も保持）
  var priceRaw = priceEl ? String(priceEl.value || '').trim() : '';
  var shipRaw = shipEl ? String(shipEl.value || '').trim() : '';
  var feeRaw = feeEl ? String(feeEl.value || '').trim() : '';
  var sp = priceRaw === '' ? 0 : Number(priceRaw);
  var ss = shipRaw === '' ? 0 : Number(shipRaw);
  var sf = feeRaw === '' ? 0 : Number(feeRaw);
  if (isNaN(sp)) sp = 0;
  if (isNaN(ss)) ss = 0;
  if (isNaN(sf)) sf = 0;
  var hasPrice = priceRaw !== '';
  var ex = (STATE.current && STATE.current.extra) || {};
  var cost = Number(ex['仕入れ値'] || 0);
  if (isNaN(cost)) cost = 0;

  function setRo(name, text) {
    var el = document.getElementById(fid(name));
    if (el) el.textContent = text;
  }

  // 収支サマリ（販売タブ末尾）も同時更新するヘルパー
  function setSum(id, text, posNeg) {
    var el = document.getElementById(id);
    if (!el) return;
    el.textContent = text;
    if (posNeg !== undefined) {
      el.classList.remove('pos', 'neg');
      if (posNeg !== null) el.classList.add(posNeg ? 'pos' : 'neg');
    }
  }
  function fmtYen(v) { return v != null && v !== '' && !isNaN(Number(v)) ? '¥' + Number(v).toLocaleString('ja-JP') : '—'; }

  // 販売価格は フォーム値で表示（空なら "—"）。
  // 旧コードは `sp || ex['販売価格']` で空入力時に古い保存値にフォールバックしていたが、
  // それだと「販売データ削除直後にサマリが古い 1780 のまま」になるバグの原因だった。
  setSum('sum-sale-price', hasPrice ? '¥' + sp.toLocaleString('ja-JP') : '—');
  setSum('sum-cost', fmtYen(cost || ex['仕入れ値']));

  // 派生値は常に再計算する。販売価格 0/空でも 粗利=-送料-手数料、利益=粗利-仕入れ値 を表示。
  // 旧コードは `if (sp > 0)` でガードしていたため、途中入力の負値が消えずに残るバグがあった。
  var gross = sp - ss - sf;
  var profit = gross - cost;
  setRo('粗利', '¥' + gross.toLocaleString('ja-JP'));
  setRo('利益', '¥' + profit.toLocaleString('ja-JP'));
  setSum('sum-profit', '¥' + profit.toLocaleString('ja-JP'), profit >= 0);
  if (sp > 0) {
    var rate = (profit / sp * 100).toFixed(1) + '%';
    setRo('利益率', rate);
    setSum('sum-profit-rate', rate, profit >= 0);
  } else {
    // 販売価格 0 だと利益率は無限大なので "—" 表示にする
    setRo('利益率', '—');
    setSum('sum-profit-rate', '—', null);
  }
  // 在庫日数: 仕入れ日 → 販売日（なければ今日）
  var purchaseDate = ex['仕入れ日'] || '';
  if (purchaseDate) {
    var saleDateStr = (saleDateEl && saleDateEl.value) || '';
    var start = new Date(purchaseDate);
    var end = saleDateStr ? new Date(saleDateStr) : new Date();
    if (!isNaN(start.getTime()) && !isNaN(end.getTime())) {
      var days = Math.floor((end.getTime() - start.getTime()) / 86400000);
      if (days >= 0) {
        setRo('在庫日数', days + '日');
        setSum('sum-stockdays', days + '日');
      }
    }
  }
  // リードタイム: 仕入れ日 → 出品日
  var listingDateStr = (listingDateEl && listingDateEl.value) || ex['出品日'] || '';
  if (purchaseDate && listingDateStr) {
    var a = new Date(purchaseDate);
    var b = new Date(listingDateStr);
    if (!isNaN(a.getTime()) && !isNaN(b.getTime())) {
      var ld = Math.floor((b.getTime() - a.getTime()) / 86400000);
      if (ld >= 0) {
        setRo('リードタイム', ld + '日');
        setSum('sum-leadtime', ld + '日');
      }
    }
  }
}

// 計算結果（読取専用）の input リスナーを 1 回だけ仕込む
function wireSaleCalcResults_(idPrefix) {
  function fid(name){ return idPrefix + name.replace(/[^A-Za-z0-9_]/g, function(ch){ return '_' + ch.charCodeAt(0).toString(16); }); }
  ['販売価格', '送料', '手数料', '販売日', '出品日'].forEach(function(name){
    var el = document.getElementById(fid(name));
    if (el) el.addEventListener('input', function(){ wireSaleCalcResults_recalc_(idPrefix); });
  });
  // 初期表示でも一度計算（DOM 側の readonly div を最新状態に）
  wireSaleCalcResults_recalc_(idPrefix);
}

// マスター取得：失敗しても UI は壊さない
async function loadMasters() {
  const tasks = [
    ['/api/master/workers',    'workers'],
    ['/api/master/accounts',   'accounts'],
    ['/api/master/suppliers',  'suppliers'],
    ['/api/master/places',     'places'],
    ['/api/master/categories', 'categories'],
  ];
  await Promise.all(tasks.map(async ([url, key]) => {
    try {
      const r = await api(url);
      STATE[key] = Array.isArray(r.items) ? r.items : [];
    } catch (err) {
      console.warn(key + ' load failed', err);
    }
  }));
  // 設定シート（複数列マスタ：状態/発送方法/カラー1/カテゴリ2/カテゴリ3 等）
  try {
    const r = await api('/api/master/settings');
    STATE.settings = (r.items && typeof r.items === 'object' && !Array.isArray(r.items)) ? r.items : {};
    STATE.saleChannels = (r.saleChannels && typeof r.saleChannels === 'object' && !Array.isArray(r.saleChannels)) ? r.saleChannels : {};
  } catch (err) {
    console.warn('settings load failed', err);
  }
}

// 自分のメール → 作業者マスターの「名前」を解決して STATE.userName に格納
// 業務メニュー（仕入れ数報告 / 経費申請 / 報酬確認）で「自分の行」を絞り込むために必須
// LocalStorage で手動選択（業務メニュー用）の名前をオーバーライド可能。
async function resolveSelfName_() {
  if (!STATE.email) return;
  try {
    const r = await api('/api/sagyousha?months=1');
    const email = String(STATE.email || '').trim().toLowerCase();
    const items = Array.isArray(r.items) ? r.items : [];
    STATE.allWorkers = items;
    const me = items.find(function(w){
      return (String(w.email1 || '').trim().toLowerCase() === email)
          || (String(w.email2 || '').trim().toLowerCase() === email);
    });
    var resolved = me ? String(me.name || '') : '';
    // 手動オーバーライド（管理者がメンバーになりすまして確認する用途／メール登録漏れの暫定対応）
    var manual = '';
    try { manual = String(localStorage.getItem('shiire-kanri:userName') || '').trim(); } catch(e) {}
    if (manual && items.find(function(w){ return String(w.name || '') === manual; })) {
      STATE.userName = manual;
      STATE.userNameOverride = (manual !== resolved);
    } else {
      STATE.userName = resolved;
      STATE.userNameOverride = false;
    }
    STATE.isAdmin = !!(r.currentUser && r.currentUser.isAdmin);
    console.info('[resolveSelfName_] email=' + email + ' resolved=' + (resolved || '(none)') + ' applied=' + (STATE.userName || '(none)') + ' workers=' + items.length);
  } catch (err) {
    console.warn('resolveSelfName_ failed', err);
    STATE.userName = '';
    STATE.allWorkers = [];
  }
}

// ========== API ==========
async function api(path, opts) {
  opts = opts || {};
  const res = await fetch(API_BASE + path, {
    method: opts.method || 'GET',
    credentials: 'include',
    headers: opts.body ? { 'Content-Type': 'application/json' } : {},
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  let json;
  try { json = await res.json(); } catch { json = { ok: false, message: 'invalid response' }; }
  if (!res.ok || !json.ok) {
    const msg = json.message || json.error || ('http ' + res.status);
    throw new Error(msg);
  }
  return json;
}

// ========== 起動 ==========
// number 入力にフォーカスがあるときのマウスホイール操作で値が動かないように抑止
// (ページスクロールしようとして数値が変わる事故を防止)
document.addEventListener('wheel', function(e){
  var t = e.target;
  if (t && t.tagName === 'INPUT' && t.type === 'number' && document.activeElement === t) {
    e.preventDefault();
  }
}, { passive: false });

window.addEventListener('DOMContentLoaded', async function(){
  try {
    const me = await api('/api/me');
    STATE.email = (me.user && me.user.email) || '';
    STATE.allowed = !!STATE.email;
    document.getElementById('drawer-email').textContent = STATE.email || '未取得';
    if (!STATE.allowed) { renderDenied(); return; }
    // マスタ取得は一覧表示には不要なのでバックグラウンドで実行（フォーム/詳細を開く時に await）
    STATE.mastersPromise = loadMasters();
    // 自分の名前は業務メニューで必要。バックグラウンドで取得しつつ、業務タブ描画時には await
    STATE.userNamePromise = resolveSelfName_();
    // 初期エントリを「list」状態として履歴にアンカー
    // （これがないと最初の戻るで認証画面まで抜けてしまう）
    replaceListState_();
    updateSearchPlaceholder_();
    render();
    refreshCounts();
    startPolling();
  } catch (err) {
    toast('認証エラー: ' + err.message, 'error');
    renderDenied();
  }
});

async function refreshCounts() {
  try {
    const res = await api('/api/products/counts');
    const c = res.counts || {};
    STATE.counts = c;
    Object.keys(c).forEach(function(k){
      var el = document.getElementById('cnt-' + k);
      if (el) el.textContent = String(c[k]);
      // chips の件数バッジも更新
      document.querySelectorAll('.chip[data-filter="' + k + '"] .chip-count').forEach(function(b){
        b.textContent = String(c[k]);
      });
    });
  } catch (err) {
    // 件数失敗は致命ではないので静かにログだけ
    console.warn('counts failed', err);
  }
}

// appbar 左上のボタン: 一覧では「≡（メニュー）」、詳細では「← 戻る」に切り替える
// （詳細では右下の戻る FAB と savebar が干渉するため、戻る操作は appbar に集約する）
function setAppbarMode_(mode) {
  var btn = document.getElementById('appbar-menu-btn');
  if (!btn) return;
  // 詳細画面では検索バーを隠す（appbar の高さを 102→52 に縮め、sec-tabs の sticky 位置と一致させる）
  var search = document.getElementById('topbar-search');
  if (mode === 'back') {
    btn.textContent = '←';
    btn.setAttribute('aria-label', '戻る');
    btn.setAttribute('data-mode', 'back');
    if (search) search.hidden = true;
    document.body.classList.add('view-detail');
  } else {
    btn.textContent = '≡';
    btn.setAttribute('aria-label', 'メニュー');
    btn.setAttribute('data-mode', 'menu');
    if (search) search.hidden = false;
    document.body.classList.remove('view-detail');
  }
}
function appbarPrimaryAction_() {
  var btn = document.getElementById('appbar-menu-btn');
  if (btn && btn.getAttribute('data-mode') === 'back') {
    backToList();
  } else {
    toggleDrawer();
  }
}

// 商品管理タブの並び替え / 密度メニュー
var SHOUHIN_SORT_LABELS = { kanri: '管理番号', shiire: '仕入れ日', brand: 'ブランド' };
function openSortDensityMenu_(ev) {
  if (ev) ev.stopPropagation();
  // 既存メニューがあれば閉じる
  var existing = document.getElementById('sort-density-menu');
  if (existing) { existing.remove(); return; }
  var btn = ev && ev.currentTarget;
  var rect = btn ? btn.getBoundingClientRect() : { top: 100, right: window.innerWidth - 16 };
  var top = rect.bottom + 6 + window.scrollY;
  var right = Math.max(8, window.innerWidth - rect.right);
  var sortRows = ['kanri','shiire','brand'].map(function(k){
    var lbl = SHOUHIN_SORT_LABELS[k];
    var on = STATE.shouhinSort === k;
    return '<button type="button" class="menu-item' + (on ? ' on' : '') + '"' +
      ' onclick="setShouhinSort_(\'' + k + '\')">' + (on ? '● ' : '○ ') + esc(lbl) + '</button>';
  }).join('');
  var densRows = ['normal','compact'].map(function(k){
    var lbl = k === 'compact' ? 'コンパクト' : '通常';
    var on = STATE.density === k;
    return '<button type="button" class="menu-item' + (on ? ' on' : '') + '"' +
      ' onclick="setDensity_(\'' + k + '\')">' + (on ? '● ' : '○ ') + esc(lbl) + '</button>';
  }).join('');
  var html = '<div id="sort-density-menu" class="popover-menu" style="top:' + top + 'px; right:' + right + 'px;">' +
    '<div class="menu-section-title">並び順</div>' + sortRows +
    '<div class="menu-section-title">密度</div>' + densRows +
  '</div>';
  document.body.insertAdjacentHTML('beforeend', html);
  setTimeout(function(){
    document.addEventListener('click', closeSortDensityMenu_, { once: true });
  }, 0);
}
function closeSortDensityMenu_() {
  var m = document.getElementById('sort-density-menu');
  if (m) m.remove();
}
function setShouhinSort_(key) {
  STATE.shouhinSort = key;
  try { localStorage.setItem('sk.shouhinSort', key); } catch(e) {}
  closeSortDensityMenu_();
  // チップラベルを更新するため bar を再描画 + リスト再描画
  updateChipsBar_();
  if (STATE.tab === 'shouhin' || STATE.tab === 'hassou') renderShouhinList({ silent: true });
}
function setDensity_(key) {
  STATE.density = key;
  try { localStorage.setItem('sk.density', key); } catch(e) {}
  document.body.classList.toggle('density-compact', key === 'compact');
  closeSortDensityMenu_();
  updateChipsBar_();
}

// 並び順を items に適用（in-place ソートはせず新配列を返す）
function applyShouhinSort_(items) {
  if (!items || items.length < 2) return items;
  var key = STATE.shouhinSort || 'kanri';
  var arr = items.slice();
  if (key === 'shiire') {
    // 仕入れ日 = shiireId 降順（IDが新しい仕入れほど後ろ。サーバ kanri 順を 2nd キー）
    arr.sort(function(a,b){
      var sa = String(a.shiireId || ''), sb = String(b.shiireId || '');
      if (sa !== sb) return sb.localeCompare(sa, 'ja');
      return String(b.kanri || '').localeCompare(String(a.kanri || ''), 'ja');
    });
  } else if (key === 'brand') {
    arr.sort(function(a,b){
      var ba = String(a.brand || '〜'), bb = String(b.brand || '〜');
      if (ba !== bb) return ba.localeCompare(bb, 'ja');
      return String(b.kanri || '').localeCompare(String(a.kanri || ''), 'ja');
    });
  }
  // kanri はサーバ側で既に自然数ソート済みなので、そのまま返す
  return arr;
}
// 商品管理タブのみ chips-bar を表示
// 再描画時に横スクロール位置がリセットされないよう scrollLeft を保持＋アクティブチップを画面内に維持
function updateChipsBar_() {
  var bar = document.getElementById('chips-bar');
  if (!bar) return;
  if (STATE.view === 'detail' || STATE.tab !== 'shouhin') {
    bar.innerHTML = '';
    bar.hidden = true;
    document.body.classList.remove('has-chips');
    return;
  }
  var prevScrollLeft = bar.scrollLeft || 0;
  bar.innerHTML = shouhinChipsHtml_();
  bar.hidden = false;
  document.body.classList.add('has-chips');
  // 直前のスクロール位置を復元
  bar.scrollLeft = prevScrollLeft;
  // アクティブチップが見切れていたら可視範囲へ寄せる（左端には戻さない）
  var active = bar.querySelector('.chip.active');
  if (active) {
    var ar = active.getBoundingClientRect();
    var br = bar.getBoundingClientRect();
    if (ar.right > br.right) {
      bar.scrollLeft += (ar.right - br.right) + 12;
    } else if (ar.left < br.left) {
      bar.scrollLeft -= (br.left - ar.left) + 12;
    }
  }
}
// ========== 履歴管理（戻るボタンを SPA 内ナビゲーションに使う） ==========
// 認証画面に抜けないよう、すべてのナビゲーション操作で history.pushState する。
// popstate では event.state を見て view/tab/filter/filterLabel/kanri を復元する。
function currentListState_() {
  return {
    view: 'list',
    tab: STATE.tab,
    filter: STATE.filter,
    filterLabel: STATE.filterLabel
  };
}
function pushListState_() {
  try { history.pushState(currentListState_(), '', ''); } catch(e) {}
}
function replaceListState_() {
  try { history.replaceState(currentListState_(), '', ''); } catch(e) {}
}

function selectChip_(filter, label) {
  STATE.filter = filter;
  STATE.filterLabel = filter ? label : '';
  STATE.view = 'list';
  document.querySelectorAll('.drawer-item').forEach(function(d){
    d.classList.toggle('active', d.getAttribute('data-filter') === filter);
  });
  pushListState_();
  render();
}

// topbar-search に常時表示。後方互換のため toggleSearch は残す（フォーカスのみ）
function toggleSearch() {
  var input = document.getElementById('search');
  if (input) input.focus();
}
function clearSearch_() {
  var input = document.getElementById('search');
  if (!input) return;
  input.value = '';
  input.dispatchEvent(new Event('input'));
  input.focus();
}
function syncSearchClearVisibility_() {
  var wrap = document.getElementById('topbar-search');
  var input = document.getElementById('search');
  if (!wrap || !input) return;
  wrap.classList.toggle('has-value', !!(input.value || '').length);
}
var searchTimer = null;
document.getElementById('search').addEventListener('input', function(){
  syncSearchClearVisibility_();
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function(){
    render();
    // 検索時はトップへ戻す（結果の先頭から見せる）
    try { window.scrollTo({ top: 0, behavior: 'auto' }); } catch(e) { window.scrollTo(0,0); }
  }, 250);
});

function shiireCardHtml(it) {
  const planned = Number(it.planned || 0);
  const registered = Number(it.registered || 0);
  const progressLabel = planned > 0 ? (registered + '/' + planned) : String(registered);
  const progressDone = planned > 0 && registered >= planned;
  const pct = planned > 0 ? Math.min(100, Math.round((registered / planned) * 100)) : 0;
  const progClass = 'shiire-progress gradient' + (progressDone ? ' done' : '');
  return '<div class="shiire-card" onclick="openShiireDetail(\'' + esc(it.shiireId).replace(/\'/g,"\\'") + '\')">' +
    '<div class="shiire-row1">' +
      '<span class="shiire-date">' + esc(it.date || '—') + '</span>' +
      (it.place ? '<span class="shiire-place">' + esc(it.place) + '</span>' : '') +
      '<span class="' + progClass + '" style="--progress-pct: ' + pct + '%"><span>登録 ' + esc(progressLabel) + '</span></span>' +
    '</div>' +
    '<div class="shiire-row2">' +
      '<div class="shiire-cell"><span class="lbl">金額</span><span class="val">' + fmtYen(it.amount) + '</span></div>' +
      '<div class="shiire-cell"><span class="lbl">送料</span><span class="val">' + fmtYen(it.shipping) + '</span></div>' +
      '<div class="shiire-cell"><span class="lbl">商品原価</span><span class="val">' + fmtYen(it.cost) + '</span></div>' +
    '</div>' +
  '</div>';
}

function fmtYen(v) {
  if (v === '' || v === null || v === undefined) return '—';
  var n = Number(v);
  if (isNaN(n)) return esc(String(v));
  return '¥' + n.toLocaleString('ja-JP');
}

async function openShiireDetail(shiireId) {
  var c = document.getElementById('content');
  document.getElementById('appbar-title').textContent = shiireId;
  c.innerHTML = '<div class="loading">読み込み中…</div>';
  try {
    const productsRes = await api('/api/purchases/' + encodeURIComponent(shiireId) + '/products');
    const items = productsRes.items || [];
    // 仕入れメタ情報（category / planned）を取得して割り当て管理番号を表示
    var category = SHIIRE_CATEGORY_MAP[shiireId] || '';
    var planned = 0;
    if (!category) {
      try {
        const purRes = await api('/api/purchases?limit=2000');
        (purRes.items || []).forEach(function(p){
          SHIIRE_CATEGORY_MAP[p.shiireId] = p.category || '';
          if (p.shiireId === shiireId) planned = Number(p.planned || 0);
        });
        category = SHIIRE_CATEGORY_MAP[shiireId] || '';
      } catch (e) { /* ignore */ }
    } else {
      try {
        const purRes = await api('/api/purchases?limit=2000');
        (purRes.items || []).forEach(function(p){
          if (p.shiireId === shiireId) planned = Number(p.planned || 0);
        });
      } catch (e) { /* ignore */ }
    }
    var rangeHtml = '';
    if (category && planned > 0) {
      try {
        const next = await api('/api/kanri/next?category=' + encodeURIComponent(category));
        const prefix = next.prefix || ('z' + category);
        // 既に登録済の商品があれば、その最小〜最大を実績として表示。残りは予約として表示
        var registered = items.length;
        var remaining = Math.max(0, planned - registered);
        var startN = Number(next.maxN || 0) + 1;
        var endN = startN + remaining - 1;
        rangeHtml = '<div class="meta" style="background:#f0f9ff;border-left:3px solid var(--primary);padding:6px 10px;border-radius:4px;margin-top:6px;">' +
          '割り当て管理番号（残り ' + remaining + '点）: <strong>' +
          (remaining > 0 ? esc(prefix + startN) + ' 〜 ' + esc(prefix + endN) : '完了') +
          '</strong></div>';
      } catch (e) { /* ignore */ }
    }
    const head = '<div class="product-info"><h2>仕入れ ' + esc(shiireId) + '</h2>' +
      '<div class="meta">紐づく商品: ' + items.length + (planned ? ' / ' + planned : '') + ' 点</div>' +
      rangeHtml +
      '</div>';
    const body = items.length
      ? items.map(cardHtml).join('')
      : '<div class="empty">商品が登録されていません</div>';
    const fab = '<div class="fab-stack">' +
      '<button class="fab gray" onclick="selectTab(\'shiire\')" title="仕入れ一覧へ">←</button>' +
      '<button class="fab" onclick="openCreateProductModal(\'' + esc(shiireId).replace(/\'/g,"\\'") + '\')" title="新規商品">＋</button>' +
    '</div>';
    STATE.currentShiireProducts = items;
    c.innerHTML = head + body + fab;
  } catch (err) {
    c.innerHTML = '<div class="empty" style="color:#c62828">' + esc(err.message) + '</div>';
  }
}

// 商品一覧の stale-while-revalidate キャッシュ
// キー = tab|filter|q ／ 値 = { items, ts }
var LIST_CACHE = Object.create(null);

// 商品管理以外のタブ向け stale-while-revalidate キャッシュ
// キー = tab[|sub] ／ 値 = { data, ts }
// 2回目以降のタブ切替時にキャッシュを即時描画 → 裏で再取得して差分更新
var TAB_CACHE = Object.create(null);
function tabCacheGuard_(tab) {
  // 描画中にユーザーが他タブへ移動していたら paint をスキップ
  return STATE.tab === tab && STATE.view === 'list';
}
function listCacheKey_() {
  var q = (document.getElementById('search') && document.getElementById('search').value || '').trim();
  return (STATE.tab || '') + '|' + (STATE.filter || '') + '|' + q;
}
// 楽観的に保存した変更を全キャッシュエントリに反映（一覧バッジを即座に更新）
function patchListCache_(kanri, fields) {
  Object.keys(LIST_CACHE).forEach(function(key){
    var entry = LIST_CACHE[key];
    if (!entry || !Array.isArray(entry.items)) return;
    entry.items.forEach(function(it){
      if (it.kanri !== kanri) return;
      if (fields['販売日']) it.saleDate = fields['販売日'];
      if (fields['販売価格']) it.salePrice = fields['販売価格'];
      if (fields['ステータス']) it.status = fields['ステータス'];
      if (fields['採寸日']) { it.measuredAt = fields['採寸日']; }
    });
  });
}

// Day 2: GAS が返す record（保存後の最新行 = 派生値含む）で、現 item を更新したコピーを返す。
// 旧実装は save 後に /api/products/:kanri を再 fetch していたが、これを置き換えて 1 往復削減。
// extra（シート全列）を上書き + 主要なトップレベルフィールド（status/salePrice/etc）も同期する。
function mergeRecordIntoItem_(item, record) {
  var base = item || {};
  var prevExtra = base.extra || {};
  // record をベースに、record に無いキーは prevExtra から残す（record は全列を含むはずだが念のため）
  var extra = Object.assign({}, prevExtra, record);
  function num(v){ var n = Number(v); return Number.isFinite(n) ? n : 0; }
  function strOrNull(v){ return (v === '' || v === null || v === undefined) ? null : String(v); }
  return {
    kanri: base.kanri,
    shiireId: base.shiireId,
    worker: record['作業者'] || base.worker,
    status: String(record['ステータス'] || base.status || ''),
    rawStatus: String(record['ステータス'] || base.rawStatus || base.status || ''),
    state: String(record['状態'] || base.state || ''),
    brand: String(record['ブランド'] || base.brand || ''),
    size: String(record['メルカリサイズ'] || base.size || ''),
    color: String(record['カラー'] || base.color || ''),
    measure: base.measure,
    measuredAt: record['採寸日'] || base.measuredAt,
    measuredBy: record['採寸者'] || base.measuredBy,
    saleDate: strOrNull(record['販売日']) || base.saleDate,
    salePlace: strOrNull(record['販売場所']) || base.salePlace,
    salePrice: record['販売価格'] !== undefined ? num(record['販売価格']) : base.salePrice,
    saleShipping: record['送料'] !== undefined ? num(record['送料']) : base.saleShipping,
    saleFee: record['手数料'] !== undefined ? num(record['手数料']) : base.saleFee,
    saleTs: base.saleTs,
    extra: extra,
    row: base.row
  };
}

function paintUriageDashboard_(data) {
  if (!tabCacheGuard_('uriage')) return;
  var c = document.getElementById('content');
  if (!data) { c.innerHTML = '<div class="empty">データがありません</div>'; return; }
  try { paintUriageDashboardInner_(data, c); }
  catch (err) {
    console.error('[uriage paint]', err, data);
    c.innerHTML = '<div class="empty" style="color:#c62828">グラフ描画エラー: ' + esc(err.message || String(err)) + '</div>' +
      '<pre style="font-size:10px;overflow:auto;max-height:300px;background:#f5f5f5;padding:8px;border-radius:6px">' +
      esc(JSON.stringify({ now: data.now, monthlyYear: data.monthlyYear, availableYears: data.availableYears, monthlyLen: (data.monthly||[]).length }, null, 2)) +
      '</pre>';
  }
}

function paintUriageDashboardInner_(data, c) {
  var thisM = data.thisMonth || {};
  var lastM = data.lastMonth || {};
  var thisY = data.thisYear || {};
  var lastY = data.lastYear || {};
  var lastYTd = data.lastYearYtd || {};
  var monthly = data.monthly || [];
  var nowYear = (data.now && data.now.year) || (new Date().getFullYear());
  var nowMonth = (data.now && data.now.month) || (new Date().getMonth() + 1);
  var monthlyYear = data.monthlyYear || nowYear;
  var availableYears = Array.isArray(data.availableYears) && data.availableYears.length ? data.availableYears.slice() : [monthlyYear];
  // 防御策: API が古いキャッシュ等で今年を含まない場合でもフロントで補正
  if (availableYears.indexOf(nowYear) === -1) availableYears.unshift(nowYear);
  availableYears.sort(function(a, b){ return Number(b) - Number(a); });

  function deltaHtml(curr, prev, suffix) {
    var c1 = Number(curr || 0); var p1 = Number(prev || 0);
    // 双方ゼロ: 未集計
    if (!c1 && !p1) return '<span class="dash-delta flat">—</span>';
    // 前期間ゼロ＝比較不能。「実績なし」は good/bad の色を持たせず flat（グレー）に
    if (!p1) return '<span class="dash-delta flat">' + (suffix || '') + '実績なし</span>';
    // 当期間ゼロ＝月初〜集計中。-100% を出すと誤解を招くので「—（集計中）」へ
    if (!c1) return '<span class="dash-delta flat">—（集計中）</span>';
    var pct = ((c1 - p1) / p1) * 100;
    var sign = pct > 0 ? '+' : '';
    var cls = pct > 1 ? 'up' : (pct < -1 ? 'down' : 'flat');
    return '<span class="dash-delta ' + cls + '">' + sign + pct.toFixed(1) + '%</span>';
  }

  // 月別棒グラフの最大値
  var maxGross = monthly.reduce(function(a, m){ return Math.max(a, Number(m.gross || 0)); }, 0);
  if (maxGross <= 0) maxGross = 1;

  function periodCardHtml_(title, period, d, opts) {
    opts = opts || {};
    var cls = opts.primary ? 'dash-card primary' : 'dash-card';
    return '' +
      '<div class="' + cls + '">' +
        '<div class="dash-head">' +
          '<div class="dash-title">' + esc(title) + '</div>' +
          '<div class="dash-period">' + esc(period) + '</div>' +
        '</div>' +
        '<div class="dash-grid">' +
          '<div class="dash-cell">' +
            '<div class="dash-label">売上</div>' +
            '<div class="dash-num">' + fmtYen(d.gross) + '</div>' +
          '</div>' +
          '<div class="dash-cell">' +
            '<div class="dash-label">純売上（手数料・送料控除後）</div>' +
            '<div class="dash-num">' + fmtYen(d.net) + '</div>' +
          '</div>' +
          '<div class="dash-cell">' +
            '<div class="dash-label">件数</div>' +
            '<div class="dash-num small">' + Number(d.count || 0).toLocaleString('ja-JP') + ' 件</div>' +
          '</div>' +
          '<div class="dash-cell">' +
            '<div class="dash-label">平均単価</div>' +
            '<div class="dash-num small">' + fmtYen(d.avg) + '</div>' +
          '</div>' +
          '<div class="dash-cell">' +
            '<div class="dash-label">手数料</div>' +
            '<div class="dash-num small">' + fmtYen(d.fee) + '</div>' +
          '</div>' +
          '<div class="dash-cell">' +
            '<div class="dash-label">送料</div>' +
            '<div class="dash-num small">' + fmtYen(d.shipping) + '</div>' +
          '</div>' +
        '</div>' +
        (opts.deltasHtml ? opts.deltasHtml : '') +
      '</div>';
  }

  // 今月カード: 売上/純売上 それぞれの前月比をラベル付きで縦方向にも崩せる形で
  var thisDeltas =
    '<div class="dash-deltas">' +
      '<span class="dash-delta-item"><span class="lab">売上 前月比</span> ' + deltaHtml(thisM.gross, lastM.gross, '前月') + '</span>' +
      '<span class="dash-delta-item"><span class="lab">純売上 前月比</span> ' + deltaHtml(thisM.net, lastM.net, '前月') + '</span>' +
    '</div>';

  // 通年カード: 今年(YTD) と 前年通年 + 前年同期 の3並列
  var lyEndStr = lastYTd.ytdEnd ? (lastY.year + '/' + (lastYTd.ytdEnd || '').replace('-','/')) : '';
  var yoyHtml =
    '<div class="dash-yoy">' +
      '<div class="dash-yoy-cell">' +
        '<div class="yoy-label">' + esc(nowYear + '年（年初〜現在）') + '</div>' +
        '<div class="yoy-gross">' + fmtYen(thisY.gross) + '</div>' +
        '<div class="yoy-sub">' + Number(thisY.count||0) + '件 ／ 純 ' + fmtYen(thisY.net) + '</div>' +
      '</div>' +
      '<div class="dash-yoy-cell">' +
        '<div class="yoy-label">' + esc((nowYear - 1) + '年 通年') + '</div>' +
        '<div class="yoy-gross">' + fmtYen(lastY.gross) + '</div>' +
        '<div class="yoy-sub">' + Number(lastY.count||0) + '件 ／ 純 ' + fmtYen(lastY.net) + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="dash-deltas">' +
      '<span class="dash-delta-item"><span class="lab">前年同期比（〜' + esc(lyEndStr) + '）</span> ' + deltaHtml(thisY.gross, lastYTd.gross, '前年同期') + '</span>' +
      '<span class="dash-delta-item"><span class="lab">前年同期 売上</span> <b style="font-variant-numeric:tabular-nums">' + fmtYen(lastYTd.gross) + '</b></span>' +
    '</div>';

  // 月別棒グラフ（任意の年。current 強調は monthlyYear==nowYear のときだけ）
  // 棒とラベルを同じ cell にまとめて構造的に左右ズレを防止。高さは px 直書き
  var CHART_H = (window.matchMedia && window.matchMedia('(max-width: 480px)').matches) ? 110 : 140;
  var highlightCurrent = (Number(monthlyYear) === Number(nowYear));
  var bars = monthly.map(function(m){
    var pct = (Number(m.gross || 0) / maxGross) * 100;
    var isCurrent = highlightCurrent && m.month === nowMonth;
    var isFuture = highlightCurrent && m.month > nowMonth;
    var cls = 'dash-bar-cell' + (isCurrent ? ' current' : '') + (isFuture && Number(m.gross||0) === 0 ? ' future' : '');
    var heightPx = Math.max(2, Math.round(pct * CHART_H / 100));
    var title = m.yyyymm + '：' + fmtYen(m.gross) + '（' + Number(m.count||0) + '件）';
    return '<div class="' + cls + '" title="' + esc(title) + '">' +
             '<div class="dash-bar-track"><div class="dash-bar-fill" style="height:' + heightPx + 'px"></div></div>' +
             '<div class="dash-bar-lab">' + m.month + '月</div>' +
           '</div>';
  }).join('');

// 発送期限 = 販売日 + SHIP_DEADLINE_DAYS（AppSheet 同様の運用）
var SHIP_DEADLINE_DAYS = 3;
function shipDeadlineHtml_(it) {
  if (it.status !== '発送待ち') return '';
  if (!it.saleDate) return '';
  var sd = new Date(it.saleDate);
  if (isNaN(sd.getTime())) return '';
  var due = new Date(sd.getTime() + SHIP_DEADLINE_DAYS * 86400000);
  var dueStr = due.getFullYear() + '-' + String(due.getMonth()+1).padStart(2,'0') + '-' + String(due.getDate()).padStart(2,'0');
  var today = new Date(); today.setHours(0,0,0,0);
  var overdue = due.getTime() < today.getTime();
  var diffDays = Math.floor((due.getTime() - today.getTime()) / 86400000);
  var label;
  if (overdue) label = '期限超過 ' + dueStr + '（' + Math.abs(diffDays) + '日経過）';
  else if (diffDays === 0) label = '本日が期限 ' + dueStr;
  else label = '発送期限 ' + dueStr + '（あと' + diffDays + '日）';
  var cls = overdue ? ' overdue' : (diffDays === 0 ? ' today' : '');
  return '<div class="card-deadline' + cls + '">⏰ ' + esc(label) + '</div>';
}
