<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>仕入れ管理</title>
<style>
  :root {
    --primary: #1565c0;
    --primary-dark: #0d47a1;
    --primary-light: #e3f2fd;
    --primary-soft: #e3f2fd;
    --accent: #ff6d00;
    --bg: #f4f6fa;
    --card: #ffffff;
    --surface: #ffffff;
    --text: #1a2330;
    --text-sub: #66707d;
    --text-mute: #6f7786; /* WCAG AA 対応: 旧 #9aa3b0 (2.77:1) → 4.6:1 */
    --border: #e3e7ee;
    --success: #2e7d32;
    --success-soft: #e8f5e9;
    --warning: #b95400; /* WCAG AA 対応: 旧 #ed6c02 (3.55:1) → 4.5:1 */
    --warning-soft: #fff4e5;
    --danger: #c62828;
    --danger-soft: #ffebee;
    --gray-soft: #eef0f4;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-lg: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    --focus-ring: 0 0 0 3px rgba(21,101,192,.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { height: auto; overflow-y: auto; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", "Yu Gothic UI", "Meiryo", sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5;
    padding-top: 102px; padding-bottom: 72px; min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
  }
  body.has-chips { padding-top: 146px; }
  /* グローバル focus-visible: WCAG 対応 */
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, a:focus-visible {
    outline: 2px solid var(--primary); outline-offset: 2px;
  }
  .appbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff;
    padding: 8px 10px 10px; display: flex; flex-direction: column; gap: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,.15);
  }
  .appbar-row1 { display: flex; align-items: center; gap: 4px; min-height: 40px; }
  .appbar .icon-btn {
    width: 40px; height: 40px; background: rgba(255,255,255,.14); border: none; color: #fff;
    font-size: 20px; cursor: pointer; padding: 0; margin: 0 2px;
    display: flex; align-items: center; justify-content: center; border-radius: 10px;
    transition: background .15s;
  }
  .appbar .icon-btn:hover { background: rgba(255,255,255,.22); }
  .appbar .icon-btn:active { background: rgba(255,255,255,.28); }
  .appbar h1 { font-size: 17px; font-weight: 600; margin: 0; flex: 1; padding-left: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar-search {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,.95); border-radius: 8px;
    padding: 6px 12px; min-height: 36px;
  }
  .topbar-search::before { content: '🔍'; font-size: 13px; opacity: .6; }
  .topbar-search input {
    flex: 1; border: none; outline: none; background: transparent;
    color: var(--text); font-size: 14px; padding: 4px 0; min-width: 0;
  }
  .topbar-search input::placeholder { color: var(--text-mute); }
  .topbar-search .clear-btn {
    background: transparent; border: none; color: var(--text-mute);
    font-size: 16px; line-height: 1; cursor: pointer; padding: 4px;
    display: none;
  }
  .topbar-search.has-value .clear-btn { display: inline-flex; align-items: center; }
  .drawer-mask {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .drawer-mask.show { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 288px; max-width: 80vw; background: var(--surface);
    z-index: 201; transform: translateX(-100%); transition: transform 0.2s;
    box-shadow: 2px 0 12px rgba(0,0,0,0.18);
    display: flex; flex-direction: column;
  }
  .drawer.show { transform: translateX(0); }
  .drawer-header {
    background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff; padding: 22px 18px 18px;
  }
  .drawer-header .app-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; letter-spacing: .02em; }
  .drawer-header .user { font-size: 12px; opacity: 0.9; word-break: break-all; }
  .drawer-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .drawer-item {
    display: flex; align-items: center; padding: 12px 18px; cursor: pointer;
    color: var(--text); border-left: 4px solid transparent; font-size: 14px;
    min-height: 48px;
  }
  .drawer-item:hover { background: #f7f9fc; }
  .drawer-item:active { background: var(--primary-soft); }
  .drawer-item.active { background: var(--primary-soft); color: var(--primary-dark); border-left-color: var(--primary); font-weight: 600; }
  .drawer-item .ico { margin-right: 14px; font-size: 18px; width: 22px; text-align: center; }
  .drawer-item .count {
    margin-left: auto; min-width: 26px; text-align: center;
    background: var(--gray-soft); color: var(--text-sub);
    padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 600;
  }
  .drawer-item.active .count { background: var(--primary); color: #fff; }
  .drawer-section-label {
    padding: 14px 18px 4px; font-size: 10px; color: var(--text-sub);
    font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  }
  .drawer-divider { border-top: 1px solid var(--border); margin: 6px 0; }
  /* searchbar は topbar-search に統合（後方互換のため空の擬似定義） */
  .searchbar { display: none; }
  .content { padding: 10px 12px; min-height: calc(100vh - 56px - 64px); }
  .filter-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--primary-soft); color: var(--primary-dark);
    padding: 6px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
    margin: 4px 0 10px 0;
    border: 1px solid rgba(21,101,192,.18);
  }
  /* ===== chips フィルタストリップ（モックアップ） ===== */
  .chips-bar {
    position: fixed; top: 102px; left: 0; right: 0; z-index: 90;
    background: var(--surface); border-bottom: 1px solid var(--border);
    box-shadow: 0 2px 4px rgba(0,0,0,.04);
  }
  .chips-bar[hidden] { display: none !important; }
  .chips {
    display: flex; gap: 6px; padding: 8px 12px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 6px 12px; border-radius: 999px;
    background: var(--gray-soft); color: var(--text);
    font-size: 12px; font-weight: 500;
    border: 1px solid transparent;
    white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer; user-select: none;
  }
  .chip:hover { background: #e6e9ef; }
  .chip.active {
    background: var(--primary); color: #fff; border-color: var(--primary);
  }
  .chip-count {
    background: rgba(255,255,255,.3); color: inherit;
    padding: 1px 6px; border-radius: 8px; font-size: 11px; font-weight: 600;
    min-width: 18px; text-align: center;
  }
  .chip:not(.active) .chip-count {
    background: var(--surface); color: var(--text-sub);
  }
  /* ===== カード（モックアップ pcard ベース） ===== */
  .card {
    background: var(--surface); border-radius: 12px;
    box-shadow: var(--shadow);
    margin-bottom: 8px; padding: 12px 14px; cursor: pointer;
    border-left: 4px solid transparent;
    transition: background .12s, box-shadow .12s;
  }
  .card.has-thumb { display: flex; gap: 12px; align-items: flex-start; }
  .card-thumb {
    width: 56px; height: 56px; border-radius: 8px;
    background: var(--gray-soft); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-mute); font-size: 22px;
    overflow: hidden;
  }
  .card-thumb img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .card-body { flex: 1; min-width: 0; }
  .card:hover { box-shadow: var(--shadow-lg); }
  .card:active { background: #f7f9fc; }
  /* ステータスでの左ボーダー色分け（モックアップ s-* 互換） */
  .card.s-overdue { border-left-color: var(--danger); background: #fff8f8; }
  .card.s-shukka  { border-left-color: var(--primary); }
  .card.s-sokutei { border-left-color: var(--warning); }
  .card.s-sold    { border-left-color: var(--success); }
  .card-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .card-kanri { font-weight: 700; font-size: 15px; color: var(--primary); letter-spacing: .02em; }
  .card-status {
    margin-left: auto;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 6px;
    background: var(--gray-soft); color: var(--text-sub);
  }
  .card-status.sold { background: var(--danger-soft); color: var(--danger); }
  .card-status.measured { background: var(--success-soft); color: var(--success); }
  .card-status.shipping-pending { background: var(--warning-soft); color: var(--warning); }
  .card-status.shipped { background: var(--primary-soft); color: var(--primary); }
  .card-deadline {
    font-size: 11px; color: var(--text-sub); margin-top: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .card-deadline.overdue { color: var(--danger); font-weight: 700; }
  .card-deadline.today {
    color: var(--danger); font-weight: 700;
    background: var(--danger-soft); padding: 3px 8px; border-radius: 6px;
    border-left: 3px solid var(--danger); display: inline-flex;
    margin-top: 6px;
  }
  .img-field { display: flex; gap: 12px; align-items: flex-start; }
  .img-preview {
    display: flex; align-items: center; justify-content: center;
    width: 96px; height: 96px; flex-shrink: 0;
    border: 1px solid var(--border); border-radius: 8px;
    background: #f7f9fc; overflow: hidden;
    font-size: 11px; color: var(--text-mute); text-align: center; padding: 4px;
    text-decoration: none; cursor: pointer;
  }
  .img-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .img-preview.img-loading { color: var(--primary); }
  .img-preview.img-error { color: var(--danger); background: var(--danger-soft); }
  .img-actions { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .img-upload-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; min-height: 38px;
    background: var(--primary); color: white;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer; align-self: flex-start; user-select: none;
    box-shadow: 0 1px 2px rgba(0,0,0,.08);
  }
  .img-upload-btn.ghost {
    background: var(--surface); color: var(--primary);
    border: 1px solid var(--primary); box-shadow: none;
  }
  .img-upload-btn:hover { background: var(--primary-dark); }
  .img-upload-btn.ghost:hover { background: var(--primary-soft); }
  .img-upload-btn:active { background: var(--primary-dark); }
  .img-hint { font-size: 11px; color: var(--text-sub); }
  .img-status { font-size: 12px; color: var(--text-sub); min-height: 16px; }
  .img-status.success { color: var(--success); }
  .img-status.error { color: var(--danger); }
  /* 画像拡大モーダル（タップで閉じる） */
  .img-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,.92);
    z-index: 9000; display: none;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .img-modal.show { display: flex; }
  .img-modal img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
  }
  .img-modal-close {
    position: absolute; top: 16px; right: 16px;
    width: 44px; height: 44px;
    background: rgba(255,255,255,.18); color: #fff;
    border: none; border-radius: 50%;
    font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  /* 基本タブの画像プレビュー（hero 直下） */
  .basic-imgs {
    display: flex; gap: 8px; padding: 10px 12px 6px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    background: var(--surface); border-bottom: 1px solid var(--border);
    margin: 0 -12px;
  }
  .basic-imgs::-webkit-scrollbar { display: none; }
  .basic-img {
    width: 76px; height: 76px; flex-shrink: 0;
    border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; cursor: pointer;
    background: #f7f9fc;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--text-mute); text-align: center;
  }
  .basic-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  /* フィールド横並びグリッド */
  .field-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 12px; }
  .field-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px 8px; }
  .field-grid-2 > .field-row, .field-grid-3 > .field-row {
    display: block; padding: 6px 0; border-bottom: none;
  }
  .meas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
  .meas-grid > .field-row { display: block; padding: 4px 0; border-bottom: none; }
  .meas-grid > .field-row label { font-size: 11px; margin-bottom: 2px; }
  .meas-grid > .field-row input { padding: 8px 10px; font-size: 14px; min-height: 36px; }
  .group-header {
    font-size: 12px; font-weight: 700; color: var(--text-sub);
    margin: 14px 0 6px 0; padding: 4px 4px;
    text-transform: uppercase; letter-spacing: .04em;
    display: flex; align-items: center; gap: 8px;
  }
  .group-header::before {
    content: ''; width: 4px; height: 12px;
    background: var(--primary); border-radius: 2px;
  }
  .group-header .count { color: var(--primary); margin-left: auto; font-weight: 600; font-size: 11px; }
  .card-row2 { color: var(--text); font-size: 13px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .card-brand { font-weight: 600; color: var(--text); }
  .shiire-card {
    background: var(--surface); border-radius: 12px;
    box-shadow: var(--shadow);
    margin-bottom: 8px; padding: 12px 14px; cursor: pointer;
  }
  .shiire-card:hover { box-shadow: var(--shadow-lg); }
  .shiire-card:active { background: #f7f9fc; }
  .shiire-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .shiire-date { font-weight: 700; font-size: 15px; color: var(--primary); letter-spacing: .02em; }
  .shiire-place { font-size: 11px; color: var(--text-sub); background: var(--gray-soft); padding: 2px 8px; border-radius: 6px; font-weight: 500; }
  .shiire-progress {
    margin-left: auto; font-size: 11px; padding: 2px 8px; border-radius: 6px;
    background: var(--gray-soft); color: var(--text-sub); font-weight: 600;
  }
  .shiire-progress.done { background: var(--success-soft); color: var(--success); }
  .shiire-row2 {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    margin-top: 8px; font-size: 12px;
  }
  .shiire-cell .lbl { color: var(--text-sub); display: block; font-size: 11px; }
  .shiire-cell .val { font-weight: 600; color: var(--text); font-size: 14px; }
  .bottomnav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    height: 64px; z-index: 100;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
    overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; white-space: nowrap;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .bottomnav::-webkit-scrollbar { display: none; }
  .bottomnav-inner { display: inline-flex; height: 100%; }
  .bottomnav button {
    min-width: 72px; height: 100%; min-height: 56px; border: none; background: none;
    display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; color: var(--text-sub); font-size: 11px; cursor: pointer; padding: 8px 6px;
    position: relative;
    transition: color .12s;
  }
  .bottomnav button:hover { color: var(--text); }
  .bottomnav button.active { color: var(--primary); font-weight: 600; }
  .bottomnav button.active::after {
    content: ''; position: absolute; top: 0; left: 12px; right: 12px;
    height: 3px; background: var(--primary); border-radius: 0 0 3px 3px;
  }
  .bottomnav button .ico { font-size: 20px; line-height: 1; }
  .bottomnav button .lbl { font-size: 10px; font-weight: 500; }
  .product-info {
    background: var(--surface); border-radius: 12px;
    padding: 14px 16px 12px; margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .product-info h2 {
    margin: 0 0 6px; font-size: 22px; color: var(--primary);
    font-weight: 700; letter-spacing: .02em;
  }
  .product-info .meta { color: var(--text-sub); font-size: 12px; line-height: 1.7; }
  .section-header {
    text-align: left; color: var(--text-sub); font-size: 12px; font-weight: 700;
    padding: 14px 4px 6px; margin-top: 0;
    text-transform: uppercase; letter-spacing: .04em;
    display: flex; align-items: center; gap: 8px;
  }
  .section-header::before {
    content: ''; width: 4px; height: 12px;
    background: var(--primary); border-radius: 2px;
  }
  .form-section {
    background: var(--surface); border-radius: 12px;
    padding: 12px 14px 4px; margin-bottom: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .field-row {
    display: block; padding: 0;
    border-bottom: 1px solid #f3f5f9;
    padding: 10px 0;
  }
  .field-row:last-child { border-bottom: none; }
  .field-row label {
    display: block; font-size: 12px; color: var(--text-sub); font-weight: 600;
    margin-bottom: 4px;
  }
  .field-row input, .field-row select, .field-row textarea {
    width: 100%; padding: 10px 12px; min-height: 40px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 16px; background: var(--surface);
    font-family: inherit; color: var(--text);
  }
  .field-row textarea { min-height: 60px; resize: vertical; }
  .field-row input:focus, .field-row select:focus, .field-row textarea:focus {
    outline: none; border-color: var(--primary); background: #fff; box-shadow: var(--focus-ring);
  }
  /* 採寸行は横並び（80px 1fr 24px）を維持 */
  .field-row.measure-row {
    display: grid; grid-template-columns: 80px 1fr 24px;
    align-items: center; gap: 12px;
    padding: 10px 4px;
  }
  .field-row.measure-row label { margin-bottom: 0; }
  .field-row .unit { color: var(--text-sub); font-size: 12px; text-align: left; }
  .field-readonly {
    padding: 10px 12px; background: #f7f9fc; color: var(--text-sub);
    border: 1px solid var(--border); border-radius: 8px; font-size: 14px;
    min-height: 40px; word-break: break-all;
  }
  /* ===== 詳細表示（モックアップ準拠） ===== */
  .detail-hero {
    background: var(--surface);
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    margin: -10px -12px 0;
  }
  .hero-kanri {
    font-size: 22px; font-weight: 700; color: var(--primary);
    letter-spacing: .02em;
  }
  .hero-meta {
    display: flex; flex-wrap: wrap; gap: 6px 10px;
    margin-top: 6px; font-size: 12px; color: var(--text-sub);
  }
  .hero-meta b { color: var(--text); font-weight: 600; }
  .hero-status-row {
    display: flex; align-items: center; gap: 8px; margin-top: 12px;
    flex-wrap: wrap;
  }
  .hero-status {
    padding: 4px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
    background: var(--gray-soft); color: var(--text-sub);
    border: 1px solid var(--border);
  }
  .hero-status.s-shukka { background: var(--warning-soft); color: var(--warning); border-color: var(--warning); }
  .hero-status.s-shukkazumi { background: var(--primary-soft); color: var(--primary); border-color: var(--primary); }
  .hero-status.s-sold { background: var(--success-soft); color: var(--success); border-color: var(--success); }
  .hero-deadline { margin-left: auto; font-size: 11px; color: var(--warning); font-weight: 600; }
  .hero-deadline.overdue { color: var(--danger); }
  /* セクションタブ（基本/採寸/撮影・出品/販売/発送/備考） sticky で appbar 直下 */
  .sec-tabs {
    background: var(--surface);
    display: flex; gap: 0;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    margin: 0 -12px;
    position: sticky; top: 102px; z-index: 60;
  }
  .sec-tabs::-webkit-scrollbar { display: none; }
  .sec-tab {
    flex-shrink: 0;
    padding: 12px 14px;
    border: none; background: transparent;
    font-size: 13px; font-weight: 500;
    color: var(--text-sub);
    border-bottom: 2px solid transparent;
    white-space: nowrap; cursor: pointer;
    position: relative;
  }
  .sec-tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
    font-weight: 700;
  }
  .sec-tab .dot {

  }
</style>
</head>

<script>
const API_BASE = ''; // Workers 同一オリジンで /api/* と SPA HTML を提供

var STATE = {
  email: '', allowed: false,
  tab: 'shouhin', filter: '', filterLabel: '',
  view: 'list', current: null, items: [],
  currentShiireProducts: [],
  workers: [], accounts: [],
  suppliers: [], places: [], categories: [],
  settings: {},
  // 管理番号 → AI prefill fields のクライアントキャッシュ
  // 仕入れ選択時に一括プリフェッチして埋める。GET /api/ai/prefill より優先
  aiPrefillCache: new Map()
};

// ========== 自動更新（AppSheet風のサイレントポーリング） ==========
const POLL_INTERVAL_MS = 30000; // 30秒
var pollTimer = null;
var isAutoRefreshing = false;

function startPolling() {
  stopPolling();
  pollTimer = setInterval(autoRefresh, POLL_INTERVAL_MS);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}
async function autoRefresh() {
  if (isAutoRefreshing) return;
  if (!STATE.allowed) return;
  if (document.visibilityState !== 'visible') return;
  // モーダル表示中は更新しない（フォーム入力中の事故防止）
  var mask = document.getElementById('modal-mask');
  if (mask && mask.classList.contains('show')) return;
  // 詳細画面はローカル編集状態があるので自動更新しない
  if (STATE.view === 'detail') return;
  isAutoRefreshing = true;
  try {
    refreshCounts();
    if (STATE.tab === 'shouhin' || STATE.tab === 'uriage' || STATE.tab === 'hassou') {
      await renderShouhinList({ silent: true });
    } else if (STATE.tab === 'shiire') {
      await renderShiireList({ silent: true });
    }
  } catch (err) {
    console.warn('autoRefresh failed', err);
  } finally {
    isAutoRefreshing = false;
  }
}
document.addEventListener('visibilitychange', function(){
  if (document.visibilityState === 'visible') autoRefresh();
});
window.addEventListener('focus', autoRefresh);

// 日付フィールドはラベル・余白・入力欄のどこをタップ／クリックしてもカレンダーを開く
// （PC Chrome は入力欄の文字エリアをクリックしても標準ではピッカーが開かないため、
//   row 内のあらゆるクリックで input.showPicker() を呼ぶ）
document.addEventListener('click', function(e){
  var row = e.target.closest && e.target.closest('.field-row');
  if (!row) return;
  var input = row.querySelector('input[type="date"]');
  if (!input) return;
  if (typeof input.showPicker === 'function') {
    try { input.showPicker(); return; } catch (_) { /* fallback to focus */ }
  }
  input.focus();
});

// タグ表記 入力／性別 変更 で メルカリサイズ を即時派生（詳細編集 f_ / 新規作成 cf_ 共通）
// 既存値があっても性別/タグ変更時は再派生（手動選択を尊重したい場合は SELECT を直接触れば確定）
function deriveMercariSizeForPrefix_(prefix) {
  var tagEl = document.getElementById(prefix + escFieldId_('タグ表記'));
  var sizeEl = document.getElementById(prefix + escFieldId_('メルカリサイズ'));
  var genderEl = document.getElementById(prefix + escFieldId_('性別'));
  if (!tagEl || !sizeEl) return;
  var derived = (typeof convertTagToMercariSize_ === 'function')
    ? convertTagToMercariSize_(tagEl.value, genderEl ? genderEl.value : '')
    : '';
  if (!derived) return;
  if (sizeEl.tagName === 'SELECT') {
    var has = false;
    for (var i = 0; i < sizeEl.options.length; i++) {
      if (sizeEl.options[i].value === derived) { has = true; break; }
    }
    if (!has) {
      var opt = document.createElement('option');
      opt.value = derived; opt.textContent = derived;
      sizeEl.appendChild(opt);
    }
  }
  sizeEl.value = derived;
}
document.addEventListener('input', function(e){
  var t = e.target;
  if (!t || !t.id) return;
  var TAG_IDS = ['f_' + escFieldId_('タグ表記'), 'cf_' + escFieldId_('タグ表記')];
  if (TAG_IDS.indexOf(t.id) < 0) return;
  var prefix = t.id.slice(0, t.id.indexOf('_') + 1);
  deriveMercariSizeForPrefix_(prefix);
});
document.addEventListener('change', function(e){
  var t = e.target;
  if (!t || !t.id) return;
  var GENDER_IDS = ['f_' + escFieldId_('性別'), 'cf_' + escFieldId_('性別')];
  if (GENDER_IDS.indexOf(t.id) < 0) return;
  var prefix = t.id.slice(0, t.id.indexOf('_') + 1);
  deriveMercariSizeForPrefix_(prefix);
});
// カテゴリ1 → カテゴリ2、カテゴリ2 → カテゴリ3 の再構築（AppSheet の依存ドロップダウン同等）
function refillCategory2_(prefix) {
  var c1El = document.getElementById(prefix + escFieldId_('カテゴリ1'));
  var c2El = document.getElementById(prefix + escFieldId_('カテゴリ2'));
  if (!c2El) return;
  var c1 = c1El ? c1El.value : '';
  var current = c2El.value;
  var list = category2OptionsFor_(c1);
  c2El.innerHTML = categoryOptionsHtml_(list, list.indexOf(current) >= 0 ? current : '');
  refillCategory3_(prefix);
}
function refillCategory3_(prefix) {
  var c1El = document.getElementById(prefix + escFieldId_('カテゴリ1'));
  var c2El = document.getElementById(prefix + escFieldId_('カテゴリ2'));
  var c3El = document.getElementById(prefix + escFieldId_('カテゴリ3'));
  if (!c3El) return;
  var c1 = c1El ? c1El.value : '';
  var c2 = c2El ? c2El.value : '';
  var current = c3El.value;
  var list = category3OptionsFor_(c1, c2);
  c3El.innerHTML = categoryOptionsHtml_(list, list.indexOf(current) >= 0 ? current : '');
}
document.addEventListener('change', function(e){
  var t = e.target;
  if (!t || !t.id) return;
  var CAT1_IDS = ['f_' + escFieldId_('カテゴリ1'), 'cf_' + escFieldId_('カテゴリ1')];
  var CAT2_IDS = ['f_' + escFieldId_('カテゴリ2'), 'cf_' + escFieldId_('カテゴリ2')];
  if (CAT1_IDS.indexOf(t.id) >= 0) {
    var p1 = t.id.slice(0, t.id.indexOf('_') + 1);
    refillCategory2_(p1);
  } else if (CAT2_IDS.indexOf(t.id) >= 0) {
    var p2 = t.id.slice(0, t.id.indexOf('_') + 1);
    refillCategory3_(p2);
  }
});
function escFieldId_(name) {

// 設定シート(STATE.settings)から販売場所別の手数料率を取得
// MN列のヘッダーが「メルカリ手数料」「ラクマ手数料」のように販売場所名を含む想定。
// 値は 0.10（=10%）／ 10（=10%）どちらでも吸収。
function findFeeRate_(channel) {
  if (!channel) return null;
  var settings = STATE.settings || {};
  var keys = Object.keys(settings);
  // 完全一致 → 部分一致 の順で探索
  function tryKey(name) {
    var v = settings[name];
    if (Array.isArray(v) && v.length) {
      var n = parseFloat(v[0]);
      if (!isNaN(n)) return n > 1 ? n / 100 : n;
    }
    return null;
  }
  var exact = tryKey(channel);
  if (exact != null) return exact;
  for (var i = 0; i < keys.length; i++) {
    if (keys[i].indexOf(channel) >= 0) {
      var rate = tryKey(keys[i]);
      if (rate != null) return rate;
    }
  }
  return null;
}

function calcFeeFromSettings_(channel, price) {
  var rate = findFeeRate_(channel);
  var p = Number(price);
  if (rate == null || !p || isNaN(p)) return null;
  return Math.round(p * rate);
}

// 販売場所/販売価格 変更時に手数料を自動再計算（既に手入力で値が入っていても上書き）
// id プリフィックスは 'f_'（詳細フォーム） / 'cf_'（新規作成フォーム）の2系統
function onSaleChannelChange_(el, channelId) {
  var prefix = (channelId || '').slice(0, channelId.indexOf('_') + 1) || 'f_';
  var priceId = prefix + '販売価格'.replace(/[^A-Za-z0-9_]/g, function(ch){ return '_' + ch.charCodeAt(0).toString(16); });
  var feeId   = prefix + '手数料'.replace(/[^A-Za-z0-9_]/g, function(ch){ return '_' + ch.charCodeAt(0).toString(16); });
  var priceEl = document.getElementById(priceId);
  var feeEl = document.getElementById(feeId);
  if (!feeEl) return;
  var fee = calcFeeFromSettings_(el.value, priceEl ? priceEl.value : 0);
  if (fee != null) feeEl.value = String(fee);
}

// 詳細・新規作成フォームに 販売価格 → 手数料 の自動再計算リスナーを仕込む
// 既に price+channel が入っていて 手数料 が空の場合は初期化時にも計算する
function wireFeeAutoCalc_(idPrefix) {
  function fid(name){ return idPrefix + name.replace(/[^A-Za-z0-9_]/g, function(ch){ return '_' + ch.charCodeAt(0).toString(16); }); }
  var priceEl = document.getElementById(fid('販売価格'));
  var channelEl = document.getElementById(fid('販売場所'));
  var feeEl = document.getElementById(fid('手数料'));
  if (!priceEl || !channelEl || !feeEl) return;
  function recalc(){
    var fee = calcFeeFromSettings_(channelEl.value, priceEl.value);
    if (fee != null) feeEl.value = String(fee);
  }
  priceEl.addEventListener('input', recalc);
  // 初回: 手数料が空で 販売価格・販売場所 が入っているなら一度計算
  if ((!feeEl.value || feeEl.value === '0') && priceEl.value && channelEl.value) {
    recalc();
  }
}

// マスター取得：失敗しても UI は壊さない
async function loadMasters() {
  const tasks = [
    ['/api/master/workers',    'workers'],
    ['/api/master/accounts',   'accounts'],
    ['/api/master/suppliers',  'suppliers'],
    ['/api/master/places',     'places'],
    ['/api/master/categories', 'categories'],
  ];
  await Promise.all(tasks.map(async ([url, key]) => {
    try {
      const r = await api(url);
      STATE[key] = Array.isArray(r.items) ? r.items : [];
    } catch (err) {
      console.warn(key + ' load failed', err);
    }
  }));
  // 設定シート（複数列マスタ：状態/発送方法/カラー1/カテゴリ2/カテゴリ3 等）
  try {
    const r = await api('/api/master/settings');
    STATE.settings = (r.items && typeof r.items === 'object' && !Array.isArray(r.items)) ? r.items : {};
  } catch (err) {
    console.warn('settings load failed', err);
  }
}

// SETTINGS_FIELD_MAP に登録された項目について、設定シートの値があれば <select> 用 options を返す。なければ null。
function settingsOptionsFor_(name, current) {
  var key = SETTINGS_FIELD_MAP[name];
  if (!key) return null;
  var list = STATE.settings && STATE.settings[key];
  if (!Array.isArray(list) || !list.length) return null;
  return masterOptionsHtml_(list, current);
}

// ========== API ==========
async function api(path, opts) {
  opts = opts || {};
  const res = await fetch(API_BASE + path, {
    method: opts.method || 'GET',
    credentials: 'include',
    headers: opts.body ? { 'Content-Type': 'application/json' } : {},
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  let json;
  try { json = await res.json(); } catch { json = { ok: false, message: 'invalid response' }; }
  if (!res.ok || !json.ok) {
    const msg = json.message || json.error || ('http ' + res.status);
    throw new Error(msg);
  }
  return json;
}

    STATE.filter = ''; STATE.filterLabel = '';
  }
  document.querySelectorAll('#bottomnav-inner button').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-tab') === tab);
  });
  pushListState_();
  render();
}

// ========== レンダリング ==========
function render() {
  if (!STATE.allowed) { renderDenied(); return; }
  if (STATE.view === 'detail') {
    updateChipsBar_();
    renderDetail(); return;
  }
  document.getElementById('appbar-title').textContent = TAB_LABELS[STATE.tab] || '仕入れ管理';
  updateChipsBar_();

  if (STATE.tab === 'shouhin') {
    renderShouhinList();
  } else if (STATE.tab === 'uriage') {
    STATE.filter = 'sold'; STATE.filterLabel = '売却済み';
    renderShouhinList();
  } else if (STATE.tab === 'hassou') {
    STATE.filter = 'hassou';
    STATE.filterLabel = '発送待ち・発送済み';
    renderShouhinList();
  } else if (STATE.tab === 'shiire') {
    renderShiireList();
  } else {
    renderPlaceholder(TAB_LABELS[STATE.tab]);
  }
}

async function openShiireDetail(shiireId) {
  var c = document.getElementById('content');
  document.getElementById('appbar-title').textContent = shiireId;
  c.innerHTML = '<div class="loading">読み込み中…</div>';
  try {
    const productsRes = await api('/api/purchases/' + encodeURIComponent(shiireId) + '/products');
    const items = productsRes.items || [];
    // 仕入れメタ情報（category / planned）を取得して割り当て管理番号を表示
    var category = SHIIRE_CATEGORY_MAP[shiireId] || '';
    var planned = 0;
    if (!category) {
      try {
        const purRes = await api('/api/purchases?limit=2000');
        (purRes.items || []).forEach(function(p){
          SHIIRE_CATEGORY_MAP[p.shiireId] = p.category || '';
          if (p.shiireId === shiireId) planned = Number(p.planned || 0);
        });
        category = SHIIRE_CATEGORY_MAP[shiireId] || '';
      } catch (e) { /* ignore */ }
    } else {
      try {
        const purRes = await api('/api/purchases?limit=2000');
        (purRes.items || []).forEach(function(p){
          if (p.shiireId === shiireId) planned = Number(p.planned || 0);
        });
      } catch (e) { /* ignore */ }
    }
    var rangeHtml = '';
    if (category && planned > 0) {
      try {
        const next = await api('/api/kanri/next?category=' + encodeURIComponent(category));
        const prefix = next.prefix || ('z' + category);
        // 既に登録済の商品があれば、その最小〜最大を実績として表示。残りは予約として表示
        var registered = items.length;
        var remaining = Math.max(0, planned - registered);
        var startN = Number(next.maxN || 0) + 1;
        var endN = startN + remaining - 1;
        rangeHtml = '<div class="meta" style="background:#f0f9ff;border-left:3px solid var(--primary);padding:6px 10px;border-radius:4px;margin-top:6px;">' +
          '割り当て管理番号（残り ' + remaining + '点）: <strong>' +
          (remaining > 0 ? esc(prefix + startN) + ' 〜 ' + esc(prefix + endN) : '完了') +
          '</strong></div>';
      } catch (e) { /* ignore */ }
    }
    const head = '<div class="product-info"><h2>仕入れ ' + esc(shiireId) + '</h2>' +
      '<div class="meta">紐づく商品: ' + items.length + (planned ? ' / ' + planned : '') + ' 点</div>' +
      rangeHtml +
      '</div>';
    const body = items.length
      ? items.map(cardHtml).join('')
      : '<div class="empty">商品が登録されていません</div>';
    const fab = '<div class="fab-stack">' +
      '<button class="fab gray" onclick="selectTab(\'shiire\')" title="仕入れ一覧へ">←</button>' +
      '<button class="fab" onclick="openCreateProductModal(\'' + esc(shiireId).replace(/\'/g,"\\'") + '\')" title="新規商品">＋</button>' +
    '</div>';
    STATE.currentShiireProducts = items;
    c.innerHTML = head + body + fab;
  } catch (err) {
    c.innerHTML = '<div class="empty" style="color:#c62828">' + esc(err.message) + '</div>';
  }
}

// 商品一覧の stale-while-revalidate キャッシュ
// キー = tab|filter|q ／ 値 = { items, ts }
var LIST_CACHE = Object.create(null);
function listCacheKey_() {
  var q = (document.getElementById('search') && document.getElementById('search').value || '').trim();
  return (STATE.tab || '') + '|' + (STATE.filter || '') + '|' + q;
}
// 楽観的に保存した変更を全キャッシュエントリに反映（一覧バッジを即座に更新）
function patchListCache_(kanri, fields) {
  Object.keys(LIST_CACHE).forEach(function(key){
    var entry = LIST_CACHE[key];
    if (!entry || !Array.isArray(entry.items)) return;
    entry.items.forEach(function(it){
      if (it.kanri !== kanri) return;
      if (fields['販売日']) it.saleDate = fields['販売日'];
      if (fields['販売価格']) it.salePrice = fields['販売価格'];
      if (fields['ステータス']) it.status = fields['ステータス'];
      if (fields['採寸日']) { it.measuredAt = fields['採寸日']; }
    });
  });
}

// 発送期限 = 販売日 + SHIP_DEADLINE_DAYS（AppSheet 同様の運用）
var SHIP_DEADLINE_DAYS = 3;
function shipDeadlineHtml_(it) {
  if (it.status !== '発送待ち') return '';
  if (!it.saleDate) return '';
  var sd = new Date(it.saleDate);
  if (isNaN(sd.getTime())) return '';
  var due = new Date(sd.getTime() + SHIP_DEADLINE_DAYS * 86400000);
  var dueStr = due.getFullYear() + '-' + String(due.getMonth()+1).padStart(2,'0') + '-' + String(due.getDate()).padStart(2,'0');
  var today = new Date(); today.setHours(0,0,0,0);
  var overdue = due.getTime() < today.getTime();
  var diffDays = Math.floor((due.getTime() - today.getTime()) / 86400000);
  var label;
  if (overdue) label = '期限超過 ' + dueStr + '（' + Math.abs(diffDays) + '日経過）';
  else if (diffDays === 0) label = '本日が期限 ' + dueStr;
  else label = '発送期限 ' + dueStr + '（あと' + diffDays + '日）';
  var cls = overdue ? ' overdue' : (diffDays === 0 ? ' today' : '');
  return '<div class="card-deadline' + cls + '">⏰ ' + esc(label) + '</div>';
}

// 画像フィールドの表示＋アップロード UI
// v が http(s) URL: そのままプレビュー
// v が AppSheet 旧形式の相対パス（"商品管理_Images/..."）: data-legacy で残し、resolveLegacyImages_ が後で解決
// v が空: 画像なし表示
function imageFieldHtml_(id, name, v) {

  } else if (isLegacy) {
    preview = '<div id="' + id + '_preview" class="img-preview img-loading" data-legacy="' + esc(s) + '" data-field="' + safeName + '">読み込み中…</div>';
  } else {

  }

    '<label class="img-upload-btn ghost" for="' + id + '_file">📷 撮影／差替え</label>' +

    'onchange="onImageFieldPick_(this, \'' + esc(id) + '\', \'' + safeName + '\')" ' +

    '<div class="img-hint">最大1600px・JPG</div>' +

// 画像選択時に呼ばれる（リサイズ→base64→/api/save/image）
function onImageFieldPick_(inputEl, fieldId, fieldName) {
  var file = inputEl.files && inputEl.files[0];
  if (!file) return;
  var status = document.getElementById(fieldId + '_status');
  var preview = document.getElementById(fieldId + '_preview');
  var kanri = (STATE.current && STATE.current.kanri) || '';
  if (!kanri) {
    if (status) { status.textContent = '管理番号がありません'; status.className = 'img-status error'; }
    return;
  }
  if (status) { status.textContent = '読み込み中…'; status.className = 'img-status'; }

  resizeImage_(file, 1600, 0.85).then(function(dataUrl){
    if (status) status.textContent = 'アップロード中…';
    return fetch('/api/save/image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ kanri: kanri, field: fieldName, dataUrl: dataUrl })
    }).then(function(r){ return r.json().then(function(j){ return { ok: r.ok, body: j }; }); })
    .then(function(res){
      if (!res.ok || !res.body || !res.body.url) throw new Error((res.body && res.body.error) || 'アップロード失敗');
      var url = res.body.url;
      if (preview) {
        var safeUrl = esc(url).replace(/\'/g,"\\'");
        var html = '<button type="button" id="' + esc(fieldId) + '_preview" class="img-preview" onclick="openImageModal_(\'' + safeUrl + '\')"><img src="' + esc(url) + '" alt=""></button>';
        preview.outerHTML = html;
      }
      if (status) { status.textContent = '✓ アップロード完了'; status.className = 'img-status success'; }
      if (STATE.current && STATE.current.extra) STATE.current.extra[fieldName] = url;
      LIST_CACHE = {};
    });
  }).catch(function(err){
    if (status) { status.textContent = '✗ ' + (err && err.message || 'エラー'); status.className = 'img-status error'; }
  });
}

// Drive の uc?id=... は <img> から直接表示できないため thumbnail?id=&sz=w500 に正規化
function normalizeDriveUrl_(url) {
  if (!url) return url;
  var m = url.match(/^https?:\/\/drive\.google\.com\/uc\?(?:.*&)?id=([^&]+)/);
  if (m) return 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w800';
  var m2 = url.match(/^https?:\/\/drive\.google\.com\/file\/d\/([^/]+)/);
  if (m2) return 'https://drive.google.com/thumbnail?id=' + m2[1] + '&sz=w800';
  return url;
}

// 詳細描画後に呼び出し: 旧形式パスの画像を遅延解決して img に差し替え
function resolveLegacyImages_() {
  // .img-preview / .basic-img どちらも対象
  var nodes = document.querySelectorAll('.img-loading[data-legacy]');
  if (!nodes || !nodes.length) return;
  var kanri = (STATE.current && STATE.current.kanri) || '';
  for (var i = 0; i < nodes.length; i++) {
    (function(el){
      var path = el.getAttribute('data-legacy') || '';
      var field = el.getAttribute('data-field') || '';
      var cacheKey = 'imgresolve:v2:' + path;
      var cached = null;
      try { cached = sessionStorage.getItem(cacheKey); } catch(e) {}
      if (cached) { applyResolved_(el, normalizeDriveUrl_(cached)); return; }
      fetch('/api/image/resolve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ kanri: kanri, field: field, path: path })
      }).then(function(r){ return r.json().then(function(j){ return { ok: r.ok, body: j }; }); })
      .then(function(res){
        if (!res.ok || !res.body || !res.body.url) throw new Error((res.body && res.body.error) || '解決失敗');
        var u = normalizeDriveUrl_(res.body.url);
        try { sessionStorage.setItem(cacheKey, u); } catch(e) {}
        applyResolved_(el, u);
      }).catch(function(err){
        el.classList.remove('img-loading');
        el.classList.add('img-error');
        el.textContent = '画像読込失敗';
      });
    })(nodes[i]);
  }
}

function applyResolved_(el, url) {
  var id = el.id || '';
  var safeUrl = esc(url).replace(/\'/g,"\\'");
  // 元の class（basic-img / img-preview など）を保持。img-loading だけ除去
  var cls = (el.className || '').replace(/\bimg-loading\b/g, '').replace(/\s+/g, ' ').trim();
  if (!cls) cls = 'img-preview';
  var html = '<button type="button" id="' + esc(id) + '" class="' + esc(cls) + '" onclick="openImageModal_(\'' + safeUrl + '\')"><img src="' + esc(url) + '" alt=""></button>';
  el.outerHTML = html;
}

// Canvas で画像を縮小して dataURL を返す（最大辺 maxSide）
function resizeImage_(file, maxSide, quality) {
  return new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onerror = function(){ reject(new Error('ファイル読込エラー')); };
    reader.onload = function(){
      var img = new Image();
      img.onerror = function(){ reject(new Error('画像のデコードに失敗')); };
      img.onload = function(){
        var w = img.naturalWidth, h = img.naturalHeight;
        var scale = Math.min(1, maxSide / Math.max(w, h));
        var cw = Math.round(w * scale), ch = Math.round(h * scale);
        var canvas = document.createElement('canvas');
        canvas.width = cw; canvas.height = ch;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, cw, ch);
        try {
          resolve(canvas.toDataURL('image/jpeg', quality));
        } catch (err) { reject(err); }
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function cardHtml(it) {
  const measured = !!(it.measuredAt && String(it.measuredAt).trim());
  const st = it.status || '';
  let badgeClass = '';
  if (st === '売却済み') badgeClass = ' sold';
  else if (st === '発送済み') badgeClass = ' shipped';
  else if (st === '発送待ち') badgeClass = ' shipping-pending';
  else if (measured) badgeClass = ' measured';
  const badgeText = st || (measured ? '採寸済' : '未採寸');
  const statusBadge = '<span class="card-status' + badgeClass + '">' + esc(badgeText) + '</span>';
  // ステータスでの左ボーダー色分け（s-overdue: 期限超過, s-shukka: 発送待ち, s-sokutei: 未採寸, s-sold: 売却済）
  let cardClass = 'card';
  if (st === '発送待ち') {
    cardClass += ' s-shukka';
    if (it.saleDate) {
      const sd = new Date(it.saleDate);
      if (!isNaN(sd.getTime())) {
        const due = new Date(sd.getTime() + (typeof SHIP_DEADLINE_DAYS === 'number' ? SHIP_DEADLINE_DAYS : 3) * 86400000);
        const today0 = new Date(); today0.setHours(0,0,0,0);
        if (due.getTime() < today0.getTime() || due.toDateString() === today0.toDateString()) {
          cardClass += ' s-overdue';
        }
      }
    }
  } else if (st === '売却済み' || st === '発送済み') {
    cardClass += ' s-sold';
  } else if (!measured) {
    cardClass += ' s-sokutei';
  }
  // 発送商品タブのみサムネイル表示（売却済み商品画像）。商品管理など他タブは画像なし。
  var thumbHtml = '';
  if (STATE.tab === 'hassou') {
    var imgVal = (it.extra && it.extra['売却済み商品画像']) ? String(it.extra['売却済み商品画像']) : '';
    if (/^https?:/.test(imgVal)) {
      thumbHtml = '<div class="card-thumb"><img src="' + esc(normalizeDriveUrl_(imgVal)) + '" alt="" loading="lazy"></div>';
    } else if (imgVal) {
      // AppSheet 旧形式の相対パス → 描画後に resolveCardImages_() が解決
      thumbHtml = '<div class="card-thumb img-loading" data-legacy="' + esc(imgVal) + '" data-field="売却済み商品画像" data-kanri="' + esc(it.kanri) + '">📷</div>';
    } else {
      thumbHtml = '<div class="card-thumb" aria-hidden="true">📷</div>';
    }
  }
  var openHandler = 'openDetail(\'' + esc(it.kanri).replace(/\'/g,"\\'") + '\')';
  var bodyHtml = '<div class="card-body">' +
    '<div class="card-row1">' +
      '<span class="card-kanri">' + esc(it.kanri) + '</span>' +
      statusBadge +
    '</div>' +
    '<div class="card-row2">' +
      '<span class="card-brand">' + esc(it.brand || '—') + '</span>' +
      ' / ' + esc(it.size || '—') +
      (it.color ? ' / ' + esc(it.color) : '') +
    '</div>' +
    shipDeadlineHtml_(it) +
  '</div>';
  return '<div class="' + cardClass + (thumbHtml ? ' has-thumb' : '') + '" onclick="' + openHandler + '">' +
    thumbHtml + bodyHtml +
  '</div>';
}

// 一覧描画後に呼ぶ: 発送タブのカードサムネを遅延解決して画像に差し替える
function resolveCardImages_() {
  var nodes = document.querySelectorAll('.card-thumb.img-loading[data-legacy]');
  if (!nodes || !nodes.length) return;
  Array.prototype.forEach.call(nodes, function(el){
    var path = el.getAttribute('data-legacy') || '';
    var field = el.getAttribute('data-field') || '';
    var kanri = el.getAttribute('data-kanri') || '';
    if (!path) return;
    var cacheKey = 'imgresolve:v2:' + path;
    var cached = null;
    try { cached = sessionStorage.getItem(cacheKey); } catch(e) {}
    if (cached) { applyCardThumb_(el, normalizeDriveUrl_(cached)); return; }
    fetch('/api/image/resolve', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ kanri: kanri, field: field, path: path })
    }).then(function(r){ return r.json().then(function(j){ return { ok: r.ok, body: j }; }); })
      .then(function(res){
        if (!res.ok || !res.body || !res.body.url) throw new Error('resolve failed');
        var u = normalizeDriveUrl_(res.body.url);
        try { sessionStorage.setItem(cacheKey, u); } catch(e) {}
        applyCardThumb_(el, u);
      }).catch(function(){
        el.classList.remove('img-loading');
      });
  });
}

function applyCardThumb_(el, url) {
  el.classList.remove('img-loading');
  el.innerHTML = '<img src="' + esc(url) + '" alt="" loading="lazy">';
}

function renderHassouGrouped_(items) {
  // 並び順: 発送待ち優先 → 期限が近い順 → kanri
  function priorityKey(it) {
    var statusRank = it.status === '発送待ち' ? 0 : 1;
    var saleTs = it.saleDate ? new Date(it.saleDate).getTime() : Number.MAX_SAFE_INTEGER;
    return [statusRank, saleTs, String(it.kanri || '')];
  }
  var groups = Object.create(null);
  items.forEach(function(it){
    var acc = (it.extra && it.extra['使用アカウント']) || '（未設定）';
    if (!groups[acc]) groups[acc] = [];
    groups[acc].push(it);
  });
  var accounts = Object.keys(groups).sort(function(a,b){
    if (a === '（未設定）') return 1;
    if (b === '（未設定）') return -1;
    return a.localeCompare(b, 'ja');
  });
  return accounts.map(function(acc){
    var arr = groups[acc].slice().sort(function(a,b){
      var ka = priorityKey(a), kb = priorityKey(b);
      for (var i=0; i<ka.length; i++) {
        if (ka[i] < kb[i]) return -1;
        if (ka[i] > kb[i]) return 1;
      }
      return 0;
    });
    var pending = arr.filter(function(x){ return x.status === '発送待ち'; }).length;
    var header = '<div class="group-header">📮 ' + esc(acc) +
      '<span class="count">' + arr.length + '件' +
      (pending ? '（発送待ち ' + pending + '）' : '') + '</span></div>';
    return header + arr.map(cardHtml).join('');
  }).join('');
}

// ========== 詳細 ==========
// 詳細キャッシュ: 一度開いたら即時再表示できるようにする（裏で /api/products/:kanri を再取得）
var DETAIL_CACHE = Object.create(null);
async function openDetail(kanri, opts) {
  opts = opts || {};
  STATE.view = 'detail';
  STATE.detailDirty = false;
  // ブラウザ戻るで一覧に戻れるよう履歴を積む（popstate からの呼び出しでは積まない）
  if (!opts.fromPopState) {
    try {
      var st = history.state;
      if (!st || st.view !== 'detail' || st.kanri !== kanri) {
        history.pushState({ view: 'detail', kanri: kanri }, '', '');
      }
    } catch(e) {}
  }
  document.getElementById('appbar-title').textContent = kanri;
  var cached = DETAIL_CACHE[kanri];
  if (cached) {
    STATE.current = cached;
    if (STATE.mastersPromise) { try { await STATE.mastersPromise; } catch(e){} }
    renderDetail();
  } else {
    document.getElementById('content').innerHTML = '<div class="loading">読み込み中…</div>';
  }
  try {
    const [res] = await Promise.all([
      api('/api/products/' + encodeURIComponent(kanri)),
      STATE.mastersPromise || Promise.resolve(),
    ]);
    DETAIL_CACHE[kanri] = res.item;
    // フォーム入力中（dirty）は再描画でユーザー入力を消さない
    if (STATE.view === 'detail' && !STATE.detailDirty) {
      STATE.current = res.item;
      renderDetail();
    }
  } catch (err) {
    if (!cached) {
      document.getElementById('content').innerHTML = '<div class="empty" style="color:#c62828">' + esc(err.message) + '</div>';
    }
  }
}

function detailFieldId(name) {
  return 'f_' + name.replace(/[^A-Za-z0-9_]/g, function(ch){ return '_' + ch.charCodeAt(0).toString(16); });

function detailValue(d, name) {
  var ex = d.extra || {};
  if (ex[name] !== undefined && ex[name] !== '') return ex[name];
  // measure_json から補完（extraにすでに同じキーで入っているはずだが念のため）
  var m = d.measure || {};
  if (m[name] !== undefined && m[name] !== null) return m[name];
  return '';
}

  var isNo  = (cur === 'なし' || cur === 'FALSE' || cur === 'false' || cur === 'NO' || cur === 'いいえ' || cur === 'N');

      '<input type="hidden" id="' + id + '" value="' + esc(val) + '">' +

    '</div>'

function onYesNoClick_(btn) {
  var wrap = btn.closest('.yesno-toggle');
  if (!wrap) return;
  var val = btn.getAttribute('data-val') || '';
  var hidden = wrap.querySelector('input[type="hidden"]');
  if (hidden) hidden.value = val;

// extra から作業履歴を再構成（販売・発送・採寸・出品・撮影・仕入れ）
function buildHistoryHtml_(d) {
  var ex = d.extra || {};
  var ev = [];
  function add(date, who, text) {
    if (!date) return;
    ev.push({ date: String(date), who: who || '', text: text });
  }
  add(ex['仕入れ日'], ex['登録者'] || '', '仕入れ登録');
  add(ex['採寸日'], ex['採寸者'] || '', '採寸');
  add(ex['撮影日付'], ex['撮影者'] || '', '撮影');
  add(ex['出品日'], ex['出品者'] || '', '出品');
  add(ex['販売日'], '', '販売（' + (ex['販売価格'] ? '¥' + ex['販売価格'] : '価格未入力') + '）');
  add(ex['発送日付'], ex['発送者'] || '', '発送');
  add(ex['完了日'], '', '完了');
  add(ex['キャンセル日'], '', 'キャンセル');
  add(ex['返品日付'], '', '返品');
  add(ex['廃棄日'], '', '廃棄');
  if (!ev.length) return '<div class="history-empty">履歴なし</div>';
  // 日付降順
  ev.sort(function(a, b){ return a.date < b.date ? 1 : a.date > b.date ? -1 : 0; });

function buildSummaryHtml_(d) {
  var ex = d.extra || {};
  function fmtYen(v) { return v != null && v !== '' ? '¥' + Number(v).toLocaleString() : '—'; }
  function pct(v) {
    if (v == null || v === '') return '—';
    var n = Number(v);
    if (isNaN(n)) return String(v);
    if (n > 0 && n <= 1) n *= 100;
    return n.toFixed(1) + '%';
  }
  var profit = ex['利益'] != null && ex['利益'] !== '' ? Number(ex['利益']) : null;
  var profitCls = profit == null ? '' : (profit >= 0 ? ' pos' : ' neg');
  return '<div class="summary-card">' +
    '<h4>収支サマリ</h4>' +
    '<div class="stat-grid">' +
      '<div class="stat"><div class="stat-label">販売価格</div><div class="stat-value">' + esc(fmtYen(ex['販売価格'])) + '</div></div>' +
      '<div class="stat"><div class="stat-label">仕入れ値</div><div class="stat-value">' + esc(fmtYen(ex['仕入れ値'])) + '</div></div>' +
      '<div class="stat"><div class="stat-label">利益</div><div class="stat-value' + profitCls + '">' + esc(fmtYen(ex['利益'])) + '</div></div>' +
      '<div class="stat"><div class="stat-label">利益率</div><div class="stat-value' + profitCls + '">' + esc(pct(ex['利益率'])) + '</div></div>' +
      '<div class="stat"><div class="stat-label">リードタイム</div><div class="stat-value">' + esc(ex['リードタイム'] != null && ex['リードタイム'] !== '' ? ex['リードタイム'] + '日' : '—') + '</div></div>' +
      '<div class="stat"><div class="stat-label">在庫日数</div><div class="stat-value">' + esc(ex['在庫日数'] != null && ex['在庫日数'] !== '' ? ex['在庫日数'] + '日' : '—') + '</div></div>' +

function buildDeadlineHtml_(d) {
  if (d.status !== '発送待ち' || !d.saleDate) return '';
  var sd = new Date(d.saleDate);
  if (isNaN(sd.getTime())) return '';
  var due = new Date(sd.getTime() + 3 * 86400000);
  var dueStr = due.getFullYear() + '/' + (due.getMonth() + 1) + '/' + due.getDate();
  var today = new Date(); today.setHours(0,0,0,0);
  var diff = Math.floor((due.getTime() - today.getTime()) / 86400000);
  var overdue = due.getTime() < today.getTime();
  var label = overdue ? '⏰ 期限超過 ' + dueStr + '（' + Math.abs(diff) + '日経過）'
    : (diff === 0 ? '⏰ 本日が期限 ' + dueStr : '⏰ ' + dueStr + 'まで（あと' + diff + '日）');
  return '<span class="hero-deadline' + (overdue ? ' overdue' : '') + '">' + esc(label) + '</span>';
}

// セクション内のフィールド配列を、項目グループ単位でグリッド化して描画
function renderSectionFields_(sec, d) {
  var title = sec.title;
  var fields = sec.fields;
  // 採寸 (cm) は全項目を 2 列グリッドで一覧性UP
  if (title === '採寸 (cm)') {
    return '<div class="meas-grid">' +
      fields.map(function(f){ return fieldRowHtml(f[0], f[1], detailValue(d, f[0])); }).join('') +
      '</div>';
  }
  // 基本情報は特定の連続項目をグリッド化（モックアップ準拠）
  if (title === '基本情報') {
    var html = '';
    var i = 0;
    while (i < fields.length) {
      var n0 = fields[i][0];
      var n1 = (i + 1 < fields.length) ? fields[i+1][0] : '';
      var n2 = (i + 2 < fields.length) ? fields[i+2][0] : '';
      // カテゴリ1/2/3 → 3列
      if (n0 === 'カテゴリ1' && n1 === 'カテゴリ2' && n2 === 'カテゴリ3') {
        html += '<div class="field-grid-3">' +
          fieldRowHtml(fields[i][0], fields[i][1], detailValue(d, fields[i][0])) +
          fieldRowHtml(fields[i+1][0], fields[i+1][1], detailValue(d, fields[i+1][0])) +
          fieldRowHtml(fields[i+2][0], fields[i+2][1], detailValue(d, fields[i+2][0])) +
          '</div>';
        i += 3; continue;
      }
      // メルカリサイズ + 性別 → 2列
      if (n0 === 'メルカリサイズ' && n1 === '性別') {
        html += '<div class="field-grid-2">' +
          fieldRowHtml(fields[i][0], fields[i][1], detailValue(d, fields[i][0])) +
          fieldRowHtml(fields[i+1][0], fields[i+1][1], detailValue(d, fields[i+1][0])) +
          '</div>';
        i += 2; continue;
      }
      // ポケット + ポケット詳細 → 2列
      if (n0 === 'ポケット' && n1 === 'ポケット詳細') {
        html += '<div class="field-grid-2">' +
          fieldRowHtml(fields[i][0], fields[i][1], detailValue(d, fields[i][0])) +
          fieldRowHtml(fields[i+1][0], fields[i+1][1], detailValue(d, fields[i+1][0])) +
          '</div>';
        i += 2; continue;
      }
      html += fieldRowHtml(fields[i][0], fields[i][1], detailValue(d, fields[i][0]));
      i++;
    }
    return html;
  }
  // 仕入れ連動・読取専用 → 3列
  if (title === '仕入れ（連動・読取専用）') {
    return '<div class="field-grid-3">' +
      fields.map(function(f){ return fieldRowHtml(f[0], f[1], detailValue(d, f[0])); }).join('') +
      '</div>';
  }
  // 採寸記録 / 撮影・出品 の日付+作業者ペア など、2項目連続なら 2列
  if (title === '採寸記録' && fields.length === 2) {
    return '<div class="field-grid-2">' +
      fields.map(function(f){ return fieldRowHtml(f[0], f[1], detailValue(d, f[0])); }).join('') +
      '</div>';
  }
  return fields.map(function(f){ return fieldRowHtml(f[0], f[1], detailValue(d, f[0])); }).join('');
}

function diffCount_() {
  var d = STATE.current;
  if (!d) return 0;
  var ex = d.extra || {};
  var n = 0;
  DETAIL_SECTIONS.forEach(function(sec){
    sec.fields.forEach(function(f){
      var name = f[0], type = f[1];
      if (type === 'readonly' || type === 'image') return;
      var el = document.getElementById(detailFieldId(name));
      if (!el) return;
      var v = el.value;
      var orig = ex[name] !== undefined ? String(ex[name]) : '';
      if (type === 'date') {
        var origDate = '';
        if (orig) {
          if (/^\d{4}-\d{2}-\d{2}/.test(orig)) origDate = orig.slice(0, 10);
          else { var dd = new Date(orig); if (!isNaN(dd.getTime())) origDate = dd.toISOString().slice(0, 10); }
        }
        if ((v || '') !== origDate) n++;
      } else if (String(v) !== orig) n++;
    });
  });
  return n;
}
function updateSavebar_() {
  var bar = document.getElementById('savebar');
  if (!bar) return;
  var n = diffCount_();
  if (n > 0) {
    bar.classList.add('show');
    var cnt = document.getElementById('savebar-count');
    if (cnt) cnt.textContent = String(n);
    STATE.detailDirty = true;
  } else {
    bar.classList.remove('show');
    STATE.detailDirty = false;
  }
}
function cancelDetailEdits_() {
  // 入力を元の値に戻す
  var d = STATE.current;
  if (!d) return;
  var ex = d.extra || {};
  DETAIL_SECTIONS.forEach(function(sec){
    sec.fields.forEach(function(f){
      var name = f[0], type = f[1];
      if (type === 'readonly' || type === 'image') return;
      var el = document.getElementById(detailFieldId(name));
      if (!el) return;
      var orig = ex[name] !== undefined ? ex[name] : '';
      if (type === 'date') {
        if (orig && /^\d{4}-\d{2}-\d{2}/.test(orig)) el.value = orig.slice(0, 10);
        else if (orig) { var dd = new Date(orig); el.value = isNaN(dd.getTime()) ? '' : dd.toISOString().slice(0, 10); }
        else el.value = '';
      } else el.value = orig != null ? String(orig) : '';
    });
  });
  updateSavebar_();
  toast('変更を破棄しました');
}

function backToList() {
  // 履歴に詳細エントリがあれば history.back() で popstate に任せる

  try {

    }
  } catch(e) {}
  STATE.view = 'list'; STATE.current = null; render();

// ブラウザ戻る／進むに対応: SPA 内のすべてのナビゲーションを history で再現する
// state 形式:
//   詳細: { view:'detail', kanri }
//   一覧: { view:'list', tab, filter, filterLabel }
window.addEventListener('popstate', function(e){
  var st = e.state;
  if (st && st.view === 'detail' && st.kanri) {
    openDetail(st.kanri, { fromPopState: true });
    return;
  }
  // list（または null = 初期エントリ）: タブ／フィルタを復元して一覧表示
  STATE.view = 'list';
  STATE.current = null;
  STATE.detailDirty = false;
  if (st && st.view === 'list') {
    STATE.tab = st.tab || 'shouhin';
    STATE.filter = st.filter || '';
    STATE.filterLabel = st.filterLabel || '';
  }
  // ボトムナビ／ドロワーのアクティブ表示も復元
  document.querySelectorAll('#bottomnav-inner button').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-tab') === STATE.tab);
  });
  document.querySelectorAll('.drawer-item').forEach(function(d){
    d.classList.toggle('active', d.getAttribute('data-filter') === STATE.filter);
  });
  render();
});

async function saveDetails() {
  var d = STATE.current;
  if (!d) return;
  var ex = d.extra || {};
  var fields = {};

  // 全セクションを走査して、入力値が元と異なるものだけ送る（差分送信）
  DETAIL_SECTIONS.forEach(function(sec){
    sec.fields.forEach(function(f){
      var name = f[0], type = f[1];
      if (type === 'readonly' || type === 'image') return;
      var el = document.getElementById(detailFieldId(name));
      if (!el) return;
      var v = el.value;
      var orig = ex[name] !== undefined ? String(ex[name]) : '';
      if (type === 'date') {
        // 元の値を yyyy-MM-dd に正規化して比較
        var origDate = '';
        if (orig) {
          if (/^\d{4}-\d{2}-\d{2}/.test(orig)) origDate = orig.slice(0, 10);
          else { var dd = new Date(orig); if (!isNaN(dd.getTime())) origDate = dd.toISOString().slice(0, 10); }
        }
        if ((v || '') !== origDate) fields[name] = v;
      } else {
        if (String(v) !== orig) fields[name] = v;
      }
    });
  });

  if (Object.keys(fields).length === 0) {
    toast('変更なし');
    return;
  }

  // 楽観的更新: ローカル extra を即時反映 → トースト → 一覧キャッシュも更新
  Object.keys(fields).forEach(function(k){ ex[k] = fields[k]; });
  d.extra = ex;
  patchListCache_(d.kanri, fields);
  if (DETAIL_CACHE[d.kanri]) DETAIL_CACHE[d.kanri] = d;
  clearDetailDirty_();
  toast('保存しました', 'success');

  // 背景で API へ送信 → 成功後にサーバー再取得（派生ステータス・利益等の自動反映を取り込む）
  api('/api/save/details', { method: 'POST', body: { kanri: d.kanri, fields: fields } })
    .then(function(){
      refreshCounts();
      // 一覧キャッシュは派生値が古くなる可能性があるため破棄
      LIST_CACHE = Object.create(null);
      // 詳細をサーバーから再取得して、派生値（ステータス／利益／在庫日数等）を画面に反映
      return api('/api/products/' + encodeURIComponent(d.kanri));
    })
    .then(function(res){
      if (!res || !res.item) return;
      DETAIL_CACHE[d.kanri] = res.item;
      // 編集中（dirty）でなく、まだ同じ詳細を表示中なら再描画
      if (STATE.view === 'detail' && STATE.current && STATE.current.kanri === d.kanri && !STATE.detailDirty) {
        STATE.current = res.item;
        renderDetail();
      }
    })
    .catch(function(err){
      toast('⚠️ 保存に失敗: ' + err.message + '（再保存してください）', 'error');
    });
}
