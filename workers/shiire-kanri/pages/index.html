<style>
  :root {
    --primary: #1565c0;
    --primary-dark: #0d47a1;
    --primary-light: #e3f2fd;
    --primary-soft: #e3f2fd;
    --accent: #ff6d00;
    --bg: #f4f6fa;
    --card: #ffffff;
    --surface: #ffffff;
    --text: #1a2330;
    --text-sub: #66707d;
    --text-mute: #6f7786; /* WCAG AA 対応: 旧 #9aa3b0 (2.77:1) → 4.6:1 */
    --border: #e3e7ee;
    --success: #2e7d32;
    --success-soft: #e8f5e9;
    --warning: #b95400; /* WCAG AA 対応: 旧 #ed6c02 (3.55:1) → 4.5:1 */
    --warning-soft: #fff4e5;
    --danger: #c62828;
    --danger-soft: #ffebee;
    --gray-soft: #eef0f4;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-lg: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    --focus-ring: 0 0 0 3px rgba(21,101,192,.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { height: auto; overflow-y: auto; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", "Yu Gothic UI", "Meiryo", sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5;
    /* iOSノッチ(safe-area-inset-top)を appbar・body 双方に加味することで、固定ヘッダの被りを全画面で解消 */
    padding-top: calc(102px + env(safe-area-inset-top, 0px));
    padding-bottom: calc(76px + env(safe-area-inset-bottom)); min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
  }
  body.has-chips { padding-top: calc(146px + env(safe-area-inset-top, 0px)); }
  /* 詳細画面: 検索バーを隠して appbar が縮むので、コンテンツ上余白と sec-tabs sticky 位置を一致させる */
  body.view-detail { padding-top: calc(56px + env(safe-area-inset-top, 0px)); }
  body.view-detail .sec-tabs { top: calc(56px + env(safe-area-inset-top, 0px)); }
  /* topbar-search は display:flex が固定で当たるため hidden 属性だけでは消えない。明示的に上書き */
  body.view-detail .topbar-search { display: none !important; }
  /* グローバル focus-visible: WCAG 対応 */
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, a:focus-visible {
    outline: 2px solid var(--primary); outline-offset: 2px;
  }
  .appbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff;
    /* iOS ノッチ分の上余白を確保し、ステータスバー領域も同色で塗る */
    padding: calc(8px + env(safe-area-inset-top, 0px)) 10px 10px;
    display: flex; flex-direction: column; gap: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,.15);
  }
  .appbar-row1 { display: flex; align-items: center; gap: 4px; min-height: 40px; }
  .appbar .icon-btn {
    width: 40px; height: 40px; background: rgba(255,255,255,.14); border: none; color: #fff;
    font-size: 20px; cursor: pointer; padding: 0; margin: 0 2px;
    display: flex; align-items: center; justify-content: center; border-radius: 10px;
    transition: background .15s;
  }
  .appbar .icon-btn:hover { background: rgba(255,255,255,.22); }
  .appbar .icon-btn:active { background: rgba(255,255,255,.28); }
  .appbar h1 { font-size: 17px; font-weight: 600; margin: 0; flex: 1; padding-left: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar-search {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,.95); border-radius: 8px;
    padding: 6px 12px; min-height: 36px;
  }
  .topbar-search .search-ico {
    width: 16px; height: 16px; opacity: .55; flex-shrink: 0;
    color: var(--text-sub);
  }
  .topbar-search .search-ico svg {
    width: 100%; height: 100%; fill: none; stroke: currentColor;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }
  .topbar-search input {
    flex: 1; border: none; outline: none; background: transparent;
    color: var(--text); font-size: 14px; padding: 4px 0; min-width: 0;
  }
  .topbar-search input::placeholder { color: var(--text-mute); }
  /* type="search" のブラウザ標準クリアボタン（Safari/Chrome）はカスタム .clear-btn と重複するため抑制 */
  .topbar-search input[type="search"] { -webkit-appearance: textfield; appearance: textfield; }
  .topbar-search input[type="search"]::-webkit-search-cancel-button,
  .topbar-search input[type="search"]::-webkit-search-decoration { -webkit-appearance: none; appearance: none; display: none; }
  .topbar-search .clear-btn {
    background: transparent; border: none; color: var(--text-mute);
    font-size: 16px; line-height: 1; cursor: pointer; padding: 4px;
    display: none;
  }
  .topbar-search.has-value .clear-btn { display: inline-flex; align-items: center; }
  .drawer-mask {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .drawer-mask.show { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 288px; max-width: 80vw; background: var(--surface);
    z-index: 201; transform: translateX(-100%); transition: transform 0.2s;
    box-shadow: 2px 0 12px rgba(0,0,0,0.18);
    display: flex; flex-direction: column;
  }
  .drawer.show { transform: translateX(0); }
  .drawer-header {
    background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff; padding: 22px 18px 18px;
  }
  .drawer-header .app-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; letter-spacing: .02em; }
  .drawer-header .user { font-size: 12px; opacity: 0.9; word-break: break-all; }
  .drawer-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .drawer-item {
    display: flex; align-items: center; padding: 12px 18px; cursor: pointer;
    color: var(--text); border-left: 4px solid transparent; font-size: 14px;
    min-height: 48px;
  }
  .drawer-item:hover { background: #f7f9fc; }
  .drawer-item:active { background: var(--primary-soft); }
  .drawer-item.active { background: var(--primary-soft); color: var(--primary-dark); border-left-color: var(--primary); font-weight: 600; }
  .drawer-item .ico { margin-right: 14px; font-size: 18px; width: 22px; height: 22px; text-align: center; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--text-sub); }
  .drawer-item.active .ico { color: var(--primary); }
  .drawer-item .ico svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .drawer-item .count {
    margin-left: auto; min-width: 26px; text-align: center;
    background: var(--gray-soft); color: var(--text-sub);
    padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 600;
  }
  .drawer-item.active .count { background: var(--primary); color: #fff; }
  .drawer-section-label {
    padding: 14px 18px 4px; font-size: 10px; color: var(--text-sub);
    font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  }
  .drawer-divider { border-top: 1px solid var(--border); margin: 6px 0; }
  /* searchbar は topbar-search に統合（後方互換のため空の擬似定義） */
  .searchbar { display: none; }
  .content { padding: 10px 12px; min-height: calc(100vh - 56px - 64px); }
  .filter-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--primary-soft); color: var(--primary-dark);
    padding: 6px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
    margin: 4px 0 10px 0;
    border: 1px solid rgba(21,101,192,.18);
  }
  /* ===== chips フィルタストリップ（モックアップ） ===== */
  .chips-bar {
    position: fixed; top: calc(102px + env(safe-area-inset-top, 0px)); left: 0; right: 0; z-index: 90;
    background: var(--surface); border-bottom: 1px solid var(--border);
    box-shadow: 0 2px 4px rgba(0,0,0,.04);
  }
  .chips-bar[hidden] { display: none !important; }
  .chips {
    display: flex; gap: 6px; padding: 8px 12px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 6px 12px; border-radius: 999px;
    background: var(--gray-soft); color: var(--text);
    font-size: 12px; font-weight: 500;
    border: 1px solid transparent;
    white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer; user-select: none;
  }
  .chip:hover { background: #e6e9ef; }
  .chip.active {
    background: var(--primary); color: #fff; border-color: var(--primary);
  }
  .chip-count {
    background: rgba(255,255,255,.3); color: inherit;
    padding: 1px 6px; border-radius: 8px; font-size: 11px; font-weight: 600;
    min-width: 18px; text-align: center;
  }
  .chip:not(.active) .chip-count {
    background: var(--surface); color: var(--text-sub);
  }
  /* ===== カード（モックアップ pcard ベース） ===== */
  .card {
    background: var(--surface); border-radius: 12px;
    box-shadow: var(--shadow);
    margin-bottom: 8px; padding: 12px 14px; cursor: pointer;
    border-left: 4px solid transparent;
    transition: background .12s, box-shadow .12s;
    content-visibility: auto;
    contain-intrinsic-size: 0 96px;
  }
  .card.has-thumb { display: flex; gap: 12px; align-items: flex-start; }
  .card-thumb {
    width: 56px; height: 56px; border-radius: 8px;
    background: var(--gray-soft); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-mute); font-size: 22px;
    overflow: hidden;
  }
  .card-thumb img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .card-body { flex: 1; min-width: 0; }
  .card:hover { box-shadow: var(--shadow-lg); }
  .card:active { background: #f7f9fc; }
  /* ステータスでの左ボーダー色分け（モックアップ s-* 互換） */
  .card.s-overdue { border-left-color: var(--danger); background: #fff8f8; }
  .card.s-shukka  { border-left-color: var(--primary); }
  .card.s-sokutei { border-left-color: var(--warning); }
  .card.s-sold    { border-left-color: var(--success); }
  .card-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .card-kanri { font-weight: 700; font-size: 15px; color: var(--primary); letter-spacing: .02em; }
  .card-status {
    margin-left: auto;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 6px;
    background: var(--gray-soft); color: var(--text-sub);
  }
  .card-status.sold { background: var(--danger-soft); color: var(--danger); }
  .card-status.measured { background: var(--success-soft); color: var(--success); }
  .card-status.shipping-pending { background: var(--warning-soft); color: var(--warning); }
  .card-status.shipped { background: var(--primary-soft); color: var(--primary); }
  .card-deadline {
    font-size: 11px; color: var(--text-sub); margin-top: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .card-deadline.overdue { color: var(--danger); font-weight: 700; }
  .card-deadline.today {
    color: var(--danger); font-weight: 700;
    background: var(--danger-soft); padding: 3px 8px; border-radius: 6px;
    border-left: 3px solid var(--danger); display: inline-flex;
    margin-top: 6px;
  }
  .img-field { display: flex; gap: 12px; align-items: flex-start; }
  .img-preview-wrap { position: relative; flex-shrink: 0; }
  .img-delete-btn {
    position: absolute; top: -8px; right: -8px;
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--danger, #e53935); color: white;
    border: 2px solid white;
    font-size: 14px; line-height: 1; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.25);
    padding: 0; z-index: 2;
  }
  .img-delete-btn:hover { background: #c62828; }
  .img-delete-btn:active { transform: scale(0.92); }
  .img-delete-btn.armed {
    background: #c62828; transform: scale(1.25);
    box-shadow: 0 0 0 4px rgba(229,57,53,.25), 0 1px 3px rgba(0,0,0,.3);
    animation: img-delete-pulse 0.6s ease-in-out infinite alternate;
  }
  @keyframes img-delete-pulse {
    from { box-shadow: 0 0 0 4px rgba(229,57,53,.25), 0 1px 3px rgba(0,0,0,.3); }
    to   { box-shadow: 0 0 0 7px rgba(229,57,53,.10), 0 1px 3px rgba(0,0,0,.3); }
  }
  /* 任意フィールドの ✕ クリアボタン（画像と同じ 2 段タップ・3 秒ルール） */
  .field-input-wrap {
    display: flex; align-items: flex-start; gap: 6px;
    width: 100%; min-width: 0;
  }
  .field-input-wrap > input,
  .field-input-wrap > select,
  .field-input-wrap > textarea {
    flex: 1 1 auto; min-width: 0; width: auto;
  }
  .field-input-wrap > .field-with-icon,
  .field-input-wrap > .yesno-toggle {
    flex: 1 1 auto; min-width: 0;
  }
  .field-input-wrap > a { flex: 0 0 auto; align-self: center; }
  .field-clear-btn {
    flex: 0 0 auto;
    width: 32px; height: 38px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    background: #f4f6fa; color: #8a93a3;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; line-height: 1; cursor: pointer;
    transition: background .12s, color .12s, border-color .12s, transform .08s;
  }
  .field-clear-btn:hover { background: #fde2e2; color: var(--danger, #e53935); border-color: #f5c2c2; }
  .field-clear-btn:active { transform: scale(0.94); }
  .field-clear-btn.armed {
    background: var(--danger, #e53935); color: #fff; border-color: var(--danger, #e53935);
    font-weight: 700;
    animation: field-clear-pulse 0.6s ease-in-out infinite alternate;
  }
  @keyframes field-clear-pulse {
    from { box-shadow: 0 0 0 0 rgba(229,57,53,.45); }
    to   { box-shadow: 0 0 0 5px rgba(229,57,53,.05); }
  }
  /* 狭いグリッド列内ではクリアボタンも一回り小さく */
  .field-grid-2 .field-clear-btn,
  .field-grid-3 .field-clear-btn,
  .meas-grid .field-clear-btn { width: 28px; height: 36px; }
  .img-preview {
    display: flex; align-items: center; justify-content: center;
    width: 96px; height: 96px; flex-shrink: 0;
    border: 1px solid var(--border); border-radius: 8px;
    background: #f7f9fc; overflow: hidden;
    font-size: 11px; color: var(--text-mute); text-align: center; padding: 4px;
    text-decoration: none; cursor: pointer;
  }
  .img-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .img-preview.img-loading { color: var(--primary); }
  .img-preview.img-error { color: var(--danger); background: var(--danger-soft); }
  .img-actions { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .img-upload-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; min-height: 38px;
    background: var(--primary); color: white;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer; align-self: flex-start; user-select: none;
    box-shadow: 0 1px 2px rgba(0,0,0,.08);
  }
  .img-upload-btn.ghost {
    background: var(--surface); color: var(--primary);
    border: 1px solid var(--primary); box-shadow: none;
  }
  .img-upload-btn:hover { background: var(--primary-dark); }
  .img-upload-btn.ghost:hover { background: var(--primary-soft); }
  .img-upload-btn:active { background: var(--primary-dark); }
  .img-hint { font-size: 11px; color: var(--text-sub); }
  .img-status { font-size: 12px; color: var(--text-sub); min-height: 16px; }
  .img-status.success { color: var(--success); }
  .img-status.error { color: var(--danger); }
  /* 画像拡大モーダル（タップで閉じる） */
  .img-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,.92);
    z-index: 9000; display: none;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .img-modal.show { display: flex; }
  .img-modal img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
  }
  .img-modal-close {
    position: absolute; top: 16px; right: 16px;
    width: 44px; height: 44px;
    background: rgba(255,255,255,.18); color: #fff;
    border: none; border-radius: 50%;
    font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  /* モーダル内の前後ナビ（複数画像があるときだけ表示） */
  .img-modal-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 48px; height: 72px;
    background: rgba(255,255,255,.18); color: #fff;
    border: none; border-radius: 8px;
    font-size: 32px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
  }
  .img-modal-prev { left: 12px; }
  .img-modal-next { right: 12px; }
  .img-modal-counter {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.55); color: #fff;
    padding: 4px 14px; border-radius: 999px;
    font-size: 13px; pointer-events: none;
  }
  /* 基本タブの画像プレビュー（hero 直下） */
  .basic-imgs {
    display: flex; gap: 10px; padding: 12px 12px 10px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    background: var(--surface); border-bottom: 1px solid var(--border);
    margin: 0 -12px;
  }
  .basic-imgs::-webkit-scrollbar { display: none; }
  .basic-img {
    width: 80px; height: 80px; flex-shrink: 0;
    border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; cursor: pointer;
    background: #f7f9fc;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--text-mute); text-align: center;
    box-shadow: 0 2px 4px rgba(0,0,0,.06);
    transition: transform .12s, box-shadow .12s, border-color .12s;
  }
  .basic-img:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(21,101,192,.18);
    border-color: var(--primary);
  }
  .basic-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  /* フィールド横並びグリッド */
  .field-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; padding: 12px 0; border-bottom: 1px solid #eef1f6; }
  /* 採寸記録: date入力と作業者selectが狭幅で被るため、狭い画面では1列に折り返す */
  @media (max-width: 600px) {
    .field-grid-2.fg-stack { grid-template-columns: 1fr; gap: 6px; padding: 8px 0 12px; }
    .field-grid-2.fg-stack > .field-row { padding: 4px 0; }
  }
  .field-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0 8px; padding: 12px 0; border-bottom: 1px solid #eef1f6; }
  .form-section > .field-grid-2:last-child, .form-section > .field-grid-3:last-child { border-bottom: none; }
  .field-grid-2 > .field-row, .field-grid-3 > .field-row {
    display: block; padding: 0; margin: 0; background: transparent; border-bottom: none;
    min-width: 0;
  }
  .meas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
  .meas-grid > .field-row { display: block; padding: 4px 0; margin: 0; background: transparent; border-bottom: none; min-width: 0; }
  .meas-grid > .field-row label { font-size: 11px; margin-bottom: 2px; }
  .meas-grid > .field-row input { padding: 8px 10px; font-size: 14px; min-height: 36px; }
  .group-header {
    font-size: 12px; font-weight: 700; color: var(--text-sub);
    margin: 14px 0 6px 0; padding: 4px 4px;
    text-transform: uppercase; letter-spacing: .04em;
    display: flex; align-items: center; gap: 8px;
  }
  .group-header::before {
    content: ''; width: 4px; height: 12px;
    background: var(--primary); border-radius: 2px;
  }
  .group-header .count { color: var(--primary); margin-left: auto; font-weight: 600; font-size: 11px; }
  /* 発送グループの折りたたみ用 details/summary。デフォルト開、見た目は group-header と統一 */
  details.group-fold { margin: 14px 0 6px 0; }
  details.group-fold > summary {
    list-style: none; cursor: pointer;
    font-size: 12px; font-weight: 700; color: var(--text-sub);
    padding: 4px 4px;
    text-transform: uppercase; letter-spacing: .04em;
    display: flex; align-items: center; gap: 8px;
  }
  details.group-fold > summary::-webkit-details-marker { display: none; }
  details.group-fold > summary::before {
    content: '▶'; font-size: 10px; color: var(--text-sub);
    transition: transform .15s; flex-shrink: 0;
  }
  details.group-fold[open] > summary::before { transform: rotate(90deg); }
  details.group-fold > summary .count { color: var(--primary); margin-left: auto; font-weight: 600; font-size: 11px; }
  /* 進捗ピル（カード内: 採寸✓ / 撮影✓ / 出品✓ などを横並びで表示） */
  .card-pills { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .card-pill {
    display: inline-flex; align-items: center; gap: 2px;
    font-size: 10px; line-height: 1; padding: 3px 6px;
    border-radius: 999px; background: var(--gray-soft); color: var(--text-mute);
    white-space: nowrap;
  }
  .card-pill.done { background: #e8f5e9; color: #2e7d32; font-weight: 600; }
  .card-pill .ico { font-size: 10px; }
  /* コンパクト密度: カードの余白とピルを縮める */
  body.density-compact .card { padding: 6px 10px; gap: 8px; }
  body.density-compact .card-thumb { width: 56px; height: 56px; }
  body.density-compact .card-pills { display: none; }
  body.density-compact .card-row2 { font-size: 12px; }
  /* 表示メニュー chip（並び順/密度の切替） */
  .chip.chip-menu { background: transparent; border: 1px dashed var(--border); color: var(--text-sub); }
  .chip.chip-menu:hover { background: var(--gray-soft); }
  /* 並び順 / 密度 のポップオーバーメニュー */
  .popover-menu {
    position: absolute; z-index: 1000;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
    padding: 6px; min-width: 160px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .popover-menu .menu-section-title {
    font-size: 11px; font-weight: 700; color: var(--text-mute);
    padding: 6px 8px 2px; text-transform: uppercase; letter-spacing: .04em;
  }
  .popover-menu .menu-item {
    text-align: left; padding: 8px 10px; border-radius: 6px;
    background: transparent; border: none; cursor: pointer;
    font-size: 13px; color: var(--text);
  }
  .popover-menu .menu-item:hover { background: var(--gray-soft); }
  .popover-menu .menu-item.on { color: var(--primary); font-weight: 600; }
  /* 作業者管理の横スクロールヒント（右端フェード + 画面外マーカー） */
  .sagyou-wrap { position: relative; }
  .sagyou-wrap.has-overflow::after {
    content: ''; position: absolute; top: 12px; bottom: 12px; right: 12px;
    width: 28px; pointer-events: none;
    background: linear-gradient(to right, transparent, var(--bg, #f5f6f8) 80%);
  }
  .sagyou-scrollhint {
    text-align: right; font-size: 11px; color: var(--text-mute);
    padding: 0 16px 8px; user-select: none;
  }
  /* P2 #88: AIタブカードのコンパクト化 — 2列グリッド + 主要4項目のみ表示 */
  .ai-card {
    background: var(--surface); border-radius: 10px; box-shadow: var(--shadow);
    padding: 10px 12px; cursor: pointer; transition: background .12s, box-shadow .12s;
    border-left: 3px solid var(--primary-soft);
  }
  .ai-card:hover { box-shadow: var(--shadow-lg); }
  .ai-card:active { background: #f7f9fc; }
  .ai-card .ai-kanri { font-weight: 700; font-size: 14px; color: var(--primary); margin-bottom: 4px; letter-spacing: .02em; }
  .ai-card .ai-brand { font-size: 13px; color: var(--text); font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* P2 #90: 仕入れ進捗バーのグラデーション */

  /* セクション = ヘッダ＋本体 が連結したカード */

    border: 1px solid var(--border); border-radius: 8px;
    font-size: 16px; background: var(--surface); box-sizing: border-box;
  }
  .modal .field-row input:focus, .modal .field-row select:focus, .modal .field-row textarea:focus {
    outline: none; border-color: var(--primary); background: #fff; box-shadow: var(--focus-ring);
  }
  .modal .field-row textarea { resize: vertical; min-height: 60px; }
  .modal .field-row .req { color: var(--danger); margin-left: 4px; }
  .modal-actions {
    display: flex; gap: 8px; margin-top: 16px; padding: 12px 0 4px;
    border-top: 1px solid var(--border);
    position: sticky; bottom: 0; background: var(--surface); z-index: 5;
  }
  .field-row:has(input[type="date"]) { cursor: pointer; }
  .field-row:has(input[type="date"]) label { cursor: pointer; }
  .modal-actions button {
    flex: 1; padding: 12px; min-height: 48px; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .modal-actions .btn-cancel { background: var(--gray-soft); color: var(--text); }
  .modal-actions .btn-cancel:hover { background: #e3e7ee; }
  .modal-actions .btn-submit { background: var(--primary); color: #fff; }
  .modal-actions .btn-submit:hover { background: var(--primary-dark); }
  .modal-actions .btn-submit:disabled { background: #bdbdbd; cursor: not-allowed; }
  .modal .hint { color: var(--text-sub); font-size: 12px; padding: 4px 0 8px; }
  /* 詳細離脱時の案内シート（保存/破棄/キャンセル） */
  .leave-sheet-mask {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 250;
    align-items: flex-end; justify-content: center;
  }
  .leave-sheet-mask.show { display: flex; }
  .leave-sheet {
    width: 100%; max-width: 480px; background: var(--surface);
    border-radius: 14px 14px 0 0; padding: 18px 16px 16px;
    max-height: 75vh; overflow-y: auto;
    box-shadow: 0 -8px 24px rgba(0,0,0,.2);
  }
  .leave-sheet h3 {
    margin: 0 0 6px; font-size: 16px; font-weight: 700; color: var(--text);
  }
  .leave-sheet .sub {
    color: var(--text-sub); font-size: 12px; margin-bottom: 10px;
  }
  .leave-sheet .changes {
    list-style: none; padding: 0; margin: 0 0 14px;
    border: 1px solid var(--border); border-radius: 10px;
    background: #fafbfd; max-height: 38vh; overflow-y: auto;
  }
  .leave-sheet .changes li {
    padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .leave-sheet .changes li:last-child { border-bottom: none; }
  .leave-sheet .changes strong {
    color: var(--text); font-weight: 600; margin-right: 6px;
  }
  .leave-sheet .changes .arr { color: var(--text-sub); margin: 0 4px; }
  .leave-sheet .changes .before { color: var(--text-sub); text-decoration: line-through; }
  .leave-sheet .changes .after { color: #d84315; font-weight: 600; }
  .leave-sheet-actions {
    display: flex; flex-direction: column; gap: 8px;
  }
  .leave-sheet-actions button {
    padding: 13px; min-height: 48px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer; width: 100%;
  }
  .leave-sheet-actions .ls-save { background: var(--primary); color: #fff; }
  .leave-sheet-actions .ls-save:hover { background: var(--primary-dark); }
  .leave-sheet-actions .ls-save:disabled { background: #bdbdbd; cursor: not-allowed; }
  .leave-sheet-actions .ls-discard {
    background: #fff; color: var(--danger); border: 1px solid var(--danger);
  }
  .leave-sheet-actions .ls-cancel {
    background: var(--gray-soft); color: var(--text);
  }
  .size-help-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 50%;
    border: 1px solid var(--primary); background: #fff;
    color: var(--primary); font-size: 11px; font-weight: 700;
    cursor: pointer; padding: 0; line-height: 1; vertical-align: middle;
    margin-left: 6px;
  }
  .size-help-btn:hover { background: var(--primary); color: #fff; }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 300; display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-overlay .modal-content {
    background: var(--surface); border-radius: 14px; max-width: 520px; width: 100%;
    max-height: 85vh; overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 14px 32px rgba(0,0,0,.18);
  }
  .modal-overlay .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .modal-overlay .modal-header h3 { margin: 0; font-size: 16px; font-weight: 700; }
  .modal-overlay .modal-close {
    background: none; border: none; font-size: 22px; cursor: pointer;
    color: var(--text-sub); padding: 0; width: 36px; height: 36px;
    border-radius: 8px;
  }
  .modal-overlay .modal-close:hover { background: var(--gray-soft); }
  .modal-overlay .modal-body { padding: 16px; overflow-y: auto; }
  /* あり/なし トグル */
  .yesno-toggle { display: inline-flex; gap: 6px; flex-wrap: wrap; }
  .yesno-btn {
    padding: 8px 14px; min-width: 56px; min-height: 40px;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--text); border-radius: 8px;
    font-size: 14px; font-weight: 500; cursor: pointer; user-select: none;
  }
  /* 狭いグリッド列ではトグルもコンパクト化（折り返し抑制） */
  .field-grid-2 > .field-row .yesno-btn {
    padding: 6px 10px; min-width: 44px; min-height: 36px; font-size: 13px;
  }
  .yesno-btn.yesno-yes.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .yesno-btn.yesno-no.active  { background: var(--danger); color: #fff; border-color: var(--danger); }
  .yesno-btn.yesno-clear { padding: 8px 10px; min-width: 36px; color: var(--text-sub); }
  .yesno-btn.yesno-clear.active { background: var(--gray-soft); color: var(--text); border-color: #aaa; }
  .yesno-btn:hover { filter: brightness(0.97); }
  /* textarea 自動拡張 */
  textarea.auto-grow {
    min-height: 40px; max-height: 480px;
    overflow-y: auto; resize: vertical;
    font-family: inherit; font-size: 14px; line-height: 1.5;
  }
  /* 商品一覧のリストメタ（件数・並び替え） */
  .list-meta {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 4px 8px; font-size: 12px; color: var(--text-sub);
  }
  /* ===== PC レイアウト調整（768px 以上） ===== */
  @media (min-width: 768px) {
    body { padding-left: 16px; padding-right: 16px; }
    .content { max-width: 1100px; margin: 0 auto; padding: 16px; }
    .field-row { display: grid; grid-template-columns: 140px 1fr; align-items: start; gap: 14px; padding: 12px 0; }
    .field-row label { margin-bottom: 0; padding-top: 8px; }
    /* グリッド内の field-row は PC でもブロック表示（label + input 縦並び） */
    .field-grid-2 > .field-row, .field-grid-3 > .field-row, .meas-grid > .field-row {
      display: block; padding: 0; margin: 0; background: transparent;
    }
    .meas-grid > .field-row { padding: 4px 0; }
    .field-grid-2 > .field-row label, .field-grid-3 > .field-row label, .meas-grid > .field-row label {
      padding-top: 0;
    }
    .form-section { padding: 0 18px; }
    .product-info { padding: 18px 20px; }
    .product-info h2 { font-size: 24px; }
    /* sec-tabs を viewport 幅に full-bleed して appbar と揃え、
       タブを均等分散（各タブ flex: 1）して右端まで広げる。
       overflow-x: auto は PC では不要（横スクロール不要・常に全タブ可視）。*/
    .sec-tabs {
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
      padding-left: max(16px, calc(50vw - 550px));
      padding-right: max(16px, calc(50vw - 550px));
      overflow-x: visible;
      box-sizing: border-box;
    }
    .sec-tab { flex: 1 1 0; text-align: center; padding: 14px 8px; font-size: 14px; }
    /* chips-bar は固定。内側 .chips は content と揃える（PC で帯が左寄せにならないよう全幅化） */
    .chips {
      padding-left: max(12px, calc(50vw - 534px));
      padding-right: max(12px, calc(50vw - 534px));
    }
    /* bottomnav も PC では均等分散（mobile の inline-flex+min-width だと左に固まる） */
    .bottomnav { overflow-x: visible; }
    .bottomnav-inner {
      display: flex;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 16px;
      box-sizing: border-box;
    }
    .bottomnav button { flex: 1 1 0; min-width: 0; }
  }
  /* ===== 売上ダッシュボード ===== */
  .dash-wrap { display: flex; flex-direction: column; gap: 14px; padding: 4px 0 24px; }
  .dash-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 16px; box-shadow: var(--shadow);
  }
  .dash-card.primary {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff; border: none;
  }
  .dash-card.primary .dash-label,
  .dash-card.primary .dash-sub { color: rgba(255,255,255,.85); }
  .dash-card.primary .dash-num { color: #fff; }
  .dash-head {
    display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
    margin-bottom: 8px;
  }
  .dash-title { font-size: 13px; font-weight: 600; opacity: .9; letter-spacing: .02em; }
  .dash-period { font-size: 12px; opacity: .7; }
  .dash-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 16px;
  }
  .dash-grid.three { grid-template-columns: repeat(3, 1fr); }
  .dash-cell { min-width: 0; }
  .dash-label { font-size: 11px; color: var(--text-mute); margin-bottom: 2px; letter-spacing: .04em; }
  .dash-num {
    font-size: 22px; font-weight: 700; color: var(--text);
    font-variant-numeric: tabular-nums; letter-spacing: -.01em;
    word-break: keep-all; white-space: nowrap;
  }
  .dash-num.small { font-size: 16px; font-weight: 600; }
  .dash-sub { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
  .dash-delta { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 999px; display: inline-block; }
  .dash-delta.up { background: var(--success-soft); color: var(--success); }
  .dash-delta.down { background: var(--danger-soft); color: var(--danger); }
  .dash-delta.flat { background: var(--gray-soft); color: var(--text-sub); }
  .dash-card.primary .dash-delta.up { background: rgba(255,255,255,.22); color: #e0ffe0; }
  .dash-card.primary .dash-delta.down { background: rgba(255,255,255,.22); color: #ffd6d6; }
  .dash-card.primary .dash-delta.flat { background: rgba(255,255,255,.18); color: rgba(255,255,255,.85); }
  /* 棒グラフ（月別）— 棒とラベルを同じ flex セルにまとめて構造的にズレを防止
     高さは JS で px 直書き、絶対配置を撤廃して iOS Safari でも崩れない作り */
  .dash-bars-wrap { display: flex; gap: 4px; margin: 6px 0 4px; }
  .dash-bar-cell { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; align-items: center; }
  .dash-bar-track { width: 100%; height: 140px; display: flex; align-items: flex-end; justify-content: center; }
  .dash-bar-fill {
    width: 22px; max-width: 100%; min-height: 2px; border-radius: 4px 4px 0 0;
    background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
    transition: height .3s;
  }
  .dash-bar-cell.current .dash-bar-fill {
    background: linear-gradient(180deg, var(--accent) 0%, #c54a00 100%);
  }
  .dash-bar-cell.future .dash-bar-fill { background: var(--border); }
  .dash-bar-lab { font-size: 10px; color: var(--text-mute); text-align: center; margin-top: 3px; line-height: 1; }
  .dash-bar-cell.current .dash-bar-lab { color: var(--accent); font-weight: 700; }
  /* 月別表 */
  .dash-month-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 6px; }
  .dash-month-table th, .dash-month-table td {
    padding: 6px 8px; text-align: right; border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  .dash-month-table th { color: var(--text-mute); font-weight: 500; font-size: 11px; }
  .dash-month-table td.label { text-align: left; color: var(--text-sub); }
  .dash-month-table tr.current td { background: #fff8f0; font-weight: 600; }
  /* 前月比/前年比のラベル付きスタック表示 */
  .dash-deltas { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-top: 12px; }
  .dash-delta-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; }
  .dash-delta-item .lab { opacity: .8; }
  .dash-card.primary .dash-delta-item .lab { color: rgba(255,255,255,.85); }
  /* 年切替ボタン */
  .dash-yearbar { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 10px; }
  .dash-yearbar button {
    border: 1px solid var(--border); background: var(--surface); color: var(--text-sub);
    border-radius: 999px; padding: 6px 14px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background .12s, color .12s, border-color .12s;
    font-family: inherit;
  }
  .dash-yearbar button:hover { background: var(--gray-soft); color: var(--text); }
  .dash-yearbar button.active {
    background: var(--primary); color: #fff; border-color: var(--primary);
  }
  /* 通年カードの 今年/前年 並列レイアウト */
  .dash-yoy { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 6px; }
  .dash-yoy-cell {
    background: var(--bg); border-radius: 10px; padding: 10px 12px; min-width: 0;
  }
  .dash-yoy-cell .yoy-label { font-size: 11px; color: var(--text-mute); margin-bottom: 4px; letter-spacing: .04em; }
  .dash-yoy-cell .yoy-gross { font-size: 18px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
  .dash-yoy-cell .yoy-sub { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
  @media (max-width: 480px) {
    .dash-num { font-size: 20px; }
    .dash-num.small { font-size: 14px; }
    .dash-bar-track { height: 110px; }
    .dash-month-table th:nth-child(4), .dash-month-table td:nth-child(4) { display: none; }
    .dash-deltas { flex-direction: column; gap: 6px; align-items: flex-start; }
    .dash-yoy { grid-template-columns: 1fr; }
  }
</style>
</head>
