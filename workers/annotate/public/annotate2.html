<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>キーポイント アノテーション</title>
<meta name="theme-color" content="#1a1a2e">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,'Hiragino Sans',sans-serif; background:#111; color:#fff; }
.header { padding:8px 16px; background:#1a1a2e; font-size:14px; font-weight:600; }
.mode-bar { padding:10px 12px; text-align:center; font-size:14px; background:#e94560; color:#fff; min-height:40px; }
.float-label { display:none; position:fixed; z-index:200; pointer-events:none;
  background:rgba(233,69,96,0.9); color:#fff; font-size:12px; font-weight:600;
  padding:4px 10px; border-radius:16px; transform-origin:0 0; white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,0.5); }
.container { display:flex; height:calc(100vh - 90px); }
.image-area { flex:1; position:relative; overflow:hidden; background:#000;
  touch-action:manipulation; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none;
  transition:transform 0.3s ease; }
.image-area img { width:100%; height:100%; object-fit:contain;
  -webkit-touch-callout:none; pointer-events:none; }
.panel { width:320px; background:#1a1a1a; display:flex; flex-direction:column; }
.panel-scroll { flex:1; overflow-y:auto; padding:12px; }
.panel-actions { padding:10px 12px; border-top:1px solid #333; }

.cat-select { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:12px; }
.cat-btn { padding:6px 10px; background:#333; border:none; color:#aaa; font-size:12px;
  border-radius:6px; cursor:pointer; }
.cat-btn.active { background:#e94560; color:#fff; }

.measure-form { padding:10px; background:#1a1a2e; border-radius:8px; margin-bottom:12px; }
.measure-form h4 { font-size:13px; margin-bottom:8px; color:#aaa; }
.measure-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.measure-row label { font-size:12px; color:#ccc; width:70px; flex-shrink:0; }
.measure-row input { flex:1; padding:6px 8px; background:#222; border:1px solid #444; color:#fff;
  border-radius:4px; font-size:16px; text-align:right; }
.measure-row span { font-size:11px; color:#888; width:24px; }

.kp-list { list-style:none; }
.kp-item { padding:8px 10px; margin-bottom:3px; border-radius:6px; font-size:13px;
  display:flex; justify-content:space-between; align-items:center; }
.kp-item.done { background:#1a2a1a; color:#69f0ae; }
.kp-item.current { background:#e94560; color:#fff; font-weight:600; }
.kp-item.pending { background:#222; color:#666; }
.kp-name { flex:1; margin-left:8px; }
.kp-coord { font-size:10px; color:#888; }

.dot {
  position:absolute; width:28px; height:28px; border-radius:50%;
  transform:translate(-50%,-50%); z-index:10; cursor:grab;
  border:2px solid #fff; touch-action:none;
  background:linear-gradient(rgba(255,255,255,0.8),rgba(255,255,255,0.8)) center/1px 8px no-repeat,
    linear-gradient(rgba(255,255,255,0.8),rgba(255,255,255,0.8)) center/8px 1px no-repeat;
}
.dot::after { content:''; position:absolute; top:-10px; left:-10px; right:-10px; bottom:-10px; }
.dot.selected { width:36px; height:36px; border:3px solid #fff;
  box-shadow:0 0 20px rgba(0,150,255,0.9), 0 0 40px rgba(0,150,255,0.4);
  background:linear-gradient(#fff,#fff) center/2px 14px no-repeat,
    linear-gradient(#fff,#fff) center/14px 2px no-repeat, rgba(0,100,255,0.5);
  animation:pulse 1s ease-in-out infinite; }
@keyframes pulse {
  0%,100% { box-shadow:0 0 20px rgba(0,150,255,0.9), 0 0 40px rgba(0,150,255,0.4); }
  50% { box-shadow:0 0 30px rgba(0,150,255,1), 0 0 60px rgba(0,150,255,0.6); }
}
.dot-label { position:absolute; font-size:9px; font-weight:700; color:#fff; width:16px; height:16px;
  line-height:16px; text-align:center; border-radius:50%; z-index:11; pointer-events:none; }
.a4-dot {
  position:absolute; width:28px; height:28px; border-radius:50%;
  transform:translate(-50%,-50%); z-index:9; cursor:grab;
  border:2px solid #fbbf24; touch-action:none;
  background:linear-gradient(rgba(251,191,36,0.8),rgba(251,191,36,0.8)) center/1px 10px no-repeat,
    linear-gradient(rgba(251,191,36,0.8),rgba(251,191,36,0.8)) center/10px 1px no-repeat,
    rgba(251,191,36,0.2);
}
.a4-dot::after { content:''; position:absolute; top:-10px; left:-10px; right:-10px; bottom:-10px; }
.a4-dot.a4-selected { width:36px; height:36px; border:3px solid #fbbf24;
  box-shadow:0 0 20px rgba(251,191,36,0.9), 0 0 40px rgba(251,191,36,0.4);
  animation:pulse-a4 1s ease-in-out infinite; }
@keyframes pulse-a4 {
  0%,100% { box-shadow:0 0 20px rgba(251,191,36,0.9), 0 0 40px rgba(251,191,36,0.4); }
  50% { box-shadow:0 0 30px rgba(251,191,36,1), 0 0 60px rgba(251,191,36,0.6); }
}
.a4-label { position:absolute; font-size:10px; font-weight:700; color:#000; background:#fbbf24;
  padding:1px 5px; border-radius:3px; white-space:nowrap; z-index:11; pointer-events:none; }

.btn { display:block; width:100%; padding:10px; border:none; border-radius:8px;
  font-size:13px; font-weight:600; cursor:pointer; margin-bottom:6px; text-align:center; }
.btn-primary { background:#e94560; color:#fff; }
.btn-secondary { background:#333; color:#ccc; }
.btn-success { background:#2e7d32; color:#fff; }
.btn:disabled { opacity:0.4; }

.error-table { margin-top:10px; padding:8px; background:#1a1a2e; border-radius:8px; font-size:12px; }
.error-table h4 { font-size:12px; color:#aaa; margin-bottom:6px; }
.error-row { display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid #333; }
.error-row .name { color:#ccc; }
.error-row .val { color:#69f0ae; }
.error-row .diff { font-weight:700; }
.error-row .diff.ok { color:#69f0ae; }
.error-row .diff.warn { color:#fbbf24; }
.error-row .diff.bad { color:#ff4444; }
.result { padding:12px; background:#1a2a1a; border-radius:8px; margin-top:8px;
  font-size:11px; font-family:monospace; white-space:pre-wrap; max-height:200px; overflow-y:auto; color:#69f0ae; }

@media (max-width:768px) {
  .container { flex-direction:column; height:auto; }
  .image-area { width:100%; height:45vh; }
  .panel { width:100%; }
  .panel-actions { position:fixed; bottom:0; left:0; right:0; background:#1a1a1a;
    padding:10px 16px; padding-bottom:max(10px, env(safe-area-inset-bottom)); z-index:50; }
  .panel-scroll { padding-bottom:140px; }
}
.confirm-overlay { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.6);
  z-index:300; align-items:center; justify-content:center; }
.confirm-box { background:#222; border-radius:12px; padding:20px; margin:20px; max-width:320px; text-align:center; }
.confirm-msg { font-size:14px; color:#fff; margin-bottom:16px; }
.confirm-btns { display:flex; gap:10px; }
.confirm-btns button { flex:1; padding:10px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
.confirm-yes { background:#e94560; color:#fff; }
.confirm-no { background:#444; color:#ccc; }
}
</style>
</head>
<body>

<div class="header" style="display:flex;justify-content:space-between;align-items:center">
  <span>キーポイント アノテーション</span>
  <span style="display:flex;align-items:center;gap:8px">
    <span id="saveCount" style="font-size:12px;color:#69f0ae;font-weight:600">読み込み中...</span>
    <button onclick="location.reload()" style="background:none;border:1px solid #555;color:#aaa;font-size:11px;padding:2px 8px;border-radius:4px;cursor:pointer">↻</button>
  </span>
</div>
<div class="confirm-overlay" id="confirmDialog">
  <div class="confirm-box">
    <p class="confirm-msg"></p>
    <div class="confirm-btns">
      <button class="confirm-no" onclick="confirmNo()">キャンセル</button>
      <button class="confirm-yes" onclick="confirmYes()">OK</button>
    </div>
  </div>
</div>
<div class="mode-bar" id="modeBar">カテゴリを選んで実寸を入力してください</div>
<div class="float-label" id="floatLabel"></div>

<div class="container">
  <div class="image-area" id="imageArea">
    <img id="img" draggable="false">
  </div>
  <div class="panel">
    <div class="panel-scroll">
      <div class="cat-select">
        <button class="cat-btn active" onclick="setCat('tops')">トップス</button>
        <button class="cat-btn" onclick="setCat('jacket')">ジャケット・アウター</button>
        <button class="cat-btn" onclick="setCat('pants')">パンツ</button>
        <button class="cat-btn" onclick="setCat('skirt')">スカート</button>
        <button class="cat-btn" onclick="setCat('dress')">ワンピース</button>
        <button class="cat-btn" onclick="setCat('bridal')">ドレス・ブライダル</button>
        <button class="cat-btn" onclick="setCat('suit')">スーツ・フォーマル</button>
        <button class="cat-btn" onclick="setCat('roomwear')">ルームウェア・パジャマ</button>
        <button class="cat-btn" onclick="setCat('salopette')">サロペット・オーバーオール</button>
        <button class="cat-btn" onclick="setCat('maternity')">マタニティ</button>
      </div>
      <div id="subSelect" style="display:none;margin-bottom:8px">
        <span style="font-size:12px;color:#aaa;margin-right:6px">上下:</span>
        <button class="cat-btn active" id="subTop" onclick="setSubCat('top')">上（トップス）</button>
        <button class="cat-btn" id="subBottom" onclick="setSubCat('bottom')">下（パンツ）</button>
      </div>
      <div id="catGuide" style="margin-bottom:8px;padding:6px 10px;background:#222;border-radius:6px;font-size:11px;color:#aaa;display:none"></div>
      <div id="measureForm"></div>
      <ul class="kp-list" id="kpList"></ul>
      <div id="errorTable"></div>
      <div class="result" id="result" style="display:none"></div>
    </div>
    <div class="panel-actions">
      <label class="btn btn-primary" id="selectBtn" style="display:block">
        写真を選択<input type="file" accept="image/*" style="display:none" onchange="onFile(event)">
      </label>
      <button class="btn btn-secondary" id="undoBtn" onclick="undo()" style="display:none">1つ戻る</button>
      <button class="btn btn-primary" id="a4NextBtn" onclick="confirmA4()" style="display:none">A4確定 → キーポイントへ</button>
      <button class="btn btn-success" id="saveBtn" onclick="save()" style="display:none">保存して次へ</button>
    </div>
  </div>
</div>

<script>
const CAT_JP = {tops:'トップス',jacket:'ジャケット・アウター',pants:'パンツ',skirt:'スカート',dress:'ワンピース',bridal:'ドレス・ブライダル',suit:'スーツ・フォーマル',roomwear:'ルームウェア・パジャマ',salopette:'サロペット・オーバーオール',maternity:'マタニティ'};

const MEASURES = {
  tops: ['肩幅','袖丈','裄丈','身幅','着丈'],
  jacket: ['肩幅','袖丈','裄丈','身幅','着丈'],
  suit_top: ['肩幅','袖丈','裄丈','身幅','着丈'],
  suit_bottom: ['ウエスト','ヒップ','総丈','股上','股下','ワタリ','裾幅'],
  roomwear_top: ['肩幅','袖丈','裄丈','身幅','着丈'],
  roomwear_bottom: ['ウエスト','ヒップ','総丈','股上','股下','ワタリ','裾幅'],
  maternity: ['肩幅','袖丈','裄丈','身幅','着丈'],
  pants: ['ウエスト','ヒップ','総丈','股上','股下','ワタリ','裾幅'],
  skirt: ['ウエスト','ヒップ','総丈'],
  dress: ['肩幅','袖丈','裄丈','身幅','着丈','ウエスト'],
  bridal: ['肩幅','袖丈','身幅','着丈','ウエスト'],
  salopette: ['肩幅','身幅','総丈','股下'],
};

const DEFS = {
  tops: [
    {name:'collar_center', jp:'①襟中心', color:'#ff0000'},
    {name:'left_shoulder', jp:'②左肩先', color:'#0066ff'},
    {name:'right_shoulder', jp:'③右肩先', color:'#0066ff'},
    {name:'left_armpit', jp:'④左脇下', color:'#00cc00'},
    {name:'right_armpit', jp:'⑤右脇下', color:'#00cc00'},
    {name:'left_cuff', jp:'⑥左袖口', color:'#ffcc00'},
    {name:'right_cuff', jp:'⑦右袖口', color:'#ffcc00'},
    {name:'hem_left', jp:'⑧裾左端', color:'#ff00ff'},
    {name:'hem_right', jp:'⑨裾右端', color:'#ff00ff'},
    {name:'hem_center', jp:'⑩裾中心', color:'#ff0000'},
  ],
  pants: [
    {name:'waist_left', jp:'①ウエスト左', color:'#ff0000'},
    {name:'waist_right', jp:'②ウエスト右', color:'#ff0000'},
    {name:'waist_center', jp:'③ウエスト中心', color:'#ff0000'},
    {name:'hip_left', jp:'④ヒップ左', color:'#00cc00'},
    {name:'hip_right', jp:'⑤ヒップ右', color:'#00cc00'},
    {name:'crotch', jp:'⑥股', color:'#00cc00'},
    {name:'thigh_outer', jp:'⑦ワタリ外端', color:'#ffcc00'},
    {name:'left_hem', jp:'⑧左裾', color:'#ff00ff'},
    {name:'right_hem', jp:'⑨右裾', color:'#ff00ff'},
    {name:'hem_center', jp:'⑩裾中心', color:'#ff00ff'},
  ],
  skirt: [
    {name:'waist_left', jp:'①ウエスト左', color:'#ff0000'},
    {name:'waist_right', jp:'②ウエスト右', color:'#ff0000'},
    {name:'waist_center', jp:'③ウエスト中心', color:'#ff0000'},
    {name:'hip_left', jp:'④ヒップ左', color:'#00cc00'},
    {name:'hip_right', jp:'⑤ヒップ右', color:'#00cc00'},
    {name:'hem_left', jp:'⑥裾左端', color:'#ff00ff'},
    {name:'hem_right', jp:'⑦裾右端', color:'#ff00ff'},
    {name:'hem_center', jp:'⑧裾中心', color:'#ff00ff'},
  ],
  dress: [
    {name:'collar_center', jp:'①襟中心', color:'#ff0000'},
    {name:'left_shoulder', jp:'②左肩先', color:'#0066ff'},
    {name:'right_shoulder', jp:'③右肩先', color:'#0066ff'},
    {name:'left_armpit', jp:'④左脇下', color:'#00cc00'},
    {name:'right_armpit', jp:'⑤右脇下', color:'#00cc00'},
    {name:'left_cuff', jp:'⑥左袖口', color:'#ffcc00'},
    {name:'right_cuff', jp:'⑦右袖口', color:'#ffcc00'},
    {name:'hem_left', jp:'⑧裾左端', color:'#ff00ff'},
    {name:'hem_right', jp:'⑨裾右端', color:'#ff00ff'},
    {name:'hem_center', jp:'⑩裾中心', color:'#ff0000'},
    {name:'waist_left', jp:'⑪ウエスト左', color:'#00ffff'},
    {name:'waist_right', jp:'⑫ウエスト右', color:'#00ffff'},
  ],
  salopette: [
    {name:'left_strap_top', jp:'①左肩紐上', color:'#0066ff'},
    {name:'right_strap_top', jp:'②右肩紐上', color:'#0066ff'},
    {name:'left_armpit', jp:'③左脇下', color:'#00cc00'},
    {name:'right_armpit', jp:'④右脇下', color:'#00cc00'},
    {name:'waist_left', jp:'⑤ウエスト左', color:'#00ffff'},
    {name:'waist_right', jp:'⑥ウエスト右', color:'#00ffff'},
    {name:'crotch', jp:'⑦股', color:'#00cc00'},
    {name:'left_hem', jp:'⑧左裾', color:'#ff00ff'},
    {name:'right_hem', jp:'⑨右裾', color:'#ff00ff'},
    {name:'hem_center', jp:'⑩裾中心', color:'#ff00ff'},
  ],
};
DEFS.jacket = DEFS.tops;
DEFS.suit_top = DEFS.tops;
DEFS.suit_bottom = DEFS.pants;
DEFS.roomwear_top = DEFS.tops;
DEFS.roomwear_bottom = DEFS.pants;
DEFS.maternity = DEFS.tops;
DEFS.bridal = DEFS.dress;

// suit/roomwearの上下サブカテゴリ
let subCat = 'top'; // 'top' or 'bottom'
const HAS_SUB = ['suit','roomwear'];

// 実際に使うDEFS/MEASURES/MAPのキーを返す
function effectiveCat() {
  if(HAS_SUB.includes(cat)) return cat + '_' + subCat;
  return cat;
}

// 撮影方向とカテゴリ別ガイド
const CAT_GUIDE = {
  tops: {side:'背面', notes:['襟は着丈に含めない（襟の付け根からが着丈の起点）','袖口は袖の上端にドットを合わせる']},
  jacket: {side:'背面', notes:['襟は着丈に含めない','袖口は袖の上端にドットを合わせる']},
  suit_top: {side:'背面', notes:['襟は着丈に含めない','袖口は袖の上端にドットを合わせる']},
  suit_bottom: {side:'正面', notes:[]},
  roomwear_top: {side:'背面', notes:['襟は着丈に含めない','袖口は袖の上端にドットを合わせる']},
  roomwear_bottom: {side:'正面', notes:[]},
  maternity: {side:'背面', notes:['襟は着丈に含めない','袖口は袖の上端にドットを合わせる']},
  pants: {side:'正面', notes:[]},
  skirt: {side:'正面', notes:[]},
  dress: {side:'背面', notes:['襟は着丈に含めない','袖口は袖の上端にドットを合わせる']},
  bridal: {side:'背面', notes:['襟は着丈に含めない','袖口は袖の上端にドットを合わせる']},
  salopette: {side:'正面', notes:[]},
};

function renderCatGuide() {
  const g = CAT_GUIDE[effectiveCat()];
  const el = document.getElementById('catGuide');
  if(!g) { el.style.display = 'none'; return; }
  const sideColor = g.side === '正面' ? '#69f0ae' : '#fbbf24';
  let html = `<span style="color:${sideColor};font-weight:700">📷 ${g.side}から撮影</span>`;
  if(g.notes.length) html += '<br>' + g.notes.map(n => `・${n}`).join('<br>');
  el.innerHTML = html;
  el.style.display = 'block';
}

let cat = localStorage.getItem('annotate_cat') || 'tops';
let WORKER = localStorage.getItem('annotate_worker') || '';
if(!WORKER) {
  WORKER = prompt('お名前を入力してください（初回のみ）');
  if(WORKER) { WORKER = WORKER.trim(); localStorage.setItem('annotate_worker', WORKER); }
}
let points = [];
let dots = [];
let a4Points = []; // A4の4隅座標 [{x,y}, ...]
let a4Dots = [];
let phase = 'a4'; // 'a4' → 'keypoint'
let IMG_W = 0, IMG_H = 0;
let fileName = '';
let imageBlob = null; // リサイズ済み画像

const imageArea = document.getElementById('imageArea');
const img = document.getElementById('img');

// ============ カテゴリ ============
function hasData() {
  return points.length > 0 || Object.keys(getMeasurements()).length > 0;
}
let pendingAction = null;
function showConfirm(msg, onYes) {
  const d = document.getElementById('confirmDialog');
  d.querySelector('.confirm-msg').textContent = msg;
  d.style.display = 'flex';
  pendingAction = onYes;
}
function confirmYes() {
  document.getElementById('confirmDialog').style.display = 'none';
  if(pendingAction) { pendingAction(); pendingAction = null; }
}
function confirmNo() {
  document.getElementById('confirmDialog').style.display = 'none';
  pendingAction = null;
}
function setCat(c) {
  if(c === cat) return;
  if(hasData()) { showConfirm('入力データがリセットされます。変更しますか？', () => doSetCat(c)); return; }
  doSetCat(c);
}
function doSetCat(c) {
  cat = c;
  subCat = 'top';
  localStorage.setItem('annotate_cat', c);
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(CAT_JP[c])));
  // 上下選択の表示
  const subEl = document.getElementById('subSelect');
  subEl.style.display = HAS_SUB.includes(c) ? 'block' : 'none';
  document.getElementById('subTop').classList.add('active');
  document.getElementById('subBottom').classList.remove('active');
  // キーポイントだけリセット（写真・実寸・A4は保持）
  resetPoints();
  renderMeasureForm();
  renderList();
  if(IMG_W && a4Points.length === 4) {
    setMode(`② ${DEFS[effectiveCat()][0].jp} をタップしてください`);
  }
}
function setSubCat(s) {
  if(s === subCat) return;
  if(hasData()) { showConfirm('入力データがリセットされます。変更しますか？', () => doSetSubCat(s)); return; }
  doSetSubCat(s);
}
function doSetSubCat(s) {
  subCat = s;
  document.getElementById('subTop').classList.toggle('active', s==='top');
  document.getElementById('subBottom').classList.toggle('active', s==='bottom');
  resetPoints();
  renderMeasureForm();
  renderList();
  if(IMG_W && a4Points.length === 4) {
    setMode(`② ${DEFS[effectiveCat()][0].jp} をタップしてください`);
  }
}
document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(CAT_JP[cat])));
if(HAS_SUB.includes(cat)) document.getElementById('subSelect').style.display = 'block';

// ============ 実寸フォーム（常に表示） ============
function renderMeasureForm() {
  const items = MEASURES[effectiveCat()] || [];
  document.getElementById('measureForm').innerHTML = `<div class="measure-form">

// ============ 画像選択 + 自動リサイズ ============
function onFile(e) {
  const file = e.target.files[0]; if(!file) return;
  fileName = file.name;
  const reader = new FileReader();
  reader.onload = () => {
    const tmpImg = new Image();
    tmpImg.onload = () => {
      // 長辺1024pxにリサイズ
      const MAX = 1024;
      let w = tmpImg.width, h = tmpImg.height;
      if(w > MAX || h > MAX) {
        if(w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(tmpImg, 0, 0, w, h);
      canvas.toBlob(blob => {
        imageBlob = blob;
        IMG_W = w; IMG_H = h;
        img.src = URL.createObjectURL(blob);
        img.onload = () => {
          resetPoints();
          resetA4();
          phase = 'a4';
          renderList();
          document.getElementById('selectBtn').style.display = 'none';
          document.getElementById('undoBtn').style.display = 'block';
          setMode('② A4用紙の左上をタップ（4隅を順に）');
        };
      }, 'image/jpeg', 0.85);
    };
    tmpImg.src = reader.result;
  };
  reader.readAsDataURL(file);
}

function toggleA4Select(i) {
  if(selectedA4 === i) { deselectA4(); return; }
  selectedA4 = i;
  selectedIdx = -1;
  dots.forEach(d => d.classList.remove('selected'));
  a4Dots.forEach(d => d.classList.remove('a4-selected'));

function deselectA4() {
  selectedA4 = -1;
  justDeselected = true;
  setTimeout(() => justDeselected = false, 300);
  zoomReset();
  a4Dots.forEach(d => d.classList.remove('a4-selected'));
  if(phase === 'a4' && a4Points.length < 4) {
    setMode(`② A4用紙の${A4_LABELS[a4Points.length]}をタップ（${a4Points.length}/4）`);
  } else if(phase === 'a4' && a4Points.length >= 4) {
    setMode('A4位置を確認してください。ずれていればタップで調整');
    document.getElementById('a4NextBtn').style.display = 'block';
  } else if(phase === 'keypoint') {
    const defs = DEFS[effectiveCat()];
    if(points.length < defs.length) setMode(`② ${defs[points.length].jp} をタップしてください`);
    else setMode('全ポイント完了！ 保存してください');
  }
}

function addA4Point(e) {
  if(justDeselected) return;
  if(a4Points.length >= 4) return;
  const cx = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
  const cy = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
  if(!cx) return;
  const r = getRect();
  const imgX = ((cx - r.left) / r.width) * IMG_W;
  const imgY = ((cy - r.top) / r.height) * IMG_H;
  if(imgX < 0 || imgX > IMG_W || imgY < 0 || imgY > IMG_H) return;

  a4Points.push({x: imgX, y: imgY});
  const ai = a4Points.length - 1;
  a4Dots.push(createA4Dot(ai));
  // 自動で調整モードに入る
  selectedA4 = ai;
  a4Dots.forEach(d => d.classList.remove('a4-selected'));
  a4Dots[ai].classList.add('a4-selected');
  setMode(`A4 ${A4_LABELS[ai]}を調整中 — ドラッグで移動 / 空白タップで確定`);
  repositionAllLabels();
  zoomToPoint(imgX, imgY);
}

let guideElements = [];

function renderGuideLines() {
  // 古いライン削除
  guideElements.forEach(el => el.remove());
  guideElements = [];
  if(phase !== 'keypoint') return;
  const guides = GUIDE_LINES[effectiveCat()] || [];
  const defs = DEFS[effectiveCat()];
  for(const g of guides) {
    const ai = defs.findIndex(d => d.name === g.a);
    const bi = defs.findIndex(d => d.name === g.b);
    if(ai < 0 || bi < 0 || ai >= points.length || bi >= points.length) continue;
    const pa = toArea(points[ai].x, points[ai].y);
    const pb = toArea(points[bi].x, points[bi].y);
    const aRect = imageArea.getBoundingClientRect();

    // 実線: 2点間
    const line = document.createElement('div');
    line.style.cssText = 'position:absolute;z-index:4;pointer-events:none;';
    const dx = pb.px - pa.px, dy = pb.py - pa.py;
    const len = Math.hypot(dx, dy);
    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
    line.style.width = len + 'px';
    line.style.height = '1px';
    line.style.background = 'rgba(255,255,255,0.3)';
    line.style.left = pa.px + 'px';
    line.style.top = pa.py + 'px';
    line.style.transformOrigin = '0 0';
    line.style.transform = `rotate(${angle}deg)`;
    imageArea.appendChild(line);
    guideElements.push(line);

    // line タイプは接続線のみ（ズレ表示なし）
    if(g.dir === 'line') continue;

    // ズレ表示
    const scale = calcScale();
    if(scale) {
      let diffPx = 0, symbol = '', tagX = 0, tagY = 0;
      if(g.dir === 'h') {
        // 水平ペア → 上下ズレ（線の中央、ドットの上方30pxに配置）
        diffPx = Math.abs(points[bi].y - points[ai].y);
        symbol = '↕';
        tagX = (pa.px + pb.px) / 2;
        tagY = Math.min(pa.py, pb.py) - 30;
      } else {
        // 垂直ペア → 左右ズレ（線の右側、ドットから離す）
        diffPx = Math.abs(points[bi].x - points[ai].x);
        symbol = '↔';
        tagX = Math.max(pa.px, pb.px) + 20;
        tagY = (pa.py + pb.py) / 2 - 7;
      }
      const diffCm = diffPx * scale;
      if(diffCm > 0.5) {
        const tag = document.createElement('div');
        tag.style.cssText = `position:absolute;z-index:12;pointer-events:none;font-size:9px;
          color:#fbbf24;background:rgba(0,0,0,0.7);padding:1px 4px;border-radius:3px;white-space:nowrap;`;
        tag.style.left = tagX + 'px';
        tag.style.top = tagY + 'px';
        tag.textContent = `${symbol}${diffCm.toFixed(1)}cm`;
        imageArea.appendChild(tag);
        guideElements.push(tag);
      }
    }
  }

  // 中心ガイド線: 左右ペアの中点に縦のダッシュ線を表示
  const CENTER_PAIRS = [
    {l:'waist_left', r:'waist_right', color:'rgba(255,68,68,0.5)', label:'ウエスト中心'},
    {l:'left_hem', r:'right_hem', color:'rgba(255,0,255,0.5)', label:'裾中心'},
    {l:'hem_left', r:'hem_right', color:'rgba(255,0,255,0.5)', label:'裾中心'},
  ];
  const defs2 = DEFS[effectiveCat()];
  for(const cp of CENTER_PAIRS) {
    const li = defs2.findIndex(d => d.name === cp.l);
    const ri = defs2.findIndex(d => d.name === cp.r);
    if(li < 0 || ri < 0 || li >= points.length || ri >= points.length) continue;
    const mx = (points[li].x + points[ri].x) / 2;
    const my = (points[li].y + points[ri].y) / 2;
    const pm = toArea(mx, my);
    const aRect = imageArea.getBoundingClientRect();
    // 縦のダッシュ線（画像エリアの上から下まで）
    const vline = document.createElement('div');
    vline.style.cssText = `position:absolute;z-index:3;pointer-events:none;
      left:${pm.px}px;top:0;width:1px;height:100%;
      background:repeating-linear-gradient(to bottom,${cp.color} 0px,${cp.color} 4px,transparent 4px,transparent 8px);`;
    // ラベル（ドットと被らない方向に動的配置）
    const vtag = document.createElement('div');
    vtag.style.cssText = `position:absolute;z-index:12;pointer-events:none;font-size:8px;
      color:#fff;background:rgba(0,0,0,0.6);padding:1px 4px;border-radius:2px;white-space:nowrap;`;
    vtag.textContent = cp.label;
    // 4方向から最もドットから離れた位置を選択
    const cDirs = [{dx:6,dy:-14},{dx:6,dy:8},{dx:-40,dy:-14},{dx:-40,dy:8}];
    let bestCD = cDirs[0], bestCDist = -1;
    const allPts = [];
    dots.forEach((d,i) => { if(i<points.length) allPts.push({x:parseFloat(d.style.left),y:parseFloat(d.style.top)}); });
    a4Dots.forEach((d,i) => { if(i<a4Points.length) allPts.push({x:parseFloat(d.style.left),y:parseFloat(d.style.top)}); });
    for(const cd of cDirs) {
      const lx = pm.px+cd.dx, ly = pm.py+cd.dy;
      let md = Infinity;
      for(const p of allPts) { md = Math.min(md, Math.hypot(p.x-lx, p.y-ly)); }
      if(md > bestCDist) { bestCDist = md; bestCD = cd; }
    }
    vtag.style.left = (pm.px + bestCD.dx) + 'px';
    vtag.style.top = (pm.py + bestCD.dy) + 'px';
    imageArea.appendChild(vtag);
    guideElements.push(vtag);
    imageArea.appendChild(vline);
    guideElements.push(vline);
  }
}

// A4隅からスケール (cm/px) を計算
function calcScale() {
  if(a4Points.length < 4) return 0;
  // 左上(0)→右上(1)=横21cm, 左上(0)→左下(2)=縦29.7cm
  const topW = Math.hypot(a4Points[1].x-a4Points[0].x, a4Points[1].y-a4Points[0].y);
  const bottomW = Math.hypot(a4Points[3].x-a4Points[2].x, a4Points[3].y-a4Points[2].y);
  const leftH = Math.hypot(a4Points[2].x-a4Points[0].x, a4Points[2].y-a4Points[0].y);
  const rightH = Math.hypot(a4Points[3].x-a4Points[1].x, a4Points[3].y-a4Points[1].y);
  const scaleW = 21.0 / ((topW + bottomW) / 2);
  const scaleH = 29.7 / ((leftH + rightH) / 2);
  return (scaleW + scaleH) / 2;
}

// ポイント座標を取得（名前→index→座標）
function getPt(name) {
  const defs = DEFS[effectiveCat()];
  const i = defs.findIndex(d => d.name === name);
  if(i < 0 || i >= points.length) return null;
  return points[i];
}

// キーポイントからの計測値と実寸の誤差を計算
function calcErrors() {
  const scale = calcScale();
  if(!scale) return [];
  const map = KP_MEASURE_MAP[effectiveCat()] || [];
  const measurements = getMeasurements();
  const errors = [];
  for(const entry of map) {
    let dist = 0;
    if(entry.type === 'mid') {
      // 中点同士の距離
      const p1 = getPt(entry.a1), p2 = getPt(entry.a2), p3 = getPt(entry.b1), p4 = getPt(entry.b2);
      if(!p1||!p2||!p3||!p4) continue;
      const mx1 = (p1.x+p2.x)/2, my1 = (p1.y+p2.y)/2;
      const mx2 = (p3.x+p4.x)/2, my2 = (p3.y+p4.y)/2;
      dist = Math.hypot(mx2-mx1, my2-my1) * scale;
    } else if(entry.type === 'mid_to_pt') {
      // 中点と1点の距離
      const p1 = getPt(entry.a1), p2 = getPt(entry.a2), p3 = getPt(entry.b);
      if(!p1||!p2||!p3) continue;
      const mx = (p1.x+p2.x)/2, my = (p1.y+p2.y)/2;
      dist = Math.hypot(p3.x-mx, p3.y-my) * scale;
    } else {
      // 2点間距離
      const pa = getPt(entry.a), pb = getPt(entry.b);
      if(!pa||!pb) continue;
      dist = Math.hypot(pb.x-pa.x, pb.y-pa.y) * scale;
    }
    const kpCm = Math.round(dist * 10) / 10;
    const actual = measurements[entry.m];
    errors.push({name:entry.m, kpCm, actual: actual||null, diff: actual ? Math.round((kpCm-actual)*10)/10 : null});
  }
  return errors;
}

function renderErrors() {
  const el = document.getElementById('errorTable');

  if(errors.length === 0) { el.innerHTML = ''; return; }
  let html = '<div class="error-table"><h4>📏 計測値 vs 実寸</h4>';
  for(const e of errors) {
    const diffClass = e.diff === null ? '' : Math.abs(e.diff) <= 2 ? 'ok' : Math.abs(e.diff) <= 5 ? 'warn' : 'bad';
    const diffText = e.diff !== null ? `${e.diff > 0 ? '+' : ''}${e.diff}cm` : '—';
    const actualText = e.actual !== null ? `${e.actual}cm` : '未入力';
    html += `<div class="error-row">
      <span class="name">${e.name}</span>
      <span class="val">${e.kpCm}cm</span>
      <span style="color:#888">実寸 ${actualText}</span>
      <span class="diff ${diffClass}">${diffText}</span>
    </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

  dots.forEach(d => d.classList.remove('selected'));
  dots[i]?.classList.add('selected');
  setMode(`${DEFS[effectiveCat()][i].jp} を調整中 — ドラッグで移動 / 空白タップで確定`);
  zoomToPoint(points[i].x, points[i].y);
  renderList();
}

let justDeselected = false;
function deselectDot() {
  selectedIdx = -1;
  justDeselected = true;
  setTimeout(() => justDeselected = false, 300);
  zoomReset();
  dots.forEach(d => d.classList.remove('selected'));
  const defs = DEFS[effectiveCat()];
  if(points.length < defs.length) {
    setMode(`② ${defs[points.length].jp} をタップしてください`);
  } else {
    setMode('全ポイント完了！ 保存してください');
    document.getElementById('saveBtn').style.display = 'block';
  }
  renderList();
}

// ============ タッチ/マウス ============
imageArea.addEventListener('mousedown', e => { if(!e.target.classList.contains('dot') && !e.target.classList.contains('a4-dot')) startDrag(e.clientX,e.clientY); });
imageArea.addEventListener('mousemove', e => { if(e.buttons===1) moveDrag(e.clientX,e.clientY); });
imageArea.addEventListener('mouseup', e => endDrag(e));
let wasPinch = false;
let touchStartPos = null;
const TAP_THRESHOLD = 10; // px以内の移動はタップ扱い
imageArea.addEventListener('touchstart', e => {
  if(e.touches.length >= 2) { wasPinch = true; dragAnchor = null; touchStartPos = null; return; }
  if(wasPinch) return;
  isDragging=false;
  touchStartPos = {x: e.touches[0].clientX, y: e.touches[0].clientY};
  if(!e.target.classList.contains('dot') && !e.target.classList.contains('a4-dot')) startDrag(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:true});
imageArea.addEventListener('touchmove', e => {
  if(e.touches.length >= 2) { wasPinch = true; dragAnchor = null; touchStartPos = null; return; }
  if(wasPinch) return;
  if(dragAnchor){e.preventDefault();isDragging=true;moveDrag(e.touches[0].clientX,e.touches[0].clientY);}
  // スワイプ検出
  if(touchStartPos && !dragAnchor) {
    const dx = e.touches[0].clientX - touchStartPos.x;
    const dy = e.touches[0].clientY - touchStartPos.y;
    if(Math.hypot(dx,dy) > TAP_THRESHOLD) touchStartPos = null; // スワイプ → タップ無効化
  }
}, {passive:false});
imageArea.addEventListener('touchend', e => {
  if(wasPinch) {
    if(e.touches.length === 0) wasPinch = false;
    return;
  }
  // スワイプだった場合はポイント追加しない
  if(!touchStartPos && !isDragging) { touchStartPos = null; return; }
  touchStartPos = null;
  endDrag(e);
}, {passive:true});

function startDrag(cx, cy) {
  if(selectedA4 >= 0) {
    dragAnchor = {clientX:cx, clientY:cy, origX:a4Points[selectedA4].x, origY:a4Points[selectedA4].y, type:'a4'};
  } else if(selectedIdx >= 0) {
    dragAnchor = {clientX:cx, clientY:cy, origX:points[selectedIdx].x, origY:points[selectedIdx].y, type:'kp'};
  }
}

function moveDrag(cx, cy) {
  if(!dragAnchor) return;
  isDragging = true;
  const r = getRect();
  const s = isAutoZoomed ? ZOOM_SCALE : 1;
  const nx = dragAnchor.origX + ((cx - dragAnchor.clientX) / s / r.width) * IMG_W;
  const ny = dragAnchor.origY + ((cy - dragAnchor.clientY) / s / r.height) * IMG_H;
  if(dragAnchor.type === 'a4' && selectedA4 >= 0) {
    a4Points[selectedA4] = {x: nx, y: ny};
    const p = toArea(nx, ny);
    a4Dots[selectedA4].style.left = p.px + 'px';
    a4Dots[selectedA4].style.top = p.py + 'px';
    repositionAllLabels();
  } else if(dragAnchor.type === 'kp' && selectedIdx >= 0) {
    points[selectedIdx] = {x: nx, y: ny};
    const p = toArea(nx, ny);
    dots[selectedIdx].style.left = p.px + 'px';
    dots[selectedIdx].style.top = p.py + 'px';
    renderList();
  }
}

function endDrag(e) {
  const wasDrag = isDragging;
  dragAnchor = null;
  isDragging = false;
  if(!wasDrag && e && !e.target.classList.contains('dot') && !e.target.classList.contains('a4-dot')) {
    if(selectedA4 >= 0) { deselectA4(); }
    else if(selectedIdx >= 0) { deselectDot(); }
    else if(phase === 'a4') { addA4Point(e); }
    else { addPoint(e); }
  }
}

function addPoint(e) {
  if(justDeselected) return;
  if(!img.src || !IMG_W) return;
  const defs = DEFS[effectiveCat()];
  if(points.length >= defs.length) return;

  const cx = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
  const cy = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
  if(!cx) return;

  const r = getRect();
  const imgX = ((cx - r.left) / r.width) * IMG_W;
  const imgY = ((cy - r.top) / r.height) * IMG_H;
  if(imgX < 0 || imgX > IMG_W || imgY < 0 || imgY > IMG_H) return;

  points.push({x: imgX, y: imgY});
  const idx = points.length - 1;
  dots.push(createDot(idx));
  // 自動で調整モードに入る
  selectedIdx = idx;
  dots.forEach(d => d.classList.remove('selected'));
  dots[idx]?.classList.add('selected');
  setMode(`${defs[idx].jp} を調整中 — ドラッグで移動 / 空白タップで確定`);
  zoomToPoint(imgX, imgY);
  renderList();
}

function undo() {
  if(phase === 'keypoint' && points.length === 0) {
    // キーポイント0個 → A4フェーズに戻る（A4ドットを再表示）
    phase = 'a4';
    a4Dots.forEach(d => d.style.display = '');
    if(a4Points.length >= 4) {
      document.getElementById('a4NextBtn').style.display = 'block';
      setMode('A4位置を確認してください。ずれていればタップで調整');
    } else {
      setMode(`② A4用紙の${A4_LABELS[a4Points.length]}をタップ（${a4Points.length}/4）`);
    }
    renderList();
    return;
  }
  if(phase === 'a4') {
    if(a4Points.length === 0) return;
    document.getElementById('a4NextBtn').style.display = 'none';
    a4Points.pop();
    const d = a4Dots.pop(); if(d) d.remove();
    if(a4Points.length >= 4) {
      document.getElementById('a4NextBtn').style.display = 'block';
      setMode('A4位置を確認してください。ずれていればタップで調整');
    } else {
      setMode(`② A4用紙の${A4_LABELS[a4Points.length]}をタップ（${a4Points.length}/4）`);
    }
    return;
  }
  points.pop();
  const dot = dots.pop();
  if(dot) dot.remove();
  selectedIdx = -1;
  dots.forEach(d => d.classList.remove('selected'));
  renderList();
  document.getElementById('saveBtn').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  const defs = DEFS[effectiveCat()];
  if(points.length < defs.length) {
    setMode(`② ${defs[points.length].jp} をタップしてください`);
  }
}

// ============ 保存 ============
async function save() {
  if(!WORKER) {
    WORKER = prompt('お名前を入力してください');
    if(WORKER) { WORKER = WORKER.trim(); localStorage.setItem('annotate_worker', WORKER); }
  }
  if(!WORKER) { alert('お名前を入力してください'); return; }

  const measurements = getMeasurements();
  const expected = (MEASURES[effectiveCat()] || []).length;
  if(Object.keys(measurements).length < expected) {
    if(!window._skipMeasureCheck) {
      showConfirm('実寸が未入力の項目があります。このまま保存しますか？', () => { window._skipMeasureCheck = true; save(); });
      return;
    }
    window._skipMeasureCheck = false;
  }

  const defs = DEFS[effectiveCat()];
  const kpFlat = [];
  points.forEach(p => { kpFlat.push(Math.round(p.x), Math.round(p.y), 2); });

  const keypoints = {};
  defs.forEach((d, i) => {
    keypoints[d.name] = { x: Math.round(points[i].x), y: Math.round(points[i].y), visibility: 2 };
  });

  // A4隅座標からスケール計算
  const a4 = a4Points.map(p => ({x: Math.round(p.x), y: Math.round(p.y)}));

  const dataObj = {
    worker: WORKER,
    category: effectiveCat(),
    image_name: fileName,
    width: IMG_W,
    height: IMG_H,
    a4_corners: a4,
    measurements,
    keypoints,
    keypoints_flat: kpFlat,
  };

  // FormDataで画像+JSONを送信
  const fd = new FormData();
  fd.append('image', imageBlob, fileName);
  fd.append('data', JSON.stringify(dataObj));

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = '送信中...';

  try {
    const resp = await fetch('/api/save', { method: 'POST', body: fd });
    const result = await resp.json();
    if(result.ok) {
      setMode(`✅ 保存完了（${result.total}件目）`);
      updateCount();
      // 即座にリセット（hasDataがfalseを返すように）
      resetAll();
      renderMeasureForm();
      renderList();
      setMode(`✅ 保存完了（${result.total}件目）— 次の衣類へ`);
    } else {
      setMode('❌ 保存失敗: ' + (result.error || '不明なエラー'));
      saveBtn.disabled = false;
      saveBtn.textContent = '保存して次へ';
    }
  } catch(e) {
    setMode('❌ 通信エラー: ' + e.message);
    saveBtn.disabled = false;
    saveBtn.textContent = '保存して次へ';
  }
}

// ============ カウント ============
function updateCount() {
  fetch('/api/count').then(r=>r.json()).then(d=>{
    const myCount = WORKER && d.workers?.[WORKER] ? d.workers[WORKER] : 0;
    document.getElementById('saveCount').textContent = WORKER ? `${WORKER}: ${myCount}件 / 全体: ${d.total}件` : `全体: ${d.total}件`;
  }).catch(()=>{});
}
updateCount();

// ============ ユーティリティ ============
function getRect() {
  const cW=img.clientWidth, cH=img.clientHeight, iR=IMG_W/IMG_H, cR=cW/cH;
  let rW,rH,oX,oY;
  if(iR>cR){rW=cW;rH=cW/iR;oX=0;oY=(cH-rH)/2;}else{rH=cH;rW=cH*iR;oX=(cW-rW)/2;oY=0;}
  const rect=img.getBoundingClientRect();
  return{left:rect.left+oX, top:rect.top+oY, width:rW, height:rH};
}

function toArea(imgX, imgY) {
  const r=getRect(), a=imageArea.getBoundingClientRect();
  return{px:(imgX/IMG_W)*r.width+(r.left-a.left), py:(imgY/IMG_H)*r.height+(r.top-a.top)};
}

const ZOOM_SCALE = 4;
let isAutoZoomed = false;
function zoomToPoint(imgX, imgY) {
  const area = imageArea;
  // 既にズーム中なら一度リセットしてtransitionを無効化して即切り替え
  if(isAutoZoomed) {
    area.style.transition = 'none';
    area.style.transform = '';
    void area.offsetHeight; // reflow
  }
  const rect = area.getBoundingClientRect();
  const r = getRect();
  const px = (imgX / IMG_W) * r.width + (r.left - rect.left);
  const py = (imgY / IMG_H) * r.height + (r.top - rect.top);
  const ox = (px / rect.width) * 100;
  const oy = (py / rect.height) * 100;
  area.style.transformOrigin = `${ox}% ${oy}%`;
  area.style.transition = 'transform 0.3s ease';
  area.style.transform = `scale(${ZOOM_SCALE})`;
  isAutoZoomed = true;
}
function zoomReset() {
  imageArea.style.transform = '';
  isAutoZoomed = false;
}

// ラベル位置を全ドットとの衝突を考慮して動的に決定
const LABEL_DIRS = [
  {dx:18, dy:-10},  // 右上
  {dx:18, dy:10},   // 右下
  {dx:-34, dy:-10}, // 左上
  {dx:-34, dy:10},  // 左下
  {dx:0, dy:-22},   // 上
  {dx:0, dy:18},    // 下
  {dx:22, dy:0},    // 右
  {dx:-38, dy:0},   // 左
];

function positionLabel(label, ownerPx, ownerPy) {
  // 全ドットのスクリーン位置を集める
  const allDots = [];
  dots.forEach((d,i) => { if(i < points.length) allDots.push({x:parseFloat(d.style.left), y:parseFloat(d.style.top)}); });
  a4Dots.forEach((d,i) => { if(i < a4Points.length) allDots.push({x:parseFloat(d.style.left), y:parseFloat(d.style.top)}); });

  let bestDir = LABEL_DIRS[0], maxDist = -1;
  for(const dir of LABEL_DIRS) {
    const lx = ownerPx + dir.dx, ly = ownerPy + dir.dy;
    let minD = Infinity;
    for(const dot of allDots) {
      const d = Math.hypot(dot.x - lx, dot.y - ly);
      if(d < minD) minD = d;
    }
    if(minD > maxDist) { maxDist = minD; bestDir = dir; }
  }
  label.style.left = (14 + bestDir.dx) + 'px'; // 14=ドット半径
  label.style.top = (14 + bestDir.dy) + 'px';
}

function repositionAllLabels() {
  dots.forEach((d,i) => {
    if(i >= points.length) return;
    const lbl = d.querySelector('.dot-label');
    if(lbl) positionLabel(lbl, parseFloat(d.style.left), parseFloat(d.style.top));
  });
  a4Dots.forEach((d,i) => {
    if(i >= a4Points.length) return;
    const lbl = d.querySelector('.a4-label');
    if(lbl) positionLabel(lbl, parseFloat(d.style.left), parseFloat(d.style.top));
  });
}

function setMode(t) {
  document.getElementById('modeBar').textContent = t;
  const fl = document.getElementById('floatLabel');
  if(fl.style.display !== 'none') fl.textContent = t;
}

window.addEventListener('resize', () => {
  dots.forEach((d, i) => {
    if(i < points.length) {
      const p = toArea(points[i].x, points[i].y);
      d.style.left = p.px+'px'; d.style.top = p.py+'px';
    }
  });
  a4Dots.forEach((d, i) => {
    if(i < a4Points.length) {
      const p = toArea(a4Points[i].x, a4Points[i].y);
      d.style.left = p.px+'px'; d.style.top = p.py+'px';
    }
  });
  renderGuideLines();
  repositionAllLabels();
});

// ピンチズーム時にフローティングラベルで現在のステップを表示
if(window.visualViewport) {
  const fl = document.getElementById('floatLabel');
  function updateFloat() {
    const vv = window.visualViewport;
    if(vv.scale > 1.2) {
      fl.textContent = document.getElementById('modeBar').textContent;
      fl.style.display = 'block';
      const s = 1 / vv.scale;
      fl.style.top = (vv.offsetTop + 8 * vv.scale) + 'px';
      fl.style.left = (vv.offsetLeft + 8 * vv.scale) + 'px';
      fl.style.transform = `scale(${s})`;
    } else {
      fl.style.display = 'none';
    }
  }
  visualViewport.addEventListener('resize', updateFloat);
  visualViewport.addEventListener('scroll', updateFloat);
}
</script>
